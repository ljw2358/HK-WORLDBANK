<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK WORLD BANK - Global Hub</title>
    <style>
        :root { --gold: #FFD700; --dark: #000; --card: #121212; --green: #00FF00; }
        body { background-color: var(--dark); color: #fff; font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        
        /* 글로벌 네비게이션 */
        .nav-bar { width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 15px 25px; background: #0a0a0a; border-bottom: 1px solid #222; box-sizing: border-box; }
        .hk-logo { color: var(--gold); font-weight: 900; font-size: 14px; letter-spacing: 1.5px; }
        #langSel { background: #1a1a1a; color: var(--gold); border: 1.5px solid var(--gold); padding: 7px 12px; border-radius: 10px; font-size: 14px; cursor: pointer; outline: none; }

        /* 헤더 브랜딩 */
        .hero { margin-top: 45px; text-align: center; }
        .main-name { font-size: 44px; font-weight: 900; color: var(--gold); letter-spacing: 1px; text-shadow: 0 0 30px rgba(255,215,0,0.3); }
        .sub-name { font-size: 20px; font-weight: bold; color: #fff; margin-top: -5px; letter-spacing: 6px; opacity: 0.6; }

        /* 메인 뱅킹 카드 */
        .card-frame { width: 92%; max-width: 440px; background: linear-gradient(160deg, #1e1e1e 0%, #050505 100%); border-radius: 40px; padding: 50px 30px; margin-top: 35px; border: 1px solid #2a2a2a; box-shadow: 0 40px 80px rgba(0,0,0,0.8); text-align: center; position: relative; }
        .card-frame::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: url('https://www.transparenttextures.com/patterns/carbon-fibre.png'); opacity: 0.05; pointer-events: none; }
        
        .label-top { color: var(--gold); font-size: 16px; font-weight: bold; margin-bottom: 35px; letter-spacing: 1px; }
        .balance-box { margin-bottom: 10px; }
        #mainBalance { font-size: 64px; font-weight: 800; color: #fff; letter-spacing: -1px; }
        .pi-unit { font-size: 32px; color: var(--gold); font-weight: bold; margin-left: 5px; }

        /* GCV 밸류에이션 */
        .gcv-info { border: 2px solid var(--green); border-radius: 60px; padding: 20px; color: var(--green); font-size: 17px; font-weight: bold; margin: 35px 0; background: rgba(0,255,0,0.05); }

        /* 하단 액션 버튼 */
        .grid-menu { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 40px; }
        .menu-item { background: #181818; padding: 25px 10px; border-radius: 25px; border: 1px solid #252525; cursor: pointer; transition: 0.2s; }
        .menu-item:active { transform: scale(0.95); background: #222; }
        .ico { font-size: 32px; margin-bottom: 12px; display: block; }
        .txt { font-size: 15px; font-weight: bold; color: #888; }

        /* 메인 결제 버튼 */
        .pay-trigger { background: linear-gradient(135deg, #FFD700 0%, #B8860B 100%); color: #000; width: 100%; padding: 25px; border-radius: 22px; border: none; font-size: 22px; font-weight: 900; cursor: pointer; margin-top: 40px; box-shadow: 0 15px 30px rgba(184,134,11,0.4); }

        /* 결제 팝업 (모달) */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.97); z-index: 1000; justify-content: center; align-items: center; }
        .modal-body { background: #111; width: 88%; max-width: 380px; padding: 55px 40px; border-radius: 45px; border: 2.5px solid var(--gold); text-align: center; box-shadow: 0 0 60px rgba(255,215,0,0.25); }
        .pay-amt { font-size: 58px; font-weight: bold; color: #fff; margin: 35px 0; }
        .close-link { color: #666; margin-top: 35px; cursor: pointer; text-decoration: underline; font-size: 15px; display: block; }

        .footer { margin-top: 60px; padding-bottom: 60px; text-align: center; color: #444; font-size: 14px; line-height: 2; }
    </style>
</head>
<body>

    <nav class="nav-bar">
        <div class="hk-logo">HK GROUP GLOBAL</div>
        <select id="langSel" onchange="applyLang()">
            <option value="ko">🇰🇷 한국어 (KOR)</option>
            <option value="en">🇺🇸 English (ENG)</option>
            <option value="cn">🇨🇳 中文 (CHN)</option>
            <option value="jp">🇯🇵 日本語 (JPN)</option>
            <option value="vn">🇻🇳 Tiếng Việt (VNM)</option>
            <option value="ph">🇵🇭 Tagalog (PHL)</option>
            <option value="id">🇮🇩 Indonesia (IDN)</option>
            <option value="th">🇹🇭 ไทย (THA)</option>
            <option value="in">🇮🇳 हिन्दी (IND)</option>
            <option value="sa">🇸🇦 العربية (SAU)</option>
            <option value="ru">🇷🇺 Русский (RUS)</option>
            <option value="de">🇩🇪 Deutsch (GER)</option>
            <option value="fr">🇫🇷 Français (FRA)</option>
            <option value="es">🇪🇸 Español (ESP)</option>
            <option value="br">🇧🇷 Português (BRA)</option>
        </select>
    </nav>

    <div class="hero">
        <div class="main-name">HK WORLD BANK</div>
        <div class="sub-name" id="t-sub">BANK</div>
    </div>

    <div class="card-frame">
        <div class="label-top" id="t-ledger">메인 자산 통합 원장</div>
        <div class="balance-box">
            <span id="mainBalance">400.0212</span>
            <span class="pi-unit">Pi</span>
        </div>
        
        <div class="gcv-info" id="t-gcv">가치 평가: $ 125,663,600 (GCV)</div>

        <div class="grid-menu">
            <div class="menu-item"><span class="ico">📤</span><span class="txt" id="b-sn">송금</span></div>
            <div class="menu-item" onclick="openModal()"><span class="ico">🛒</span><span class="txt" id="b-py">결제</span></div>
            <div class="menu-item"><span class="ico">📥</span><span class="txt" id="b-sv">예치</span></div>
        </div>

        <button class="pay-trigger" id="t-mbtn" onclick="openModal()">STAKING & ECOSYSTEM</button>
    </div>

    <div class="footer">
        <b style="color:var(--green);">31.4% APY Staking Reward Active</b><br>
        Ulsan · Gyeongju · Pohang Industrial Hub<br>
        © 2026 HK Group. All Rights Reserved.
    </div>

    <div id="payModal" class="modal">
        <div class="modal-body">
            <h2 id="m-title" style="color:var(--gold); margin:0; font-size:24px;">ECOSYSTEM PAY</h2>
            <div class="pay-amt">5.0000</div>
            <button id="confirmBtn" class="pay-trigger" onclick="runPayment()">결제 승인 (Confirm)</button>
            <span class="close-link" onclick="closeModal()">취소 (Cancel)</span>
        </div>
    </div>

    <script>
        let currentBalance = 400.0212;

        function openModal() { document.getElementById('payModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('payModal').style.display = 'none'; }

        // 결제 로직: 5파이 차감 및 즉시 반영
        function runPayment() {
            const btn = document.getElementById('confirmBtn');
            btn.disabled = true;
            btn.innerText = "Processing...";

            setTimeout(() => {
                currentBalance -= 5;
                document.getElementById('mainBalance').innerText = currentBalance.toFixed(4);
                btn.innerText = "SUCCESS";
                
                setTimeout(() => {
                    closeModal();
                    btn.disabled = false;
                    btn.innerText = "결제 승인 (Confirm)";
                }, 1200);
            }, 1000);
        }

        // 15개국 언어 데이터
        const i18n = {
            ko: { sub: "BANK", ledger: "메인 자산 통합 원장", gcv: "가치 평가: $ 125,663,600 (GCV)", sn: "송금", py: "결제", sv: "예치", mbtn: "스테이킹 참여" },
            en: { sub: "BANK", ledger: "Main Asset Ledger", gcv: "Value: $ 125,663,600 (GCV)", sn: "Send", py: "Pay", sv: "Save", mbtn: "STAKING & ECO" },
            cn: { sub: "银行", ledger: "主资产账本", gcv: "估值: $ 125,663,600 (GCV)", sn: "转账", py: "支付", sv: "储蓄", mbtn: "质押与生态" },
            jp: { sub: "銀行", ledger: "メイン資産元帳", gcv: "評価額: $ 125,663,600 (GCV)", sn: "送금", py: "決済", sv: "預金", mbtn: "ステーキング" },
            vn: { sub: "Ngân hàng", ledger: "Sổ cái tài sản chính", gcv: "Định giá: $ 125,663,600 (GCV)", sn: "Gửi", py: "Thanh toán", sv: "Tiết kiệm", mbtn: "Đặt cọc" }
        };

        function applyLang() {
            const lang = document.getElementById('langSel').value;
            const d = i18n[lang] || i18n['en'];
            document.getElementById('t-sub').innerText = d.sub;
            document.getElementById('t-ledger').innerText = d.ledger;
            document.getElementById('t-gcv').innerText = d.gcv;
            document.getElementById('b-sn').innerText = d.sn;
            document.getElementById('b-py').innerText = d.py;
            document.getElementById('b-sv').innerText = d.sv;
            document.getElementById('t-mbtn').innerText = d.mbtn;
        }
    </script>
</body>
</html>
