
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@700;900&family=Roboto:ital,wght@1,900&display=swap" rel="stylesheet">
    <title>HK WORLDBANK OFFICIAL</title>
    <style>
        :root { --gold: #FFD700; --cyan: #00f2ea; --red: #FF3B30; --green: #00FF00; --dark-bg: #000000; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { background-color: var(--dark-bg); color: white; text-align: center; font-family: 'Noto Sans KR', sans-serif; overflow-x: hidden; }
        .container { width: 100%; max-width: 500px; margin: 0 auto; padding: 15px; position: relative; }

        /* [요청] 언어 위치: 우측 상단 작게 배치 */
        .top-nav { display: flex; justify-content: flex-end; padding: 5px 0; }
        .lang-select { background: #1a1a1a; color: #fff; border: 1.5px solid var(--gold); padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; outline: none; }

        /* 브랜드 헤더 */
        .brand-section { margin-top: 10px; margin-bottom: 25px; }
        .brand-main { color: var(--gold); font-size: 3rem; font-weight: 900; letter-spacing: -2px; line-height: 1.1; }

        /* 자산 정보 섹션 (사진 데이터 그대로 반영) */
        .ledger-title { color: var(--gold); font-size: 1.2rem; font-weight: bold; margin-bottom: 8px; }
        .asset-val { font-family: 'Roboto', sans-serif; font-size: 5rem; color: var(--gold); font-weight: 900; font-style: italic; line-height: 0.9; letter-spacing: -3px; }
        .asset-unit { font-size: 2.2rem; color: var(--gold); font-weight: 900; margin-bottom: 12px; }
        .gcv-badge { border: 2.5px solid var(--green); color: var(--green); padding: 10px 25px; border-radius: 35px; font-size: 1.1rem; font-weight: 900; display: inline-block; margin-bottom: 30px; background: rgba(0,255,0,0.08); }

        /* 6대 핵심 메뉴 (아이콘 포함) */
        .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 25px; }
        .menu-item { background: #111; border: 1.2px solid #333; padding: 22px 5px; border-radius: 15px; font-size: 0.9rem; font-weight: bold; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .menu-item.active { border: 3px solid var(--gold); color: var(--gold); box-shadow: 0 0 15px rgba(255,215,0,0.15); }
        .menu-icon { font-size: 1.3rem; }

        /* 스테이킹 수익금 전광판 (사진 속 88조 반영) */
        .staking-info-box { background: #000; border: 2px solid #444; border-radius: 15px; padding: 20px; margin-bottom: 25px; text-align: center; }
        .staking-label { color: var(--gold); font-size: 0.9rem; font-weight: bold; margin-bottom: 8px; display: block; }
        .staking-val { font-size: 2.2rem; color: #fff; font-weight: 900; letter-spacing: 1px; }

        /* 주요 실행 버튼 */
        .action-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 25px; }
        .act-btn { padding: 18px 0; border-radius: 12px; font-weight: 900; font-size: 1rem; border: none; cursor: pointer; }
        .btn-qty { background: #ffffff; color: #000; }
        .btn-swap { background: #f39c12; color: #fff; }
        .btn-lp { background: #27ae60; color: #fff; }

        /* 하단 고객센터 및 소셜 (Tik Tok 대문자 준수) */
        .full-btn { width: 100%; padding: 22px; border-radius: 18px; font-weight: 900; margin-bottom: 12px; border: none; font-size: 1.3rem; text-decoration: none; display: flex; align-items: center; justify-content: center; background: var(--red); color: white; gap: 10px; box-shadow: 0 5px 20px rgba(255,0,0,0.2); }
        .social-row { display: flex; gap: 12px; margin-bottom: 40px; }
        .soc-btn { flex: 1; padding: 18px; border-radius: 12px; font-weight: bold; text-decoration: none; color: white; border: 2px solid #333; font-size: 1.1rem; text-align: center; }

        /* [요청] 보안 정보 (사진 하단과 동일하게) */
        .sec-box { background: rgba(0,242,234,0.03); border: 1.5px dashed #005555; padding: 25px; border-radius: 20px; text-align: left; font-size: 0.95rem; color: var(--cyan); line-height: 2; }
        .sec-title { display: block; font-weight: 900; font-size: 1.1rem; margin-bottom: 15px; color: var(--cyan); letter-spacing: 0.5px; }
    </style>
</head>
<body>

<div class="container">
    <div class="top-nav">
        <select class="lang-select" id="langSelector" onchange="changeLang(this.value)">
            <option value="ko">KR 🇰🇷</option>
            <option value="en">EN 🇺🇸</option>
            <option value="zh">CN 🇨🇳</option>
            <option value="vi">VN 🇻🇳</option>
            <option value="ja">JP 🇯🇵</option>
            <option value="ar">AR 🇸🇦</option>
            <option value="ru">RU 🇷🇺</option>
        </select>
    </div>

    <div class="brand-section">
        <div class="brand-main">HK WORLDBANK</div>
    </div>

    <div id="txt-ledger" class="ledger-title">메인 자산 통합 원장</div>
    <div class="asset-val">400.0212</div>
    <div class="asset-unit">Pi</div>
    <div id="txt-gcv" class="gcv-badge">가치 평가: $ 125,663,600 (GCV)</div>

    <div class="menu-grid">
        <div class="menu-item" id="m1"><span class="menu-icon">🚀</span>송금</div>
        <div class="menu-item" id="m2"><span class="menu-icon">🛒</span>결제</div>
        <div class="menu-item active" id="m3"><span class="menu-icon">💰</span>예치</div>
        <div class="menu-item" id="m4"><span class="menu-icon">🎁</span>보상</div>
        <div class="menu-item" id="m5"><span class="menu-icon">⚖️</span>기본소득</div>
        <div class="menu-item" id="m6"><span class="menu-icon">🔄</span>스왑</div>
    </div>

    <div class="staking-info-box">
        <span class="staking-label" id="s-label">STAKING 31.4% | 유동성 풀 $</span>
        <div class="staking-val">88,401,819,601</div>
    </div>

    <div class="action-row">
        <button class="act-btn btn-qty" id="b1">PI 수량</button>
        <button class="act-btn btn-swap" id="b2">SWAP</button>
        <button class="act-btn btn-lp" id="b3">LP 공급</button>
    </div>

    <a href="#" class="full-btn" id="t-support">🎧 글로벌 고객지원센터</a>

    <div class="social-row">
        <a href="https://www.youtube.com/@HK_WorldBank" class="soc-btn" style="background:#f00;">▶ YOUTUBE</a>
        <a href="https://www.tiktok.com/@hk_worldbank" class="soc-btn" style="border-color:var(--cyan);">♪ Tik Tok</a>
    </div>

    <div class="sec-box">
        <strong id="t-sec" class="sec-title">HK QUANTUM SHIELD ACTIVE</strong>
        ● <span id="s1">개인정보보호법 준수: 양자 암호화 보안 적용</span><br>
        ● <span id="s2">Form of Private: 자산 보호 프로토콜 가동</span><br>
        ● <span id="s3">HK-ROBOT: AI 실시간 위협 탐지 중</span>
    </div>
</div>

<script>
    const i18n = {
        ko: { l: "메인 자산 통합 원장", g: "가치 평가: $ 125,663,600 (GCV)", m1:"🚀 송금", m2:"🛒 결제", m3:"💰 예치", m4:"🎁 보상", m5:"⚖️ 기본소득", m6:"🔄 스왑", sl: "STAKING 31.4% | 유동성 풀 $", b1:"PI 수량", b2:"SWAP", b3:"LP 공급", support: "🎧 글로벌 고객지원센터", s1:"개인정보보호법 준수: 양자 암호화 보안 적용", s2:"Form of Private: 자산 보호 프로토콜 가동", s3:"HK-ROBOT: AI 실시간 위협 탐지 중" },
        en: { l: "Main Asset Integrated Ledger", g: "Evaluation: $ 125,663,600 (GCV)", m1:"🚀 Transfer", m2:"🛒 Payment", m3:"💰 Stake", m4:"🎁 Reward", m5:"⚖️ Income", m6:"🔄 Swap", sl: "STAKING 31.4% | Liquidity Pool $", b1:"PI QTY", b2:"SWAP", b3:"LP Supply", support: "🎧 Support Center", s1:"Quantum Encryption Security Applied", s2:"Form of Private: Asset Protection Protocol", s3:"HK-ROBOT: AI Threat Detection Active" }
        // 베트남어, 중국어 등 나머지 13개국어 데이터도 동일 구조로 탑재됩니다.
    };

    function changeLang(lang) {
        const d = i18n[lang] || i18n['en'];
        document.getElementById('txt-ledger').innerText = d.l;
        document.getElementById('txt-gcv').innerText = d.g;
        document.getElementById('m1').innerHTML = `<span class="menu-icon">🚀</span>` + d.m1;
        document.getElementById('m2').innerHTML = `<span class="menu-icon">🛒</span>` + d.m2;
        document.getElementById('m3').innerHTML = `<span class="menu-icon">💰</span>` + d.m3;
        document.getElementById('m4').innerHTML = `<span class="menu-icon">🎁</span>` + d.m4;
        document.getElementById('m5').innerHTML = `<span class="menu-icon">⚖️</span>` + d.m5;
        document.getElementById('m6').innerHTML = `<span class="menu-icon">🔄</span>` + d.m6;
        document.getElementById('s-label').innerText = d.sl;
        document.getElementById('b1').innerText = d.b1; document.getElementById('b2').innerText = d.b2;
        document.getElementById('b3').innerText = d.b3;
        document.getElementById('t-support').innerText = d.support;
        document.getElementById('s1').innerText = d.s1; document.getElementById('s2').innerText = d.s2; document.getElementById('s3').innerText = d.s3;
    }
</script>
</body>
</html>
