<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK WORLD BANK - Global</title>
    <style>
        :root { --gold: #FFD700; --dark: #000; --card: #151515; --green: #00FF00; }
        body { background-color: var(--dark); color: #fff; font-family: sans-serif; margin: 0; padding: 0; text-align: center; }
        
        /* 언어 선택 (15개국 국기 포함) */
        .top-nav { display: flex; justify-content: flex-end; padding: 15px; background: #111; }
        #langSel { background: #222; color: var(--gold); border: 1px solid var(--gold); padding: 8px; border-radius: 8px; }

        /* 메인 디자인 */
        .brand { margin-top: 30px; font-size: 38px; font-weight: 900; color: var(--gold); }
        .sub-brand { font-size: 20px; font-weight: bold; opacity: 0.8; margin-bottom: 30px; }
        
        .main-card { width: 90%; max-width: 400px; background: var(--card); border-radius: 30px; padding: 40px 20px; margin: 0 auto; border: 1px solid #333; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        .ledger-title { color: var(--gold); font-size: 16px; margin-bottom: 20px; }
        .balance-val { font-size: 54px; font-weight: 800; }
        .unit { font-size: 26px; color: var(--gold); font-weight: bold; margin-bottom: 20px; }

        .gcv-box { border: 2px solid var(--green); border-radius: 50px; padding: 15px; color: var(--green); font-size: 16px; font-weight: bold; margin: 25px 0; }

        /* 버튼 그리드 */
        .btn-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .btn-item { background: #222; padding: 20px 5px; border-radius: 20px; cursor: pointer; border: 1px solid #333; }
        .btn-item:active { background: #444; }

        /* 결제 실행창(모달) */
        #payModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: #1a1a1a; padding: 40px; border-radius: 30px; border: 2px solid var(--gold); width: 80%; max-width: 350px; }
        .pay-action-btn { background: var(--gold); color: #000; width: 100%; padding: 20px; border-radius: 15px; font-size: 20px; font-weight: 900; border: none; cursor: pointer; margin-top: 25px; }
    </style>
</head>
<body>

    <div class="top-nav">
        <select id="langSel" onchange="applyLang()">
            <option value="ko">🇰🇷 한국어</option>
            <option value="en">🇺🇸 English</option>
            <option value="cn">🇨🇳 中文</option>
            <option value="jp">🇯🇵 日本語</option>
            <option value="vn">🇻🇳 Tiếng Việt</option>
            <option value="ph">🇵🇭 Tagalog</option>
            <option value="id">🇮🇩 Indonesia</option>
            <option value="th">🇹🇭 ไทย</option>
            <option value="in">🇮🇳 हिन्दी</option>
            <option value="sa">🇸🇦 العربية</option>
            <option value="ru">🇷🇺 Русский</option>
            <option value="de">🇩🇪 Deutsch</option>
            <option value="fr">🇫🇷 Français</option>
            <option value="es">🇪🇸 Español</option>
            <option value="br">🇧🇷 Português</option>
        </select>
    </div>

    <div class="brand">HK WORLD BANK</div>
    <div class="sub-brand" id="t-sub">BANK</div>

    <div class="main-card">
        <div class="ledger-title" id="t-ledger">메인 자산 통합 원장</div>
        <div class="balance-val" id="mainBalance">400.0212</div>
        <div class="unit">Pi</div>
        
        <div class="gcv-box" id="t-gcv">가치 평가: $ 125,663,600 (GCV)</div>

        <div class="btn-grid">
            <div class="btn-item">📤<br><span id="b-sn">송금</span></div>
            <div class="btn-item" onclick="openPay()">🛒<br><span id="b-py">결제</span></div>
            <div class="btn-item">📥<br><span id="b-sv">예치</span></div>
        </div>
    </div>

    <div id="payModal">
        <div class="modal-content">
            <h2 style="color:var(--gold); margin:0;">PAYMENT</h2>
            <div style="font-size:40px; font-weight:bold; margin:30px 0;">5.0000</div>
            <button id="confirmBtn" class="pay-action-btn" onclick="startPay()">결제 승인 (Confirm)</button>
            <div style="margin-top:20px; color:#666; cursor:pointer;" onclick="closePay()">취소 (Cancel)</div>
        </div>
    </div>

    <script>
        let balance = 400.0212;

        function openPay() { document.getElementById('payModal').style.display = 'flex'; }
        function closePay() { document.getElementById('payModal').style.display = 'none'; }

        // 결제 로직: 누르면 무조건 숫자가 깎입니다!
        function startPay() {
            const btn = document.getElementById('confirmBtn');
            btn.disabled = true;
            btn.innerText = "Processing...";

            setTimeout(() => {
                balance -= 5;
                document.getElementById('mainBalance').innerText = balance.toFixed(4);
                btn.innerText = "COMPLETED";
                
                setTimeout(() => {
                    closePay();
                    btn.disabled = false;
                    btn.innerText = "결제 승인 (Confirm)";
                }, 1200);
            }, 800);
        }

        // 언어 변환 데이터
        const i18n = {
            ko: { sub: "BANK", ledger: "메인 자산 통합 원장", gcv: "가치 평가: $ 125,663,600 (GCV)", sn: "송금", py: "결제", sv: "예치" },
            en: { sub: "BANK", ledger: "Main Asset Ledger", gcv: "Value: $ 125,663,600 (GCV)", sn: "Send", py: "Pay", sv: "Save" },
            cn: { sub: "银行", ledger: "主资产账本", gcv: "估值: $ 125,663,600 (GCV)", sn: "转账", py: "支付", sv: "储蓄" },
            jp: { sub: "銀行", ledger: "メイン資産元帳", gcv: "評価額: $ 125,663,600 (GCV)", sn: "送金", py: "決済", sv: "預金" },
            vn: { sub: "Ngân hàng", ledger: "Sổ cái tài sản chính", gcv: "Định giá: $ 125,663,600 (GCV)", sn: "Gửi", py: "Thanh toán", sv: "Tiết kiệm" }
        };

        function applyLang() {
            const lang = document.getElementById('langSel').value;
            const d = i18n[lang] || i18n['en'];
            document.getElementById('t-sub').innerText = d.sub;
            document.getElementById('t-ledger').innerText = d.ledger;
            document.getElementById('t-gcv').innerText = d.gcv;
            document.getElementById('b-sn').innerText = d.sn;
            document.getElementById('b-py').innerText = d.py;
            document.getElementById('b-sv').innerText = d.sv;
        }
    </script>
</body>
</html>
