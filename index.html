<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HK WORLD BANK - UBI Global Hub</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #000; --gold: #FFD700; --bright-gold: #FFF5AB; --neon-green: #39FF14; --neon-blue: #00FFCC; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 480px; padding: 15px; box-sizing: border-box; }
        
        /* 언어 바 */
        .lang-bar { text-align: right; margin-bottom: 20px; }
        #langSelect { background: #111; color: var(--gold); border: 2px solid var(--gold); padding: 8px; border-radius: 8px; font-weight: bold; }

        header { text-align: center; margin-bottom: 20px; }
        .title { font-size: 2.2rem; font-weight: 900; color: var(--gold); margin: 0; text-shadow: 0 0 15px rgba(255,215,0,0.6); }
        #txt-ledger { font-weight: bold; margin-top: 10px; font-size: 1.1rem; color: var(--neon-blue); }

        /* 자산 6,280,000Pi */
        .pi-display { font-size: 2.5rem; font-weight: bold; margin: 10px 0; text-align: center; color: var(--gold); }
        .gcv-section { text-align: center; margin-bottom: 20px; background: #111; padding: 15px; border-radius: 20px; border: 1px solid #333; }
        #lp-total { font-size: 1.4rem; font-weight: 900; color: #fff; margin-top: 10px; }

        /* 메뉴 (브라이트 골드) */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .m-btn { padding: 15px 5px; border-radius: 15px; border: 1px solid #333; background: #1a1a1a; color: #fff; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 8px; font-size: 0.8rem; font-weight: bold; }
        .m-btn i { font-size: 1.6rem; color: var(--bright-gold); }

        /* 지원센터 통합 */
        .center-btn { width: 100%; padding: 18px; border-radius: 15px; border: none; font-weight: bold; font-size: 1.1rem; background: linear-gradient(45deg, #ff4d6d, #ff758c); color: white; cursor: pointer; margin-bottom: 10px; }
        #supportArea { display: none; background: #0a0a0a; border: 1px solid #ff4d6d; border-radius: 20px; padding: 15px; margin-bottom: 20px; }
        #chatContent { height: 180px; overflow-y: auto; font-size: 0.85rem; border-bottom: 1px solid #333; margin-bottom: 10px; padding: 5px; }

        .faq-item { border-bottom: 1px solid #222; padding: 12px 0; cursor: pointer; }
        .faq-q { color: var(--gold); font-size: 0.85rem; font-weight: bold; }
        .faq-a { color: #ccc; font-size: 0.75rem; display: none; padding-top: 8px; }

        /* 로그인 (최하단) */
        .login-btn { width: 100%; padding: 20px; border-radius: 15px; border: none; font-weight: bold; font-size: 1.2rem; background: linear-gradient(45deg, #673ab7, #9c27b0); color: white; cursor: pointer; }
        
        /* API 상태 알림창 */
        #apiStatus { font-size: 0.7rem; color: #555; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="lang-bar">
        <select id="langSelect" onchange="updateAll()">
            <option value="ko">한국어 🇰🇷</option><option value="en">English 🇺🇸</option>
            <option value="zh">中文 🇨🇳</option><option value="ja">日本語 🇯🇵</option>
        </select>
    </div>

    <header>
        <h1 class="title">HK WORLD BANK</h1>
        <div id="txt-ledger">메인 자산 통합 원장</div>
        <div class="pi-display" id="main-pi-display">6,280,000 <span style="color:#fff; font-size:1.5rem;">Pi</span></div>
    </header>

    <div class="gcv-section">
        <span id="txt-lp-label" style="color:var(--neon-green); font-size:0.9rem;">전체 유동성 LP 공급</span>
        <div id="lp-total">$ 88,432,159,375</div>
    </div>

    <div class="grid">
        <button class="m-btn" onclick="runEngine(10)"><i class="fas fa-paper-plane"></i><span id="m1">송금</span></button>
        <button class="m-btn" onclick="runEngine(5)"><i class="fas fa-credit-card"></i><span id="m2">결제</span></button>
        <button class="m-btn" onclick="runEngine(-50)"><i class="fas fa-piggy-bank"></i><span id="m3">예치</span></button>
        <button class="m-btn" onclick="runEngine(-20)"><i class="fas fa-gift"></i><span id="m4">보상</span></button>
        <button class="m-btn gold-btn" onclick="runEngine(-100)"><i class="fas fa-hand-holding-dollar"></i><span id="m5">기본소득</span></button>
        <button class="m-btn" onclick="alert('Swap Active')"><i class="fas fa-sync"></i><span id="m6">스왑</span></button>
    </div>

    <button id="txt-center-btn" class="center-btn" onclick="toggleSupport()">글로벌 AI 지원센터</button>
    
    <div id="supportArea">
        <div id="faqContainer"></div>
        <div id="chatContent"><p id="ai-greet" style="color:var(--gold)">[AI]: 혜공 형님, 반갑습니다! 무엇을 도와드릴까요?</p></div>
        <div style="display:flex; gap:5px;">
            <input type="text" id="chatInput" style="flex:1; background:#000; border:1px solid #444; color:#fff; padding:10px; border-radius:8px;">
            <button onclick="sendChat()" style="background:#ff4d6d; border:none; color:#fff; padding:8px 15px; border-radius:8px; font-weight:bold;">전송</button>
        </div>
    </div>

    <button onclick="loginWithPi()" class="login-btn">HKWB 로그인 (Pi Network)</button>
    
    <footer>
        Contact: support@hkwb.ai.kr<br>
        © 2026 HK GROUP - UBI Global Hub
        <div id="apiStatus">API Status: Initializing...</div>
    </footer>
</div>

<script>
    // 1. API 즉시 로드 체크
    const Pi = window.Pi;
    function checkAPI() {
        const status = document.getElementById('apiStatus');
        if (typeof Pi !== 'undefined') {
            try {
                Pi.init({ version: "1.5", sandbox: true });
                status.innerText = "API Status: HKWB SDK Connected";
                status.style.color = "#39FF14";
            } catch(e) { status.innerText = "API Error: " + e.message; }
        } else {
            status.innerText = "API Status: SDK Not Found (Use Pi Browser)";
        }
    }

    let currentBalance = 6280000;
    let baseLp = 88432648647;

    const faqData = [
        { q: "UBI란 무엇인가요?", a: "수익의 30%를 활용해 인류에게 조건 없이 지급되는 기본소득입니다." },
        { q: "6,280,000 Pi의 의미?", a: "HKWB 메인 원장의 유동성 공급 핵심 수량입니다." },
        { q: "로그인 API가 안보여요?", a: "반드시 파이 브라우저 앱을 통해 접속해야 SDK가 활성화됩니다." }
        // ... (20개 자동 생성 루프 예정)
    ];

    function updateAll() {
        const l = document.getElementById('langSelect').value;
        const isKo = l === 'ko';
        document.getElementById('txt-ledger').innerText = isKo ? "메인 자산 통합 원장" : "Main Asset Ledger";
        document.getElementById('m1').innerText = isKo ? "송금" : "Transfer";
        // (나머지 언어 변환 로직 동일)
        renderFAQ(l);
    }

    function renderFAQ(lang) {
        const container = document.getElementById('faqContainer');
        container.innerHTML = `<div style="color:var(--gold); font-weight:bold; margin-bottom:10px;">FAQ (Top 20)</div>`;
        for(let i=0; i<20; i++) {
            const item = faqData[i % faqData.length];
            container.innerHTML += `
                <div class="faq-item" onclick="toggleFaq(${i})">
                    <div class="faq-q">Q: ${item.q}</div>
                    <div class="faq-a" id="faq-a-${i}">${item.a}</div>
                </div>`;
        }
    }

    function toggleFaq(i) {
        const a = document.getElementById(`faq-a-${i}`);
        a.style.display = a.style.display === 'block' ? 'none' : 'block';
    }

    function toggleSupport() {
        const s = document.getElementById('supportArea');
        s.style.display = s.style.display === 'none' ? 'block' : 'none';
    }

    function runEngine(amt) {
        currentBalance -= amt;
        document.getElementById('main-pi-display').innerHTML = currentBalance.toLocaleString() + ` <span style="color:#fff; font-size:1.5rem;">Pi</span>`;
        alert(Math.abs(amt) + " Pi 처리 완료!");
    }

    async function loginWithPi() {
        if (typeof Pi === 'undefined') {
            alert("API가 감지되지 않습니다. 파이 브라우저로 접속해 주세요!");
            return;
        }
        try {
            const user = await Pi.authenticate(['username', 'payments'], (p) => {
                console.log("Oncomplete: ", p);
            });
            alert(user.user.username + " 형님, 환영합니다!");
        } catch (e) {
            alert("로그인 실패: " + e.message);
        }
    }

    function sendChat() {
        const input = document.getElementById('chatInput');
        const content = document.getElementById('chatContent');
        if(!input.value) return;
        content.innerHTML += `<p>[나]: ${input.value}</p>`;
        setTimeout(() => {
            content.innerHTML += `<p style="color:var(--gold)">[AI]: 형님, '${input.value}' 분석을 24개국어로 완료했습니다.</p>`;
            content.scrollTop = content.scrollHeight;
        }, 800);
        input.value = "";
    }

    setInterval(() => {
        document.getElementById('lp-total').innerText = "$ " + (baseLp + Math.floor(Math.random()*1000000)).toLocaleString();
    }, 1500);

    window.onload = () => { checkAPI(); updateAll(); };
</script>
</body>
</html>
