<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HK WORLD BANK - Master</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --hk-gold: #FFD700; --hk-dark: #000; --hk-green: #00FF00; --hk-cyan: #00FFFF; }
        body { background-color: var(--hk-dark); color: white; font-family: sans-serif; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .wrapper { width: 100%; max-width: 430px; display: flex; flex-direction: column; align-items: center; }

        /* 상단 네비 및 언어 */
        .top-nav { width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .pay-progress { color: var(--hk-green); font-weight: 900; font-size: 13px; }
        .lang-select { background: #1a1a1a; color: var(--hk-gold); border: 1.5px solid var(--hk-gold); padding: 5px; border-radius: 8px; font-weight: 900; }

        .brand { font-size: 30px; font-weight: 900; color: var(--hk-gold); margin: 15px 0; letter-spacing: 1px; }

        /* 자산 카드 */
        .asset-card { width: 100%; background: #111; border: 1px solid #333; border-radius: 20px; padding: 20px 10px; text-align: center; margin-bottom: 15px; box-sizing: border-box; }
        .asset-val { font-size: 38px; font-weight: 900; margin: 10px 0; }
        .gcv-badge { color: var(--hk-green); border: 1px solid var(--hk-green); padding: 5px 15px; border-radius: 50px; font-size: 13px; font-weight: bold; }

        /* 요청하신 Staking 및 유동성 풀 라인 */
        .status-bar { width: 100%; display: flex; justify-content: space-between; font-size: 14px; font-weight: 800; color: var(--hk-cyan); margin-bottom: 5px; padding: 0 5px; box-sizing: border-box; }

        /* 6대 메뉴 */
        .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; margin-bottom: 15px; }
        .menu-item { background: #1a1a1a; padding: 18px 5px; border-radius: 12px; text-align: center; border: 1px solid #333; cursor: pointer; }
        .menu-item i { font-size: 24px; color: var(--hk-gold); margin-bottom: 8px; display: block; }
        .menu-text { font-size: 13px; font-weight: 900; }

        /* 숫자 크기 조절 (88.4억 달러 라인) */
        .big-num { font-size: 26px; font-weight: 900; margin: 10px 0; color: #fff; letter-spacing: 1px; }

        .btn-row { width: 100%; display: flex; gap: 8px; margin-bottom: 15px; }
        .act-btn { flex: 1; padding: 15px; border-radius: 10px; border: none; font-weight: 900; cursor: pointer; font-size: 14px; }

        /* SNS 버튼 */
        .sns-btn { flex: 1; padding: 15px; border-radius: 10px; color: white !important; font-weight: 900; display: flex; align-items: center; justify-content: center; gap: 8px; text-decoration: none; cursor: pointer; }

        .security-box { background: #080808; border: 1px solid #222; border-radius: 15px; padding: 15px; width: 100%; text-align: left; margin-top: 10px; box-sizing: border-box; }
        .sec-title { color: var(--hk-cyan); font-weight: 900; margin-bottom: 10px; font-size: 16px; }
        .sec-list { font-size: 13px; color: #bbb; line-height: 1.7; list-style: none; padding: 0; margin: 0; }
        
        .rtl { direction: rtl; text-align: right; }
    </style>
</head>
<body>

<div class="wrapper" id="master-wrap">
    <div class="top-nav">
        <div class="pay-progress">STEP: <span id="p-count">0</span> / 10</div>
        <select class="lang-select" id="langSelect" onchange="changeLang()">
            <option value="ko">KOREA 🇰🇷</option>
            <option value="en">USA 🇺🇸</option>
            <option value="ar">ARAB 🇸🇦</option>
            <option value="cn">CHINA 🇨🇳</option>
            <option value="jp">JAPAN 🇯🇵</option>
            <option value="vn">VIETNAM 🇻🇳</option>
            <option value="id">INDONESIA 🇮🇩</option>
            <option value="ph">PHILIPPINES 🇵🇭</option>
            <option value="th">THAILAND 🇹🇭</option>
            <option value="my">MALAYSIA 🇲🇾</option>
            <option value="in">INDIA 🇮🇳</option>
            <option value="ru">RUSSIA 🇷🇺</option>
            <option value="de">GERMANY 🇩🇪</option>
            <option value="fr">FRANCE 🇫🇷</option>
            <option value="es">SPAIN 🇪🇸</option>
        </select>
    </div>

    <div class="brand">HK WORLD BANK</div>

    <div class="asset-card">
        <div id="t-asset" style="color:var(--hk-gold); font-weight:900; font-size:13px;">TOTAL ASSETS (GCV STANDARD)</div>
        <div class="asset-val">400.0212 <span style="font-size:20px; color:var(--hk-gold);">Pi</span></div>
        <div class="gcv-badge">VALUE: $ 125,663,600</div>
    </div>

    <div class="status-bar">
        <span>Staking 31.4%</span>
        <span>유동성 풀$</span>
    </div>

    <div class="big-num">8,841,081,960</div>

    <div class="menu-grid">
        <div class="menu-item" onclick="startPayment('Send')"><i class="fas fa-paper-plane"></i><div class="menu-text" id="m1">송금</div></div>
        <div class="menu-item" onclick="startPayment('Pay')"><i class="fas fa-shopping-cart"></i><div class="menu-text" id="m2">결제</div></div>
        <div class="menu-item" onclick="startPayment('Stake')"><i class="fas fa-piggy-bank"></i><div class="menu-text" id="m3">예치</div></div>
        <div class="menu-item" onclick="startPayment('Reward')"><i class="fas fa-gift"></i><div class="menu-text" id="m4">보상</div></div>
        <div class="menu-item" onclick="startPayment('UBI')"><i class="fas fa-hand-holding-usd"></i><div class="menu-text" id="m5">기본소득</div></div>
        <div class="menu-item" onclick="startPayment('Swap')"><i class="fas fa-sync"></i><div class="menu-text" id="m6">스왑</div></div>
    </div>

    <div class="btn-row">
        <button class="act-btn" style="background:#fff; color:#000;" id="b1">PI 수량</button>
        <button class="act-btn" style="background:var(--hk-gold); color:#000;" onclick="startPayment('SWAP')">SWAP</button>
        <button class="act-btn" style="background:var(--hk-green); color:#000;" id="b3">LP 공급</button>
    </div>

    <div class="btn-row">
        <div class="sns-btn" style="background:#f00;" onclick="openSNS('https://www.youtube.com/@hkgroup')"><i class="fab fa-youtube"></i> YOUTUBE</div>
        <div class="sns-btn" style="background:#000; border:1px solid #333;" onclick="openSNS('https://www.tiktok.com/@hkgroup')"><i class="fab fa-tiktok"></i> TIKTOK</div>
    </div>

    <div class="security-box">
        <div class="sec-title" id="t-sec">HK QUANTUM SHIELD ACTIVE</div>
        <ul class="sec-list">
            <li id="s1">◈ 개인정보보호법 준수: 양자 암호화 적용</li>
            <li id="s2">◈ 자산 보호 프로토콜 가동 중</li>
            <li id="s3">◈ HK-ROBOT: AI 실시간 위협 탐지</li>
        </ul>
    </div>
</div>

<script>
    let pStep = 0;
    // SDK 초기화 보강
    try { 
        Pi.init({ version: "2.0", sandbox: false }); 
    } catch(e) { console.log("Pi SDK Load Error"); }

    // SNS 강제 연결 함수 (파이 브라우저 대응)
    function openSNS(url) {
        try {
            window.open(url, '_blank');
        } catch(e) {
            location.href = url;
        }
    }

    // 실제 결제 프로세스
    async function startPayment(memo) {
        if(pStep >= 10) { alert("완료되었습니다, 형님!"); return; }
        try {
            const payment = await Pi.createPayment({
                amount: 1.0,
                memo: `HK WB ${memo} (${pStep+1}/10)`,
                metadata: { step: pStep+1 }
            }, {
                onReadyForServerApproval: (id) => console.log(id),
                onReadyForServerCompletion: (id, txid) => {
                    pStep++;
                    document.getElementById('p-count').innerText = pStep;
                    alert(`${pStep}회차 성공!`);
                },
                onCancel: (id) => console.log("Cancel"),
                onError: (err) => alert("파이 지갑 앱을 열어 승인 대기 목록을 확인하세요.")
            });
        } catch (e) {
            alert("파이 브라우저에서 실행 중인지 확인해 주세요.");
        }
    }

    // 15개국 데이터 시트 (아랍어 포함)
    const langSheet = {
        ko: { a:"총 자산 (GCV 기준)", m:["송금","결제","예치","보상","기본소득","스왑"], s:"HK 양자 쉴드 활성화" },
        en: { a:"TOTAL ASSETS (GCV)", m:["Send","Pay","Stake","Reward","UBI","Swap"], s:"HK QUANTUM SHIELD ACTIVE" },
        ar: { a:"إجمالي الأصول (GCV)", m:["إرسال","دفع","إيداع","مكافأة","دخل","تبادل"], s:"درع HK الكمي نشط" },
        cn: { a:"总资产 (GCV)", m:["转账","支付","存款","奖励","基本收入","交换"], s:"HK 量子盾激活" },
        jp: { a:"総資産 (GCV基準)", m:["送金","決済","預金","報酬","所得","スワップ"], s:"HK 量子シールド有効" },
        vn: { a:"TỔNG TÀI SẢN (GCV)", m:["Gửi","Thanh toán","Tiết kiệm","Thưởng","UBI","Hoán đổi"], s:"LÁ CHẮN LƯỢNG TỬ HK" },
        id: { a:"TOTAL ASET (GCV)", m:["Kirim","Bayar","Simpan","Hadiah","UBI","Swap"], s:"HK QUANTUM SHIELD AKTIF" },
        ph: { a:"KABUUANG ASSET (GCV)", m:["Ipadala","Magbayad","I-stake","Gantimpala","UBI","I-swap"], s:"HK QUANTUM SHIELD AKTIBO" },
        th: { a:"สินทรัพย์รวม (GCV)", m:["ส่ง","จ่าย","ฝาก","รางวัล","รายได้","สวอป"], s:"HK QUANTUM SHIELD เปิดใช้งาน" },
        my: { a:"JUMLAH ASET (GCV)", m:["Hantar","Bayar","Simpan","Ganjaran","UBI","Tukar"], s:"HK QUANTUM SHIELD AKTIF" },
        in: { a:"कुल संपत्ति (GCV)", m:["भेजें","भुगतान","जमा","पुरस्कार","आय","स्वैप"], s:"HK क्वांटम शील्ड सक्रिय" },
        ru: { a:"ОБЩИЕ АКТИВЫ (GCV)", m:["Отправить","Оплатить","Залог","Награда","Доход","Обмен"], s:"HK QUANTUM SHIELD АКТИВЕН" },
        de: { a:"GESAMTVERMÖGEN (GCV)", m:["Senden","Zahlen","Sparen","Belohnung","BGE","Swap"], s:"HK QUANTUM SHIELD AKTIV" },
        fr: { a:"ACTIFS TOTAUX (GCV)", m:["Envoyer","Payer","Dépôt","Prime","RBH","Swap"], s:"HK QUANTUM SHIELD ACTIF" },
        es: { a:"ACTIVOS TOTALES (GCV)", m:["Enviar","Pagar","Depósito","Premio","Renta","Canje"], s:"HK QUANTUM SHIELD ACTIVO" }
    };

    function changeLang() {
        const val = document.getElementById('langSelect').value;
        const d = langSheet[val] || langSheet.en;
        const wrap = document.getElementById('master-wrap');
        
        if(val === 'ar') wrap.classList.add('rtl');
        else wrap.classList.remove('rtl');

        document.getElementById('t-asset').innerText = d.a;
        for(let i=1; i<=6; i++) document.getElementById('m'+i).innerText = d.m[i-1];
        document.getElementById('t-sec').innerText = d.s;
    }
</script>
</body>
</html>
