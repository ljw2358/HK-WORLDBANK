        /* 형님 요청: 강렬한 원색 컬러 정의 */
        :root { --gold: #FFFF00; --hk: #FF8C00; --neon: #00FF00; --bg: #000; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: #fff; font-family: 'Noto Sans KR', sans-serif; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 550px; min-height: 100vh; padding: 40px 20px; background: #000; position: relative; border: 1px solid #111; }

        /* [1. 언어 선택 - 절대 고정 및 작동 보장] */
        .lang-nav { position: absolute; top: 30px; right: 20px; z-index: 9999; }

        header { padding: 80px 0 30px; text-align: center; }
        .logo { font-family: 'Black Han Sans', sans-serif; font-size: 55px; color: var(--hk); letter-spacing: 3px; text-shadow: 0 0 40px var(--hk); }
        .node-info { font-family: 'JetBrains Mono'; color: var(--neon); font-size: 12px; margin-top: 20px; letter-spacing: 2px; border: 2px solid var(--neon); display: inline-block; padding: 5px 20px; }

        /* [2. 메인 자산 센터] */
        .vault { border-radius: 40px; padding: 60px 20px; text-align: center; border: 3px solid #222; margin-bottom: 30px; background: radial-gradient(circle at top, #111, #000); border-top: 15px solid var(--hk); }

        .v-pi { font-family: 'JetBrains Mono'; font-size: 75px; font-weight: 900; color: var(--gold); text-shadow: 0 0 30px var(--gold); letter-spacing: -3px; }
        .v-gcv { font-family: 'JetBrains Mono'; color: var(--neon); font-size: 26px; font-weight: 900; margin-top: 30px; display: block; }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 40px; }

        .svc-box { background: #0d0d0d; border: 1px solid #1a1a1a; padding: 35px 5px; border-radius: 25px; text-align: center; }
        .svc-ico { font-size: 35px; margin-bottom: 15px; display: block; }
        .svc-txt { font-size: 13px; font-weight: 900; color: #aaa; }
