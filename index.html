<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK-WORLDBANK | GLOBAL MULTI-LANGUAGE</title>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Noto Sans KR', sans-serif; margin: 0; padding: 0; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .gold-text { color: #d4af37; font-weight: bold; }
        
        .staking-card { 
            background: linear-gradient(145deg, #0f0f0f, #1a1a1a);
            border: 1px solid #d4af37; border-radius: 20px; padding: 40px; margin: 40px 0;
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.1); text-align: center;
        }
        .lang-selector { margin-bottom: 20px; text-align: right; }
        #langSelect { background: #000; color: #d4af37; border: 1px solid #d4af37; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
        .staking-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-top: 30px; }
        input, select { 
            width: 100%; padding: 15px; background: #111; border: 1px solid #333; color: #d4af37; 
            border-radius: 8px; font-size: 1.1em;
        }
        .reward-box { background: rgba(212, 175, 55, 0.05); border-radius: 12px; padding: 20px; border: 1px dashed #d4af37; }
        .btn-gold { 
            background: linear-gradient(45deg, #d4af37, #f9e29c); color: #000; 
            border: none; padding: 20px 40px; font-size: 1.2em; font-weight: bold; 
            border-radius: 50px; cursor: pointer; transition: 0.3s; width: 100%; margin-top: 20px;
        }
        @media (max-width: 768px) { .staking-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <div class="lang-selector">
        <label class="gold-text">Language: </label>
        <select id="langSelect" onchange="changeLang()">
            <option value="ko">한국어</option>
            <option value="en">English</option>
            <option value="zh">中文</option>
            <option value="ja">日本語</option>
            <option value="vi">Tiếng Việt</option>
            <option value="id">Indonesia</option>
            <option value="th">ไทย</option>
            <option value="de">Deutsch</option>
            <option value="fr">Français</option>
            <option value="es">Español</option>
            <option value="pt">Português</option>
            <option value="ru">Русский</option>
            <option value="ar">العربية</option>
            <option value="hi">हिन्दी</option>
            <option value="bn">বাংলা</option>
            <option value="tr">Türkçe</option>
            <option value="it">Italiano</option>
            <option value="ph">Tagalog</option>
            <option value="ms">Bahasa Melayu</option>
            <option value="nl">Nederlands</option>
        </select>
    </div>

    <section class="staking-card">
        <h2 class="gold-text" id="t-title" style="font-size: 2em;">GLOBAL STAKING POOL</h2>
        <p id="t-subtitle" style="color: #aaa;">자산을 예치하고 HK Group 프로젝트에 참여하십시오.</p>
        
        <div class="staking-grid">
            <div style="text-align: left;">
                <label id="t-label-amount" style="margin-bottom: 10px; display: block;">예치할 파이 수량 (Pi)</label>
                <input type="number" id="piInput" placeholder="0.0000" oninput="calculate()">
                
                <label id="t-label-tier" style="margin-top: 20px; margin-bottom: 10px; display: block;">운용 등급 선택</label>
                <select id="tierSelect" onchange="calculate()">
                    <option value="0.05">Standard Tier (5%)</option>
                    <option value="0.10">VIP Tier (10%)</option>
                    <option value="0.15">VVIP Node Tier (15%)</option>
                </select>
            </div>
            
            <div class="reward-box">
                <p id="t-reward-label" style="margin: 0; color: #aaa;">예상 연간 보상</p>
                <h3 style="font-size: 2.5em; margin: 10px 0;" id="resultDisplay">0.0000 <span style="font-size: 0.5em;">Pi</span></h3>
                <p id="t-notice" style="font-size: 0.8em; color: #d4af37;">* 등급에 따라 Figure AI 지분 우선 배정권 부여</p>
            </div>
        </div>

        <button class="btn-gold" id="t-btn" onclick="requestStaking()">ASSET STAKING CONFIRM</button>
    </section>
</div>

<script>
    const translations = {
        ko: { title: "GLOBAL STAKING POOL", subtitle: "자산을 예치하고 HK Group 프로젝트에 참여하십시오.", amount: "예치할 파이 수량 (Pi)", tier: "운용 등급 선택", reward: "예상 연간 보상", notice: "* 등급에 따라 Figure AI 지분 우선 배정권 부여", btn: "예치 신청 확인", alert: "신청이 완료되었습니다." },
        en: { title: "GLOBAL STAKING POOL", subtitle: "Deposit assets and join the HK Group project.", amount: "Pi Amount to Deposit", tier: "Select Operation Tier", reward: "Estimated Annual Reward", notice: "* Priority rights for Figure AI shares granted by tier", btn: "CONFIRM STAKING", alert: "Staking request completed." },
        zh: { title: "全球质押池", subtitle: "存入资产并加入 HK Group 项目。", amount: "质押数量 (Pi)", tier: "选择运营等级", reward: "预计年度奖励", notice: "* 根据等级授予 Figure AI 股份优先认购权", btn: "确认质押", alert: "质押请求已完成。" },
        ja: { title: "グローバル・ステーキング・プール", subtitle: "資産を預겨て HK Group プロジェクトに参加しましょう。", amount: "預け入れ数量 (Pi)", tier: "運用ティア選択", reward: "予想年間報酬", notice: "* ティアに応じて Figure AI 株式の優先配分権を付与", btn: "ステーキングを確認", alert: "申請が完了しました。" }
        // ... (20개국어 데이터 생략, 실제 적용 시 전체 포함 가능)
    };

    function changeLang() {
        const lang = document.getElementById('langSelect').value;
        const t = translations[lang] || translations['en'];
        document.getElementById('t-title').innerText = t.title;
        document.getElementById('t-subtitle').innerText = t.subtitle;
        document.getElementById('t-label-amount').innerText = t.amount;
        document.getElementById('t-label-tier').innerText = t.tier;
        document.getElementById('t-reward-label').innerText = t.reward;
        document.getElementById('t-notice').innerText = t.notice;
        document.getElementById('t-btn').innerText = t.btn;
    }

    function calculate() {
        const amount = document.getElementById('piInput').value || 0;
        const rate = document.getElementById('tierSelect').value;
        document.getElementById('resultDisplay').innerHTML = (amount * rate).toFixed(4) + ' <span style="font-size: 0.5em;">Pi</span>';
    }

    function requestStaking() {
        const lang = document.getElementById('langSelect').value;
        alert(translations[lang]?.alert || "Success");
    }
</script>

</body>
</html>
