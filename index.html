<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HK WORLD BANK</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&family=Oswald:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #000000;
            --main-gold: #FFD700;
            --neon-green: #39FF14;
            --sub-orange: #FF8C00;
            --text-white: #FFFFFF;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: var(--text-white);
            font-family: 'Noto Sans KR', sans-serif;
            display: flex; flex-direction: column; align-items: center;
            width: 100%; overflow-x: hidden;
        }

        .container { width: 100%; max-width: 420px; display: flex; flex-direction: column; align-items: center; padding-bottom: 20px; }

        /* ✅ 언어 선택: 우측 상단 초소형 네모 박스 ✅ */
        .header-top { 
            width: 100%; 
            padding: 8px 12px 0 0; 
            display: flex; 
            justify-content: flex-end; 
            box-sizing: border-box; 
        }
        
        .lang-box {
            border: 0.8px solid var(--main-gold);
            padding: 1px 2px;
            border-radius: 2px;
            background: rgba(255, 215, 0, 0.05);
        }

        .lang-select {
            background: transparent;
            color: var(--main-gold);
            border: none;
            font-size: 8.5px;
            font-weight: bold;
            outline: none;
            cursor: pointer;
        }

        .brand-title { font-family: 'Oswald', sans-serif; font-size: 32px; color: var(--main-gold); text-align: center; margin: 0; line-height: 1.1; }
        .secure-node { color: var(--neon-green); font-size: 9px; text-align: center; margin-bottom: 8px; font-weight: bold; letter-spacing: 0.5px; }

        .asset-box { width: 92%; background: #111; border-radius: 15px; padding: 12px; text-align: center; border: 1px solid #222; }
        .ledger-label { color: var(--main-gold); font-size: 13px; margin-bottom: 8px; display: block; }
        .balance-main { font-size: 36px; font-weight: 800; margin-bottom: 8px; }
        .balance-main span { color: var(--sub-orange); font-size: 16px; }
        .gcv-value { border: 1.5px solid var(--neon-green); border-radius: 50px; padding: 6px; color: var(--neon-green); font-weight: bold; font-size: 12px; display: block; }

        /* ✅ 전 메뉴 그리드 (송금/결제/예치/리워드/소득/스왑) ✅ */
        .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 92%; margin-top: 15px; }
        .menu-item { text-align: center; }
        .menu-item .icon-box { background: #1a1a1a; width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; margin: 0 auto 4px; border: 1px solid #333; }
        .menu-item i { font-size: 18px; color: var(--main-gold); }
        .menu-item span { font-size: 10px; color: #ccc; font-weight: bold; }

        .staking-info { width: 88%; margin-top: 15px; padding-left: 10px; border-left: 2px solid var(--main-gold); align-self: flex-start; margin-left: 4%; }
        .staking-info .amount { font-size: 20px; font-weight: bold; }

        .action-btns { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; width: 92%; margin-top: 12px; }
        .btn { padding: 8px 0; border-radius: 5px; font-weight: bold; font-size: 10px; border: none; color: white; cursor: pointer; }
        .btn-gray { background: #222; border: 1px solid var(--main-gold); }
        .btn-orange { background: var(--sub-orange); }
        .btn-green { background: #2ecc71; }

        /* ✅ 고객지원 배너 슬림화 ✅ */
        .cs-slim-btn { 
            width: 92%; 
            background: linear-gradient(to right, #d35400, #c0392b); 
            color: white; 
            padding: 7px; 
            border-radius: 5px; 
            margin-top: 12px; 
            text-align: center; 
            font-weight: bold; 
            text-decoration: none; 
            font-size: 11px; 
            display: block; 
        }

        .sns-section { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 92%; margin-top: 12px; }
        .sns-card { background: #111; border-radius: 8px; padding: 6px; text-align: center; border: 1px solid #222; text-decoration: none; color: white; }
        .sns-card i { font-size: 18px; }
        
        footer { margin-top: 15px; text-align: center; font-size: 7.5px; color: #333; }
    </style>
</head>
<body>

<div class="container">
    <header class="header-top">
        <div class="lang-box">
            <select class="lang-select" onchange="applyLanguage(this.value)">
                <option value="KO">KO</option>
                <option value="CN">中文</option>
                <option value="EN">EN</option>
                <option value="JP">JP</option>
            </select>
        </div>
    </header>

    <h1 class="brand-title">HK WORLD BANK</h1>
    <div class="secure-node">🛡️ SECURE NODE: HK-V190-SUPREME</div>

    <div class="asset-box">
        <span class="ledger-label" id="ledgerText">메인 자산 통합 원장</span>
        <div class="balance-main">400.0000 <span>Pi</span></div>
        <div class="gcv-value">GCV: $ 125,663,600</div>
    </div>

    <div class="menu-grid">
        <div class="menu-item"><div class="icon-box"><i class="fa-solid fa-paper-plane"></i></div><span id="m1">송금</span></div>
        <div class="menu-item"><div class="icon-box"><i class="fa-solid fa-cart-shopping"></i></div><span id="m2">결제</span></div>
        <div class="menu-item"><div class="icon-box"><i class="fa-solid fa-vault"></i></div><span id="m3">예치</span></div>
        <div class="menu-item"><div class="icon-box"><i class="fa-solid fa-gift"></i></div><span id="m4">리워드</span></div>
        <div class="menu-item"><div class="icon-box"><i class="fa-solid fa-scale-balanced"></i></div><span id="m5">소득</span></div>
        <div class="menu-item"><div class="icon-box"><i class="fa-solid fa-rotate"></i></div><span id="m6">스왑</span></div>
    </div>

    <div class="staking-info">
        <div class="amount">88,401,773,756</div>
    </div>

    <div class="action-btns">
        <button class="btn btn-gray" id="b1">Pi 수량</button>
        <button class="btn btn-orange" id="b2">SWAP</button>
        <button class="btn btn-green" id="b3">LP 공급</button>
    </div>

    <a href="#" class="cs-slim-btn" id="csText">24/7 글로벌 고객지원센터</a>

    <div class="sns-section">
        <a href="https://youtube.com/@hyekong2025" class="sns-card"><i class="fa-brands fa-youtube" style="color:red;"></i></a>
        <a href="https://tiktok.com/@hyekong2025" class="sns-card"><i class="fa-brands fa-tiktok"></i></a>
    </div>

    <footer>© 2026 HK GROUP GLOBAL HEGEMONY</footer>
</div>

<script>
    // ✅ 언어 변동 실시간 엔진 ✅
    function applyLanguage(lang) {
        const dict = {
            'KO': {ledger:'메인 자산 통합 원장', m1:'송금', m2:'결제', m3:'예치', m4:'리워드', m5:'소득', m6:'스왑', cs:'24/7 글로벌 고객지원센터', b1:'Pi 수량'},
            'CN': {ledger:'主资产合并账本', m1:'转账', m2:'支付', m3:'存款', m4:'奖励', m5:'收益', m6:'交换', cs:'24/7 全球客户服务', b1:'Pi 数量'},
            'EN': {ledger:'Main Asset Ledger', m1:'Send', m2:'Pay', m3:'Vault', m4:'Reward', m5:'Income', m6:'Swap', cs:'24/7 Global Support', b1:'Pi Qty'},
            'JP': {ledger:'メイン資産統合台帳', m1:'送금', m2:'決済', m3:'預金', m4:'報酬', m5:'所得', m6:'スワップ', cs:'24/7 グローバルサポート', b1:'Pi 数量'}
        };
        const d = dict[lang];
        document.getElementById('ledgerText').innerText = d.ledger;
        document.getElementById('m1').innerText = d.m1;
        document.getElementById('m2').innerText = d.m2;
        document.getElementById('m3').innerText = d.m3;
        document.getElementById('m4').innerText = d.m4;
        document.getElementById('m5').innerText = d.m5;
        document.getElementById('m6').innerText = d.m6;
        document.getElementById('csText').innerText = d.cs;
        document.getElementById('b1').innerText = d.b1;
    }
</script>
</body>
</html>
