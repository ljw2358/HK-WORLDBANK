<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK WORLD BANK - Global Ecosystem</title>
    <style>
        :root { --gold: #FFD700; --dark: #000; --card: #151515; --green: #00FF00; --text: #fff; }
        body { background-color: var(--dark); color: var(--text); font-family: 'Malgun Gothic', sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        /* 상단 네비게이션 */
        .top-nav { width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; box-sizing: border-box; background: #111; border-bottom: 1px solid #333; }
        .logo-text { color: var(--gold); font-weight: 900; font-size: 14px; }
        #langSel { background: #222; color: var(--gold); border: 1px solid var(--gold); padding: 8px; border-radius: 8px; cursor: pointer; }

        /* 메인 디자인 */
        .hero { text-align: center; margin-top: 40px; }
        .main-title { font-size: 42px; font-weight: 900; color: var(--gold); letter-spacing: 2px; }
        .sub-title { font-size: 22px; font-weight: bold; margin-top: -5px; letter-spacing: 5px; opacity: 0.8; }

        /* 자산 카드 */
        .bank-card { width: 90%; max-width: 440px; background: linear-gradient(145deg, #1a1a1a, #050505); border-radius: 35px; padding: 45px 30px; margin-top: 35px; border: 1px solid #333; box-shadow: 0 30px 60px rgba(0,0,0,0.7); text-align: center; }
        .ledger-label { color: var(--gold); font-size: 17px; font-weight: bold; margin-bottom: 25px; }
        #mainBalance { font-size: 60px; font-weight: 800; color: #fff; }
        .unit-label { font-size: 30px; color: var(--gold); font-weight: bold; }

        /* GCV 뱃지 */
        .gcv-badge { border: 2px solid var(--green); border-radius: 60px; padding: 18px; color: var(--green); font-size: 17px; font-weight: bold; margin: 30px 0; background: rgba(0,255,0,0.07); }

        /* 기능 그리드 */
        .action-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 40px; }
        .action-btn { background: #1a1a1a; padding: 25px 10px; border-radius: 25px; border: 1px solid #333; cursor: pointer; }
        .action-icon { font-size: 30px; margin-bottom: 12px; display: block; }
        .action-text { font-size: 15px; font-weight: bold; color: #aaa; }

        /* 거대 버튼 */
        .grand-btn { background: linear-gradient(135deg, #FFD700 0%, #B8860B 100%); color: #000; width: 100%; padding: 25px; border-radius: 20px; border: none; font-size: 22px; font-weight: 900; cursor: pointer; margin-top: 35px; }

        /* 결제 모달 */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: #111; width: 85%; max-width: 380px; padding: 50px 40px; border-radius: 40px; border: 2px solid var(--gold); text-align: center; }
        .modal-price { font-size: 56px; font-weight: bold; color: #fff; margin: 35px 0; }
        .cancel-btn { color: #888; margin-top: 30px; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>

    <nav class="top-nav">
        <div class="logo-text">HK GROUP GLOBAL</div>
        <select id="langSel" onchange="applyLang()">
            <option value="ko">🇰🇷 한국어</option>
            <option value="en">🇺🇸 English</option>
            <option value="cn">🇨🇳 中文</option>
            <option value="jp">🇯🇵 日本語</option>
            <option value="vn">🇻🇳 Tiếng Việt</option>
            <option value="ph">🇵🇭 Tagalog</option>
            <option value="id">🇮🇩 Indonesia</option>
            <option value="th">🇹🇭 ไทย</option>
            <option value="in">🇮🇳 हिन्दी</option>
            <option value="sa">🇸🇦 العربية</option>
            <option value="ru">🇷🇺 Русский</option>
            <option value="de">🇩🇪 Deutsch</option>
            <option value="fr">🇫🇷 Français</option>
            <option value="es">🇪🇸 Español</option>
            <option value="br">🇧🇷 Português</option>
        </select>
    </nav>

    <div class="hero">
        <div class="main-title">HK WORLD BANK</div>
        <div class="sub-title" id="t-sub">BANK</div>
    </div>

    <div class="bank-card">
        <div class="ledger-label" id="t-ledger">메인 자산 통합 원장</div>
        <div>
            <span id="mainBalance">400.0212</span>
            <span class="unit-label">Pi</span>
        </div>
        
        <div class="gcv-badge" id="t-gcv">가치 평가: $ 125,663,600 (GCV)</div>

        <div class="action-grid">
            <div class="action-btn"><span class="action-icon">📤</span><span class="action-text" id="b-sn">송금</span></div>
            <div class="action-btn" onclick="openPay()"><span class="action-icon">🛒</span><span class="action-text" id="b-py">결제</span></div>
            <div class="action-btn"><span class="action-icon">📥</span><span class="action-text" id="b-sv">예치</span></div>
        </div>
        <button class="grand-btn" id="t-mbtn" onclick="openPay()">STAKING & ECOSYSTEM</button>
    </div>

    <div id="payModal" class="modal-overlay">
        <div class="modal-content">
            <h2 id="m-title" style="color:var(--gold); margin:0;">ECOSYSTEM PAYMENT</h2>
            <div class="modal-price">5.0000</div>
            <button id="confirmBtn" class="grand-btn" onclick="startPayment()">결제 승인 (Confirm)</button>
            <div class="cancel-btn" onclick="closePay()">취소 (Cancel)</div>
        </div>
    </div>

    <script>
        let balance = 400.0212;

        function openPay() { document.getElementById('payModal').style.display = 'flex'; }
        function closePay() { document.getElementById('payModal').style.display = 'none'; }

        function startPayment() {
            const btn = document.getElementById('confirmBtn');
            btn.disabled = true;
            btn.innerText = "Processing...";

            setTimeout(() => {
                balance -= 5;
                document.getElementById('mainBalance').innerText = balance.toFixed(4);
                btn.innerText = "COMPLETED";
                setTimeout(() => {
                    closePay();
                    btn.disabled = false;
                    btn.innerText = "결제 승인 (Confirm)";
                }, 1200);
            }, 800);
        }

        const i18n = {
            ko: { sub: "BANK", ledger: "메인 자산 통합 원장", gcv: "가치 평가: $ 125,663,600 (GCV)", sn: "송금", py: "결제", sv: "예치", mbtn: "스테이킹 및 생태계 참여" },
            en: { sub: "BANK", ledger: "Main Asset Ledger", gcv: "Value: $ 125,663,600 (GCV)", sn: "Send", py: "Pay", sv: "Save", mbtn: "STAKING & ECOSYSTEM" },
            cn: { sub: "银行", ledger: "主资产账本", gcv: "估值: $ 125,663,600 (GCV)", sn: "转账", py: "支付", sv: "储蓄", mbtn: "质押与生态" },
            jp: { sub: "銀行", ledger: "メイン資産元帳", gcv: "評価額: $ 125,663,600 (GCV)", sn: "送金", py: "決済", sv: "預金", mbtn: "ステーキング" },
            vn: { sub: "Ngân hàng", ledger: "Sổ cái tài sản chính", gcv: "Định giá: $ 125,663,600 (GCV)", sn: "Gửi", py: "Thanh toán", sv: "Tiết kiệm", mbtn: "Đặt cọc" },
            ph: { sub: "Bangko", ledger: "Pangunahing Ledger", gcv: "Halaga: $ 125,663,600", sn: "Ipadala", py: "Bayad", sv: "Ipon", mbtn: "STAKING" },
            id: { sub: "Bank", ledger: "Buku Besar Utama", gcv: "Nilai: $ 125,663,600", sn: "Kirim", py: "Bayar", sv: "Simpan", mbtn: "STAKING" },
            th: { sub: "ธนาคาร", ledger: "บัญชีแยกประเภทหลัก", gcv: "มูลค่า: $ 125,663,600", sn: "ส่ง", py: "จ่าย", sv: "ออม", mbtn: "STAKING" },
            in: { sub: "बैंक", ledger: "मुख्य बहीखाता", gcv: "मूल्य: $ 125,663,600", sn: "भेजें", py: "भुगतान", sv: "बचत", mbtn: "STAKING" },
            sa: { sub: "بنك", ledger: "دفتر الأستاذ الرئيسي", gcv: "القيمة: $ 125,663,600", sn: "إرسال", py: "دفع", sv: "حفظ", mbtn: "STAKING" },
            ru: { sub: "Банк", ledger: "Главная книга", gcv: "Стоимость: $ 125,663,600", sn: "Отправить", py: "Оплатить", sv: "Копить", mbtn: "СТЕЙКИНГ" },
            de: { sub: "Bank", ledger: "Hauptbuch", gcv: "Wert: $ 125,663,600", sn: "Senden", py: "Zahlen", sv: "Sparen", mbtn: "STAKING" },
            fr: { sub: "Banque", ledger: "Grand livre principal", gcv: "Valeur: $ 125,663,600", sn: "Envoyer", py: "Payer", sv: "Épargner", mbtn: "STAKING" },
            es: { sub: "Banco", ledger: "Libro mayor", gcv: "Valor: $ 125,663,600", sn: "Enviar", py: "Pagar", sv: "Ahorrar", mbtn: "STAKING" },
            br: { sub: "Banco", ledger: "Livro principal", gcv: "Valor: $ 125,663,600", sn: "Enviar", py: "Pagar", sv: "Poupar", mbtn: "STAKING" }
        };

        function applyLang() {
            const lang = document.getElementById('langSel').value;
            const d = i18n[lang] || i18n['en'];
            document.getElementById('t-sub').innerText = d.sub;
            document.getElementById('t-ledger').innerText = d.ledger;
            document.getElementById('t-gcv').innerText = d.gcv;
            document.getElementById('b-sn').innerText = d.sn;
            document.getElementById('b-py').innerText = d.py;
            document.getElementById('b-sv').innerText = d.sv;
            document.getElementById('t-mbtn').innerText = d.mbtn;
        }
    </script>
</body>
</html>
