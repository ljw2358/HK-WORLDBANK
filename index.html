<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HK WORLD BANK</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; padding: 0; background: #000; color: #fff; 
            font-family: sans-serif; overflow-x: hidden; display: flex; justify-content: center;
        }
        .wrapper {
            width: 100%; max-width: 450px; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            padding: 20px 15px; position: relative;
        }
        /* 언어 선택창: 우측 상단 조그맣게 */
        #google_translate_element {
            align-self: flex-end; margin-bottom: 10px; z-index: 9999;
            transform: scale(0.85); transform-origin: right;
        }
        .goog-te-banner-frame.skiptranslate { display: none !important; }
        .brand { width: 100%; color: #ffc107; font-size: 1.4rem; font-weight: bold; margin-bottom: 20px; }
        .card {
            width: 100%; background: #1a1a1a; border-radius: 15px;
            padding: 25px 15px; text-align: center; border: 1px solid #333; margin-bottom: 20px;
        }
        .gcv-badge {
            display: inline-block; border: 1px solid #00e676; color: #00e676;
            padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; margin-top: 10px;
        }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; margin-bottom: 20px; }
        .btn {
            background: #2a2a2a; padding: 18px 5px; border-radius: 10px;
            text-align: center; font-weight: bold; font-size: 0.9rem; cursor: pointer; border: none; color: #fff;
        }
        .input-box { width: 100%; margin-bottom: 15px; }
        .input-label { color: #00e676; font-size: 0.85rem; font-weight: bold; margin-bottom: 8px; display: block; }
        .num-field {
            width: 100%; padding: 15px; background: #222; border: 1px solid #444;
            border-radius: 10px; color: #fff; font-size: 1.2rem; text-align: center; outline: none;
        }
        .btn-yellow { background: #ffc107; color: #000; }
        .btn-green { background: #00e676; color: #000; }
        .btn-pink { background: #ff4081; grid-column: span 2; margin-top: 5px; }
    </style>
</head>
<body>

<div class="wrapper">
    <div id="google_translate_element"></div>
    <div class="brand">HK WORLD BANK</div>

    <div class="card">
        <div style="color:#888; font-size:0.85rem;">Main Asset Integrated Ledger</div>
        <div style="font-size:2.4rem; font-weight:bold; margin:10px 0;">00.0247 <span style="font-size:1.2rem;">Pi</span></div>
        <div class="gcv-badge">Value: $ 125,663,600 (GCV Estimate)</div>
    </div>

    <div class="grid">
        <div class="btn" onclick="payStep10()">🛒 Pay (10회 테스트)</div>
        <div class="btn">💰 Staking (예치)</div>
        <div class="btn">🌍 UBI (기본소득)</div>
        <div class="btn">🔄 Swap (스왑)</div>
    </div>

    <div class="input-box">
        <label class="input-label">Add Liquidity (LP 공급 수량 입력)</label>
        <input type="number" id="lp_val" class="num-field" placeholder="0.00">
    </div>

    <div class="grid">
        <div class="btn btn-yellow">SWAP</div>
        <div class="btn btn-green" onclick="confirmLP()">Add LP (공급 확정)</div>
        <div class="btn" style="background:#cc0000;">▶ YOUTUBE</div>
        <div class="btn" style="background:#000; border:1px solid #444;">♪ TIKTOK</div>
        <div class="btn btn-pink">🎧 Global Support Center (고객지원센터)</div>
    </div>
</div>

<script>
    const Pi = window.Pi;
    Pi.init({ version: "2.0", sandbox: false });

    async function payStep10() {
        try {
            await Pi.authenticate(['payments']);
            for(let i=1; i<=10; i++) {
                await Pi.createPayment({
                    amount: 0.0001,
                    memo: "HK WORLD BANK TEST #" + i,
                    metadata: { step: i }
                }, {
                    onReadyForServerApproval: (id) => console.log("승인대기:"+id),
                    onReadyForServerCompletion: (id, txid) => console.log("완료:"+txid),
                    onCancel: (id) => {}, onError: (e) => {}
                });
                await new Promise(r => setTimeout(r, 1000));
            }
        } catch (e) { alert("인증 실패"); }
    }

    function confirmLP() {
        const amt = document.getElementById('lp_val').value;
        if(!amt) return alert("수량을 넣어주세요");
        alert(amt + " Pi 공급 완료");
    }

    function googleTranslateElementInit() {
        new google.translate.TranslateElement({
            pageLanguage: 'ko',
            /* 형님이 정해주신 14개국어 순서 반영 */
            includedLanguages: 'ko,en,zh-CN,ar,hi,es,pt,uk,ja,ru,vi,th,de,fr',
            layout: google.translate.TranslateElement.InlineLayout.SIMPLE
        }, 'google_translate_element');
    }
</script>
<script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
