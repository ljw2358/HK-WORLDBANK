<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK WORLD BANK | FINAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #000; --gold: #FFD700; --neon: #39FF14; --orange: #FF8C00; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Noto Sans KR', sans-serif; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 500px; padding: 20px; position: relative; }

        /* 우측 상단 아주 작은 언어 선택 네모 */
        .lang-corner { position: absolute; top: 10px; right: 10px; z-index: 999; }
        .lang-select { background: #111; color: var(--gold); border: 1px solid #555; font-size: 10px; padding: 2px; width: 45px; border-radius: 2px; }

        .title { font-family: 'Oswald', sans-serif; font-size: 40px; color: var(--gold); text-align: center; margin: 30px 0; }
        
        /* 자산 정보 */
        .asset-card { width: 100%; background: #0a0a0a; border-radius: 15px; padding: 35px 0; text-align: center; margin-bottom: 25px; border: 1px solid #222; }
        .ledger-txt { color: var(--gold); font-size: 14px; font-weight: bold; margin-bottom: 10px; display: block; }
        .balance { font-size: 45px; font-weight: 900; }
        .gcv-label { border: 2px solid var(--neon); border-radius: 50px; padding: 10px 20px; color: var(--neon); font-weight: 900; font-size: 14px; display: inline-block; margin-top: 20px; }

        /* 메뉴 격자 (예치 APR 포함) */
        .grid-6 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; margin-bottom: 30px; }
        .menu-item { background: #111; padding: 20px 0; border-radius: 10px; text-align: center; border: 1px solid #222; position: relative; }
        .menu-item i { font-size: 24px; margin-bottom: 8px; display: block; color: #4facfe; }
        .menu-item span { font-size: 12px; font-weight: bold; }
        .apr-badge-mini { position: absolute; top: 5px; right: 5px; background: var(--gold); color: #000; font-size: 8px; font-weight: 900; padding: 1px 3px; border-radius: 2px; }

        /* 유동성 풀 */
        .liq-card { width: 100%; background: #080808; border-left: 5px solid var(--gold); padding: 20px; border-radius: 0 10px 10px 0; margin-bottom: 30px; box-sizing: border-box; }
        .liq-top { display: flex; justify-content: space-between; align-items: center; }
        .apr-tag { background: var(--gold); color: #000; padding: 3px 8px; border-radius: 4px; font-size: 12px; font-weight: 900; }
        .liq-val { font-size: 28px; font-weight: 900; margin-top: 10px; }

        /* 하단 버튼 */
        .btn-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; width: 100%; margin-bottom: 30px; }
        .btn { padding: 15px 0; border-radius: 8px; font-weight: 900; font-size: 12px; border: none; color: #fff; cursor: pointer; }
        .btn-k { background: #000; border: 1.5px solid var(--gold); }
        .btn-o { background: var(--orange); }
        .btn-g { background: #28a745; }

        /* ✅ 최하단 미디어 엔진 (강제 구동 방식) */
        .media-footer { width: 100%; background: #000; border: 1px solid #333; border-radius: 12px; overflow: hidden; margin-bottom: 40px; }
        .tab-menu { display: flex; background: #111; }
        .tab-link { flex: 1; padding: 12px; border: none; color: #666; font-size: 12px; font-weight: bold; cursor: pointer; }
        .tab-link.active { color: #fff; background: #000; border-bottom: 2px solid var(--gold); }
        .video-player { width: 100%; aspect-ratio: 16/9; }
        iframe { width: 100%; height: 100%; border: none; }

        footer { text-align: center; font-size: 9px; color: #444; padding: 20px 0; border-top: 1px solid #111; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="lang-corner">
        <select class="lang-select" id="langBox">
            <option value="ko">KO</option>
            <option value="en">EN</option>
            <option value="zh">ZH</option>
            <option value="ja">JA</option>
            <option value="ru">RU</option>
            <option value="ar">AR</option>
            <option value="es">ES</option>
        </select>
    </div>

    <h1 class="title">HK WORLD BANK</h1>

    <div class="asset-card">
        <span class="ledger-txt" data-key="ledger">메인 자산 통합 원장</span>
        <div class="balance">400.0000 <span style="color:var(--orange)">Pi</span></div>
        <div class="gcv-label" data-key="gcv">가치 평가: $ 125,663,600 (GCV)</div>
    </div>

    <div class="grid-6">
        <div class="menu-item"><i class="fa-solid fa-paper-plane"></i><span data-key="m1">송금</span></div>
        <div class="menu-item"><i class="fa-solid fa-cart-shopping"></i><span data-key="m2">결제</span></div>
        <div class="menu-item">
            <div class="apr-badge-mini">31.4%</div>
            <i class="fa-solid fa-vault"></i><span data-key="m3">예치</span>
        </div>
        <div class="menu-item"><i class="fa-solid fa-gift" style="color:#ff4d4d"></i><span data-key="m4">보상</span></div>
        <div class="menu-item"><i class="fa-solid fa-scale-balanced" style="color:var(--gold)"></i><span data-key="m5">소득</span></div>
        <div class="menu-item"><i class="fa-solid fa-arrows-rotate" style="color:var(--blue)"></i><span data-key="m6">스왑</span></div>
    </div>

    <div class="liq-card">
        <div class="liq-top">
            <div class="liq-title" data-key="liq" style="color:var(--orange); font-weight:bold;">유동성 풀 총액 ($)</div>
            <div class="apr-tag">APR 31.4%</div>
        </div>
        <div class="liq-val">88,401,773,756</div>
    </div>

    <div class="btn-row">
        <button class="btn btn-k" data-key="b1">Pi 수량</button>
        <button class="btn btn-o" data-key="b2">SWAP</button>
        <button class="btn btn-g" data-key="b3">LP 공급</button>
    </div>

    <div class="media-footer">
        <div class="tab-menu">
            <button class="tab-link active" onclick="loadVideo('yt', this)">YOUTUBE</button>
            <button class="tab-link" onclick="loadVideo('tk', this)">TIKTOK</button>
        </div>
        <div class="video-player">
            <iframe id="ifr" src="https://www.youtube.com/embed/videoseries?list=PLtY6C7V6q3F7wWJ1fE-7p-oE066f2Y7uE" allowfullscreen></iframe>
        </div>
    </div>

    <footer>
        © 2026 HK GROUP GLOBAL HEGEMONY.<br>
        CHAIRMAN LEE JAEWAN.
    </footer>
</div>

<script>
    const dictionary = {
        ko: {ledger:'메인 자산 통합 원장', gcv:'가치 평가: $ 125,663,600 (GCV)', m1:'송금', m2:'결제', m3:'예치', m4:'보상', m5:'소득', m6:'스왑', liq:'유동성 풀 총액 ($)', b1:'Pi 수량', b2:'SWAP', b3:'LP 공급'},
        en: {ledger:'Main Asset Ledger', gcv:'Value: $ 125,663,600 (GCV)', m1:'Transfer', m2:'Pay', m3:'Stake', m4:'Reward', m5:'Income', m6:'Swap', liq:'Total Liquidity ($)', b1:'Pi Qty', b2:'SWAP', b3:'Add LP'},
        zh: {ledger:'主资产总账', gcv:'价值: $ 125,663,600', m1:'转账', m2:'支付', m3:'质押', m4:'奖励', m5:'收益', m6:'交易', liq:'总流动性 ($)', b1:'Pi 数量', b2:'SWAP', b3:'LP 供应'},
        ja: {ledger:'メイン資産台帳', gcv:'評価額: $ 125,663,600', m1:'送金', m2:'決済', m3:'預金', m4:'報酬', m5:'所得', m6:'交換', liq:'流動性プール ($)', b1:'Pi 数量', b2:'SWAP', b3:'LP 供給'},
        ar: {ledger:'دفتر الأصول الرئيسي', gcv:'القيمة: $ 125,663,600', m1:'إرسال', m2:'دفع', m3:'إيداع', m4:'مكافأة', m5:'دخل', m6:'تبادل', liq:'إجمالي السيولة ($)', b1:'كمية Pi', b2:'SWAP', b3:'توفير LP'},
        es: {ledger:'Libro Mayor', gcv:'Valor: $ 125,663,600', m1:'Enviar', m2:'Pagar', m3:'Stake', m4:'Premio', m5:'Ingreso', m6:'Canje', liq:'Liquidez ($)', b1:'Pi Cant.', b2:'SWAP', b3:'Suministro LP'}
    };

    // ✅ 언어 변동 강제 실행 함수
    document.getElementById('langBox').addEventListener('change', function() {
        const lang = this.value;
        const dict = dictionary[lang] || dictionary['en'];
        document.querySelectorAll('[data-key]').forEach(el => {
            const key = el.getAttribute('data-key');
            if (dict[key]) el.innerText = dict[key];
        });
    });

    // ✅ 미디어 구동 함수
    function loadVideo(type, btn) {
        const ifr = document.getElementById('ifr');
        document.querySelectorAll('.tab-link').forEach(l => l.classList.remove('active'));
        btn.classList.add('active');
        if(type === 'yt') {
            ifr.src = "https://www.youtube.com/embed/videoseries?list=PLtY6C7V6q3F7wWJ1fE-7p-oE066f2Y7uE";
        } else {
            // 보안 문제 해결을 위해 틱톡 임베드 주소로 교체
            ifr.src = "https://www.tiktok.com/embed/v2/7101625480436157722";
        }
    }
</script>
</body>
</html>
