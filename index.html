<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HK-WorldBank Main Ledger</title>
    <style>
        :root {
            --primary-gold: #D4AF37;
            --deep-black: #0a0a0a;
            --accent-blue: #007bff;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: var(--deep-black);
            color: white;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }
        /* 화면 자동 맞춤 컨테이너 */
        .container {
            width: 100%;
            max-width: 600px; /* 모바일 최적화 */
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }
        h1 { color: var(--primary-gold); font-size: 1.8rem; margin-bottom: 30px; }
        
        /* 언어 선택 드롭다운 (20개국어) */
        .lang-select {
            background: #222;
            color: #fff;
            border: 1px solid var(--primary-gold);
            padding: 10px;
            width: 80%;
            margin-bottom: 20px;
            border-radius: 5px;
        }

        /* 예치 정보 섹션 */
        .staking-box {
            background: linear-gradient(145deg, #1a1a1a, #000);
            border: 2px solid var(--primary-gold);
            padding: 25px;
            border-radius: 15px;
            margin: 20px 0;
        }
        .apy { font-size: 2.5rem; color: var(--primary-gold); font-weight: bold; }

        /* 소셜 미디어 버튼 (대소문자 및 컬러 적용) */
        .social-links { display: flex; flex-direction: column; gap: 15px; margin-top: 30px; }
        .btn {
            text-decoration: none;
            padding: 15px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 1.1rem;
            transition: 0.3s;
        }
        /* 유튜브: H 대문자 */
        .btn-youtube { background-color: #FF0000; color: white; }
        /* 틱톡: h 소문자 */
        .btn-tiktok { background-color: #000000; color: white; border: 1px solid #00f2ea; }

        /* 하단 푸터 */
        footer { margin-top: 50px; font-size: 0.8rem; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <h1>Main Asset Integrated Ledger</h1>

    <select class="lang-select" id="languageSelector">
        <option value="ko">한국어 (Korean)</option>
        <option value="en">English</option>
        <option value="zh">中文 (Chinese)</option>
        <option value="ar">العربية (Arabic)</option>
        <option value="es">Español (Spanish)</option>
        <option value="pt">Português (Portuguese)</option>
        <option value="uk">Українська (Ukrainian)</option>
        <option value="ru">Русский (Russian)</option>
        <option value="ja">日本語 (Japanese)</option>
        <option value="fr">Français (French)</option>
        <option value="de">Deutsch (German)</option>
        <option value="hi">हिन्दी (Hindi)</option>
        <option value="vi">Tiếng Việt (Vietnamese)</option>
        <option value="id">Bahasa Indonesia</option>
        <option value="th">ไทย (Thai)</option>
        <option value="tr">Türkçe (Turkish)</option>
        <option value="it">Italiano (Italian)</option>
        <option value="pl">Polski (Polish)</option>
        <option value="nl">Nederlands (Dutch)</option>
        <option value="fa">فارسی (Persian)</option>
    </select>

    <div class="staking-box">
        <p>HK-WorldBank Staking</p>
        <div class="apy">31.4% APY</div>
        <p>Annual Percentage Yield</p>
    </div>

    <div class="social-links">
        <a href="https://youtube.com/@HK-Group" class="btn btn-youtube">YouTube</a>
        <a href="https://tiktok.com/@hk-group" class="btn btn-tiktok">tiktok</a>
    </div>

    <footer>
        © 2026 HK Group. All Rights Reserved.<br>
        Contact: info@hkholdings.ai.kr
    </footer>
</div>

<script>
    // 화면 크기 자동 맞춤 및 언어 변환 스크립트 (기초 프레임)
    document.getElementById('languageSelector').addEventListener('change', function() {
        const lang = this.value;
        // 선택된 언어에 따른 텍스트 변경 로직 추가 가능
        console.log("Language changed to: " + lang);
    });
</script>

</body>
</html>
