<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK WORLD BANK - Global Industrial Leader</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --hk-gold: #FFD700; --hk-dark: #000000; --hk-green: #00FF00;
            --hk-red: #FF3B30; --hk-blue: #007AFF; --hk-orange: #FF9500;
            --hk-purple: #AF52DE; --hk-cyan: #00F2FF;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--hk-dark); color: white; font-family: 'Pretendard', sans-serif; display: flex; justify-content: center; }
       
        .container { width: 100%; max-width: 1200px; padding: 40px 20px; }
       
        /* 상단 바 & 언어 선택 */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid #222; }
        .logo { font-size: 32px; font-weight: 900; color: var(--hk-gold); }
        .lang-btn { background: #111; color: white; border: 1px solid var(--hk-gold); padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 16px; }

        /* 메인 전광판 */
        .dashboard { background: #0a0a0a; margin: 30px 0; padding: 60px 20px; border-radius: 30px; text-align: center; border: 1px solid #333; }
        .label { color: var(--hk-gold); font-size: 22px; font-weight: bold; margin-bottom: 15px; }
        .amount { font-size: 90px; font-weight: 900; letter-spacing: -2px; }
        .pi { color: var(--hk-gold); font-size: 45px; margin-left: 10px; }
        .gcv { display: inline-block; padding: 15px 40px; border-radius: 50px; border: 2px solid var(--hk-green); color: var(--hk-green); font-size: 24px; font-weight: bold; margin-top: 25px; }

        /* 메뉴 그리드 */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 30px; }
        .item { background: #111; padding: 40px; border-radius: 20px; text-align: center; border: 1px solid #222; cursor: pointer; transition: 0.3s; }
        .item:hover { border-color: var(--hk-gold); background: #181818; }
        .item i { font-size: 35px; margin-bottom: 15px; display: block; }
        .item span { font-size: 20px; font-weight: 600; }

        /* 유동성 풀 정보 */
        .lp-box { background: #0d0d0d; padding: 35px; border-radius: 20px; margin-top: 30px; border-left: 6px solid var(--hk-gold); }
        .lp-box .title { color: var(--hk-gold); font-size: 18px; font-weight: bold; }
        .lp-box .val { font-size: 55px; font-weight: 800; margin-top: 10px; }

        /* 유튜브 & 틱톡 버튼 (구동 해결) */
        .social-btns { display: flex; gap: 20px; margin: 40px 0; }
        .social-btns a { flex: 1; padding: 25px; border-radius: 15px; text-decoration: none; color: white; font-weight: bold; font-size: 22px; display: flex; align-items: center; justify-content: center; gap: 12px; }
        .btn-yt { background: #FF0000; }
        .btn-tk { background: #000; border: 1px solid #444; }

        /* 형님이 요청하신 예치 APY */
        .apy-section { text-align: center; padding: 60px 0; border-top: 1px solid #333; }
        .apy-text { color: var(--hk-gold); font-size: 40px; font-weight: 900; }

        /* 양자 보안 시스템 */
        .shield-box { background: rgba(0, 242, 255, 0.05); padding: 35px; border-radius: 20px; border: 1px solid var(--hk-cyan); margin-top: 40px; }
        .shield-title { color: var(--hk-cyan); font-size: 20px; font-weight: bold; margin-bottom: 20px; }
        .shield-list { list-style: none; color: #ccc; font-size: 18px; line-height: 2; }

    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo">HK WORLD BANK</div>
        <select class="lang-btn" id="langSelect" onchange="translatePage()">
            <option value="ko">한국어 🇰🇷</option>
            <option value="en">English 🇺🇸</option>
            <option value="zh">中文 🇨🇳</option>
        </select>
    </div>

    <div class="dashboard">
        <div class="label" id="l-ledger">메인 자산 통합 원장</div>
        <div class="amount">400.0212 <span class="pi">Pi</span></div>
        <div class="gcv" id="l-gcv">가치 평가: $ 125,663,600 (GCV)</div>
    </div>

    <div class="grid">
        <div class="item"><i class="fas fa-paper-plane" style="color:var(--hk-blue)"></i><span data-key="send">송금</span></div>
        <div class="item"><i class="fas fa-shopping-cart" style="color:var(--hk-orange)"></i><span data-key="pay">결제</span></div>
        <div class="item"><i class="fas fa-piggy-bank" style="color:var(--hk-gold)"></i><span data-key="save">예치</span></div>
    </div>

    <div class="lp-box">
        <div class="title" id="l-lp">STAKING 31.4% | 유동성 풀 $</div>
        <div class="val">88,401,819,601</div>
    </div>

    <div class="social-btns">
        <a href="https://www.youtube.com/@Hyekong2025" target="_blank" class="btn-yt">
            <i class="fab fa-youtube"></i> YOUTUBE
        </a>
        <a href="https://www.tiktok.com/@hyekong2025" target="_blank" class="btn-tk">
            <i class="fab fa-tiktok"></i> TIKTOK
        </a>
    </div>

    <div class="shield-box">
        <div class="shield-title"><i class="fas fa-shield-halved"></i> HK QUANTUM SHIELD ACTIVE</div>
        <ul class="shield-list">
            <li id="s1">개인정보보호법 준수: 양자 암호화 보안 적용</li>
            <li id="s2">Form of Private: 자산 보호 프로토콜 가동</li>
            <li id="s3">HK-ROBOT: AI 실시간 위협 탐지 중</li>
        </ul>
    </div>

    <div class="apy-section">
        <div class="apy-text" id="l-apy">예치 (APY 31.4%)</div>
    </div>
</div>

<script>
    const translations = {
        ko: { ledger: "메인 자산 통합 원장", gcv: "가치 평가: $ 125,663,600 (GCV)", send: "송금", pay: "결제", save: "예치", lp: "유동성 풀 $", apy: "예치 (APY 31.4%)", s1: "개인정보보호법 준수: 양자 암호화 보안 적용", s2: "Form of Private: 자산 보호 프로토콜 가동", s3: "HK-ROBOT: AI 실시간 위협 탐지 중" },
        en: { ledger: "Main Asset Ledger", gcv: "Value: $ 125,663,600 (GCV)", send: "Transfer", pay: "Payment", save: "Deposit", lp: "Liquidity Pool $", apy: "Deposit (APY 31.4%)", s1: "Privacy: Quantum Encryption Active", s2: "Form of Private: Asset Protection Active", s3: "HK-ROBOT: AI Threat Detection" },
        zh: { ledger: "主资产整合账本", gcv: "价值评估: $ 125,663,600 (GCV)", send: "转账", pay: "支付", save: "存款", lp: "流动性池 $", apy: "存款 (APY 31.4%)", s1: "隐私合规：量子加密激活", s2: "Form of Private: 资产保护协议", s3: "HK-ROBOT: AI威胁实时监测" }
    };

    function translatePage() {
        const lang = document.getElementById('langSelect').value;
        const data = translations[lang];
       
        document.getElementById('l-ledger').innerText = data.ledger;
        document.getElementById('l-gcv').innerText = data.gcv;
        document.getElementById('l-lp').innerText = `STAKING 31.4% | ${data.lp}`;
        document.getElementById('l-apy').innerText = data.apy;
        document.getElementById('s1').innerText = data.s1;
        document.getElementById('s2').innerText = data.s2;
        document.getElementById('s3').innerText = data.s3;
       
        document.querySelectorAll('[data-key]').forEach(el => {
            el.innerText = data[el.getAttribute('data-key')];
        });
    }
</script>

</body>
</html>
