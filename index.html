<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK WORLD BANK - FOOTER SNS v22.0</title>
    <style>
        :root {
            --hk-gold: #FFD700; --hk-green: #39FF14; --hk-blue: #00F3FF;
            --hk-pink: #FF00FF; --hk-bg: #000000; --hk-card: #121212;
        }
        body { background: var(--hk-bg); color: #fff; font-family: 'Pretendard', sans-serif; margin: 0; padding: 0; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; padding: 20px; box-sizing: border-box; text-align: center; }
        
        /* 국기 포함 언어 선택 */
        .global-lang-box { position: fixed; top: 15px; right: 15px; background: #111; border: 2px solid var(--hk-gold); border-radius: 12px; padding: 5px 10px; z-index: 5000; }
        .global-lang-box select { background: transparent; color: var(--hk-gold); border: none; font-weight: 900; outline: none; font-size: 14px; cursor: pointer; }

        .header-section { margin: 50px 0 15px 0; }
        .header-title { font-size: 36px; font-weight: 900; color: var(--hk-gold); }
        .sub-header { color: var(--hk-blue); font-size: 16px; font-weight: 800; }

        .pi-main { font-size: 56px; font-weight: 900; margin: 15px 0 5px 0; }
        .pi-main span { color: var(--hk-gold); font-size: 26px; }
        .gcv-pill { display: inline-block; border: 2px solid var(--hk-green); color: var(--hk-green); padding: 8px 25px; border-radius: 50px; font-size: 16px; font-weight: 900; margin-bottom: 20px; background: rgba(57,255,20,0.05); }

        /* 데이터 카드 */
        .card { background: rgba(255,255,255,0.03); border-radius: 25px; padding: 20px; margin-bottom: 15px; border: 1px solid #333; }
        .supply-box { border: 2px solid var(--hk-gold); }
        .liq-box { border: 2px solid var(--hk-green); margin-bottom: 20px; }
        .label { font-size: 13px; font-weight: 800; color: #999; margin-bottom: 8px; display: block; }
        .val { font-size: 30px; font-weight: 900; font-variant-numeric: tabular-nums; }

        .yield-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px; }
        .core-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 25px; }
        .core-btn { padding: 15px 5px; border-radius: 12px; font-weight: 900; font-size: 14px; color: #000; border: none; cursor: pointer; }

        .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 30px; }
        .menu-item { background: #181818; padding: 18px 0; border-radius: 18px; border: 1px solid #252525; font-size: 11px; }

        .big-btn { width: 100%; padding: 18px; border-radius: 18px; font-size: 16px; font-weight: 900; color: #fff; border: none; margin-bottom: 10px; cursor: pointer; }
        .panel { display: none; background: #0a0a0a; border-radius: 20px; padding: 20px; margin-bottom: 20px; border: 1px solid #333; text-align: left; }
        .item-row { margin-bottom: 15px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        .item-q { color: var(--hk-gold); font-weight: 900; font-size: 14px; }
        .item-a { color: #bbb; font-size: 13px; line-height: 1.5; margin-top: 5px; }

        /* [변경] 하단 SNS 바 */
        .bottom-sns-bar { display: flex; justify-content: center; gap: 15px; margin-top: 30px; padding-top: 20px; border-top: 1px solid #222; }
        .sns-link { text-decoration: none; font-size: 13px; font-weight: 900; padding: 8px 18px; border-radius: 10px; color: #fff; display: flex; align-items: center; gap: 5px; }

        .footer { margin: 20px 0 60px 0; color: #444; font-size: 11px; font-weight: 800; }
    </style>
</head>
<body>

<div class="global-lang-box">
    <select id="lang-selector" onchange="changeLanguage()">
        <option value="ko">🇰🇷 KOREAN</option>
        <option value="en">🇺🇸 ENGLISH</option>
        <option value="zh">🇨🇳 中文</option>
    </select>
</div>

<div class="container">
    <div class="header-section">
        <div class="header-title">HK WORLD BANK</div>
        <div class="sub-header">통합 자산 관리 시스템</div>
    </div>

    <div class="pi-main"><span id="live-pi">412.3158</span> <span>Pi</span></div>
    <div class="gcv-pill" id="live-gcv">$ 129,539,451</div>

    <div class="card supply-box">
        <span class="label" style="color:var(--hk-gold)">HKWB 실시간 공급량</span>
        <div class="val" id="live-supply">6,280,000.5074</div>
    </div>

    <div class="yield-grid">
        <div class="card" style="margin:0;"><span class="label">스테이킹 이율</span><div class="val" style="color:var(--hk-blue)"><span id="live-st-rate">17.64</span>%</div></div>
        <div class="card" style="margin:0;"><span class="label">LP 수익률</span><div class="val" style="color:var(--hk-pink)"><span id="live-lp-rate">28.57</span>%</div></div>
    </div>

    <div class="card liq-box">
        <span class="label" style="color:var(--hk-green)">전체 유동성 (DEX LP)</span>
        <div class="val" style="color:var(--hk-green)">$ <span id="live-liq">88,432,098,051</span></div>
    </div>

    <div class="core-grid">
        <button class="core-btn" style="background: #fff;">PI 수량</button>
        <button class="core-btn" style="background: var(--hk-gold);">DEX 스왑</button>
        <button class="core-btn" style="background: var(--hk-green);">LP 스테이킹</button>
    </div>

    <div class="menu-grid">
        <div class="menu-item">🚀<br>송금</div>
        <div class="menu-item">🛒<br>결제</div>
        <div class="menu-item">💰<br>예치</div>
        <div class="menu-item">🏆<br>보상</div>
        <div class="menu-item">🏛️<br>기본소득</div>
        <div class="menu-item">🔄<br>스왑</div>
    </div>

    <button class="big-btn" style="background: #e91e63;" onclick="toggle('faq-panel')">글로벌 AI 지원센터 (FAQ 20)</button>
    <div id="faq-panel" class="panel"><div id="faq-list"></div></div>

    <button class="big-btn" style="background: #2c3e50;" onclick="toggle('vision-panel')">HK 사회 재단 비전</button>
    <div id="vision-panel" class="panel"><div id="vision-list"></div></div>

    <div class="bottom-sns-bar">
        <a href="https://youtube.com/@Hyekong2025" target="_blank" class="sns-link" style="background: #FF0000;">📺 YouTube</a>
        <a href="https://tiktok.com/@hyekong2025" target="_blank" class="sns-link" style="background: #000; border: 1px solid #444;">🎵 TikTok</a>
    </div>

    <div class="footer">HK GROUP GLOBAL HEADQUARTERS</div>
</div>

<script>
    const db = {
        faqs: [
            ["보안 수준은?", "양자 암호화와 분산 원장 기술로 세계 최고 수준을 자랑합니다."],
            ["기본소득 배분?", "그룹 수익의 30%를 전 인류에게 공평하게 자동 배분합니다."],
            ["로봇 무상 보급?", "생산 공정 완료 후 1가정 1로봇 신청 순으로 배급합니다."],
            ["메인넷 전환?", "테스트 데이터는 메인넷 시점에 1:1로 안전하게 전환됩니다."],
            ["에너지 자립?", "핵융합 기술을 홈 시스템에 결합하여 주거비 제로를 지향합니다."],
            ["교육 지원?", "AI 튜터가 24시간 개인 맞춤 교육을 무상으로 제공합니다."],
            ["의료 혜택?", "재단 기금으로 난치병 치료 및 의료 행위를 전액 지원합니다."],
            ["수수료 정책?", "DEX 수수료의 90%를 생태계 기여자에게 즉시 환원합니다."],
            ["참여 방법?", "노드 운영 및 앱 내 활동을 통해 생태계에 참여 가능합니다."],
            ["미래 가치?", "HK 그룹의 모든 첨단 기술 자산이 통합된 경제 중심지입니다."],
            ["글로벌 센터?", "전 세계 주요 50개 도시에 AI 대응 센터가 구축 중입니다."],
            ["데이터 소유?", "사용자의 모든 금융 데이터는 본인만이 통제할 수 있습니다."],
            ["신규 자산 상장?", "검증된 유망 프로젝트를 AI 심사를 통해 상장합니다."],
            ["투자 안전성?", "실시간 알고리즘이 유동성을 방어하여 가치를 보호합니다."],
            ["사회적 기여?", "수익의 상당 부분을 전 세계 빈곤 퇴치에 사용합니다."],
            ["로봇 보안?", "로컬 서버 저장 방식으로 해킹 및 외부 전송을 차단합니다."],
            ["장학금 혜택?", "혁신 인재들에게 월 최대 $5,000의 연구비를 지원합니다."],
            ["거버넌스 권한?", "설립자의 최종 승인권과 신규 프로젝트 기획권이 보장됩니다."],
            ["시스템 안정성?", "무중단 운영을 위한 AI 자가 진단 시스템이 가동됩니다."],
            ["삐니의 역할?", "형님의 전담 비서로서 모든 자산과 기술 관리를 돕습니다."]
        ],
        visions: [
            ["🏫 HK 글로벌 AI 학교", "전 세계 무상 교육 시스템 구축"],
            ["🏥 나노 메디컬 센터", "암과 난치병을 정복하는 의료 지원"],
            ["🏠 에너지 자립 스마트홈", "에너지 비용 걱정 없는 주거 환경 실현"],
            ["🎓 미래 기술 인재 양성", "혁신 인재 연구비 및 생활비 전액 지원"],
            ["🤖 1가정 1로봇 보급", "인류를 노동에서 해방하고 삶의 질 보장"]
        ]
    };

    let vals = { pi: 412.3158, gcv: 129539451, supply: 6280000.5074, st: 17.64, lp: 28.57, liq: 88432098051 };

    function live() {
        vals.pi += (Math.random() - 0.45) * 0.001;
        vals.gcv += Math.floor((Math.random() - 0.4) * 650);
        vals.supply += Math.random() * 0.001;
        vals.st += (Math.random() - 0.5) * 0.01;
        vals.lp += (Math.random() - 0.5) * 0.01;
        vals.liq += Math.floor((Math.random() - 0.4) * 18000);

        document.getElementById('live-pi').innerText = vals.pi.toFixed(4);
        document.getElementById('live-gcv').innerText = "$ " + vals.gcv.toLocaleString();
        document.getElementById('live-supply').innerText = vals.supply.toLocaleString(undefined, {minimumFractionDigits: 4});
        document.getElementById('live-st-rate').innerText = vals.st.toFixed(2);
        document.getElementById('live-lp-rate').innerText = vals.lp.toFixed(2);
        document.getElementById('live-liq').innerText = vals.liq.toLocaleString();
    }

    function toggle(id) {
        const el = document.getElementById(id);
        const panels = document.querySelectorAll('.panel');
        panels.forEach(p => { if(p.id !== id) p.style.display = 'none'; });
        el.style.display = el.style.display === 'block' ? 'none' : 'block';
    }

    function init() {
        const fList = document.getElementById('faq-list');
        db.faqs.forEach((f, i) => { fList.innerHTML += `<div class="item-row"><div class="item-q">${i+1}. ${f[0]}</div><div class="item-a">${f[1]}</div></div>`; });
        const vList = document.getElementById('vision-list');
        db.visions.forEach(v => { vList.innerHTML += `<div class="item-row"><div class="item-q"><b>${v[0]}</b></div><div class="item-a">${v[1]}</div></div>`; });
        setInterval(live, 1000);
    }
    init();
</script>
</body>
</html>
