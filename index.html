<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HK WORLD BANK</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Arial', sans-serif; }
        body { background-color: #000; color: #fff; overflow-x: hidden; width: 100%; }
        
        /* 메인 컨테이너: 화면 잘림 방지 */
        .container { width: 100%; max-width: 500px; margin: 0 auto; padding: 20px; text-align: center; }
        
        .header { color: #FFD700; font-size: 28px; font-weight: bold; margin-bottom: 30px; }
        .sub-title { color: #FFD700; font-size: 18px; margin-bottom: 10px; }
        
        /* 자산 보드 */
        .asset-board { background: #1a1a1a; border-radius: 20px; padding: 30px 10px; margin-bottom: 20px; border: 1px solid #333; }
        .asset-value { font-size: 35px; font-weight: bold; word-break: break-all; }
        
        /* 스테이킹 정보 (잘림 해결) */
        .staking-info { color: #FFD700; font-size: 14px; margin-bottom: 5px; }
        .liquidity { font-size: 24px; color: #ccc; margin-bottom: 20px; }

        /* 버튼 영역 */
        .btn-group { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 20px; }
        .btn { flex: 1; padding: 15px 5px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; font-size: 12px; }
        .btn-white { background: #e0e0e0; color: #000; }
        .btn-yellow { background: #FFD700; color: #000; }
        .btn-red { background: #ff4d4d; color: #fff; width: 100%; padding: 20px; font-size: 18px; }

        /* 언어 선택기 */
        .lang-select { background: #222; color: #fff; padding: 10px; border-radius: 5px; margin-bottom: 20px; width: 100%; }

        /* 하단 정책 및 안전장치 */
        .footer-info { background: #0a0a0a; padding: 20px; font-size: 12px; color: #888; border-top: 1px solid #222; line-height: 1.6; }
        .safe-mark { color: #00ffcc; margin-bottom: 10px; display: block; }
    </style>
</head>
<body>

<div class="container">
    <select class="lang-select" onchange="changeLanguage(this.value)">
        <option value="ko">한국어 🇰🇷</option>
        <option value="en">English 🇺🇸</option>
        <option value="zh">中文 🇨🇳</option>
        <option value="ja">日本語 🇯🇵</option>
        <option value="es">Español 🇪🇸</option>
        <option value="ar">العربية 🇸🇦</option>
        <option value="ru">Русский 🇷🇺</option>
        <option value="fr">Français 🇫🇷</option>
        <option value="de">Deutsch 🇩🇪</option>
        <option value="pt">Português 潮流</option>
        <option value="vi">Tiếng Việt 🇻🇳</option>
        <option value="id">Bahasa Indonesia 🇮🇩</option>
        <option value="hi">हिन्दी 🇮🇳</option>
        <option value="tr">Türkçe 🇹🇷</option>
        <option value="it">Italiano 🇮🇹</option>
    </select>

    <div class="header">HK WORLD BANK</div>
    <div class="sub-title" id="text-main-ledger">메인 자산 통합 원장</div>

    <div class="asset-board">
        <div class="asset-value">400.0212</div>
        <div style="color: #FFD700; margin-top: 10px;">Pi</div>
    </div>

    <div class="staking-info">Staking 31.4% | <span id="text-pool">유동성풀 $</span></div>
    <div class="liquidity">88,410,819,601</div>

    <div class="btn-group">
        <button class="btn btn-white">PI 수량</button>
        <button class="btn btn-yellow" onclick="openPayment()">SWAP / 결제</button>
        <button class="btn btn-white" onclick="openTikTok()">TIKTOK</button>
    </div>

    <button class="btn btn-red" id="text-support" onclick="alert('Support Center Connected')">글로벌 고객지원센터</button>

    <div class="footer-info">
        <strong class="safe-mark" id="text-safe">🛡️ HK 양자 방패 가동 중 (Quantum Shield Active)</strong>
        <p id="text-policy">본 시스템은 글로벌 보안 프로토콜을 준수하며, 사용자의 개인정보는 양자 암호화 기술로 보호됩니다.</p>
    </div>
</div>

<script>
    // 1. 15개국 언어 데이터
    const langData = {
        ko: { main: "메인 자산 통합 원장", pool: "유동성풀 $", support: "글로벌 고객지원센터", safe: "🛡️ HK 양자 방패 가동 중", policy: "개인정보 보호정책 및 안전장치 적용됨" },
        en: { main: "Main Asset Ledger", pool: "Liquidity Pool $", support: "Global Support Center", safe: "🛡️ Quantum Shield Active", policy: "Privacy Policy & Safety Protocol Applied" },
        zh: { main: "主资产账本", pool: "流动性池 $", support: "全球客服中心", safe: "🛡️ 量子屏蔽激活", policy: "隐私 정책 和 安全措施已应用" },
        // ... (나머지 12개 언어도 이 형식으로 추가 가능)
    };

    function changeLanguage(lang) {
        if(langData[lang]) {
            document.getElementById('text-main-ledger').innerText = langData[lang].main;
            document.getElementById('text-pool').innerText = langData[lang].pool;
            document.getElementById('text-support').innerText = langData[lang].support;
            document.getElementById('text-safe').innerText = langData[lang].safe;
            document.getElementById('text-policy').innerText = langData[lang].policy;
        }
    }

    // 2. 틱톡 구동 (앱 실행 우선, 안되면 웹으로)
    function openTikTok() {
        const tiktokUser = "hkgroup"; // 형님의 틱톡 아이디로 변경하세요
        const appUrl = "snssdk1128://user/profile/" + tiktokUser;
        const webUrl = "https://www.tiktok.com/@" + tiktokUser;
        
        setTimeout(function() { window.location.href = webUrl; }, 500);
        window.location.href = appUrl;
    }

    // 3. 결제창 구동 (Pi SDK 또는 결제 게이트웨이 연결부)
    function openPayment() {
        // 결제창 로직 (임시 팝업)
        const amount = "400.0212";
        if(confirm(amount + " Pi 결제를 진행하시겠습니까?")) {
            alert("결제 보안 모듈을 호출합니다...");
            // 여기에 Pi SDK 결제 코드 연동
        }
    }
</script>

</body>
</html>
