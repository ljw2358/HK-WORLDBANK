
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HK WorldBank</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --hk-gold: #FFD700;
            --hk-dark: #000000;
            --hk-green: #00FF00;
            --hk-red: #FF3B30;
            --hk-blue: #007AFF;
            --hk-orange: #FF9500;
            --hk-purple: #AF52DE;
        }
        body {
            margin: 0; background-color: var(--hk-dark); color: white;
            font-family: 'Pretendard', -apple-system, sans-serif;
        }
        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px; background: #111;
        }
        .brand { font-size: 20px; font-weight: 900; color: var(--hk-gold); }
        .lang-select {
            background: #222; color: white; border: 1px solid #444;
            padding: 6px; border-radius: 6px; font-size: 12px;
        }
        .asset-card {
            margin: 15px; padding: 30px 15px; background: #0a0a0a;
            border-radius: 25px; text-align: center; border: 1px solid #222;
        }
        .ledger-title { color: #888; font-size: 14px; margin-bottom: 12px; }
        .amount { font-size: 42px; font-weight: 800; margin: 10px 0; }
        .pi-text { color: var(--hk-gold); font-size: 24px; margin-left: 5px; }
        .gcv-box {
            display: inline-block; padding: 8px 20px; border-radius: 30px;
            border: 1px solid var(--hk-green); color: var(--hk-green); font-weight: bold; font-size: 14px;
        }
        .menu-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 15px;
        }
        .menu-item {
            background: #151515; padding: 20px 10px; border-radius: 18px;
            text-align: center; border: 1px solid #222;
        }
        .menu-item i { font-size: 24px; margin-bottom: 10px; display: block; }
        .menu-item span { font-size: 13px; font-weight: 500; }
        .fa-paper-plane { color: var(--hk-blue); }
        .fa-shopping-cart { color: var(--hk-orange); }
        .fa-piggy-bank { color: var(--hk-gold); }
        .fa-gift { color: var(--hk-red); }
        .fa-balance-scale { color: var(--hk-purple); }
        .fa-sync { color: var(--hk-green); }
        .staking-info { padding: 20px; }
        .staking-header { color: var(--hk-gold); font-size: 12px; font-weight: bold; margin-bottom: 5px; }
        .staking-val { font-size: 32px; font-weight: 800; }
        .btn-row { display: flex; gap: 8px; padding: 0 15px 15px; }
        .btn-row button { flex: 1; padding: 12px; border-radius: 10px; border: none; font-weight: bold; font-size: 13px; }
        .cs-btn {
            background: var(--hk-red); color: white; width: calc(100% - 30px);
            margin: 0 15px 15px; padding: 15px; border-radius: 12px; border: none; font-weight: bold;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .social-btns { display: flex; gap: 10px; padding: 0 15px 20px; }
        .social-btns a { flex: 1; padding: 15px; border-radius: 12px; text-decoration: none; color: white; font-weight: bold; text-align: center; }
        .yt { background: #FF0000; } .tk { background: #000; border: 1px solid #333; }
        .bottom-highlight {
            background: #111; padding: 20px; text-align: center; border-top: 1px solid #333;
        }
        .apy-text { font-size: 18px; font-weight: bold; color: var(--hk-gold); }
        .policy-area { text-align: center; padding: 20px; font-size: 11px; color: #555; }
        .policy-area a { color: #666; text-decoration: none; margin: 0 10px; }
    </style>
</head>
