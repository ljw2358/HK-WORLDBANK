<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HK WorldBank</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --hk-gold: #FFD700;
            --hk-dark-bg: #000000;
            --hk-card-bg: #0a0a0a;
            --hk-green: #00ff00;
            --hk-red: #ff4d4d;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--hk-dark-bg);
            color: white;
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
            overflow-x: hidden;
        }

        /* 상단 네비게이션 */
        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
        }
        .brand-logo {
            color: var(--hk-gold);
            font-size: 22px;
            font-weight: 900;
            letter-spacing: -0.5px;
        }
        .lang-selector select {
            background: #1a1a1a;
            color: white;
            border: 1px solid #333;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 13px;
        }

        /* 메인 자산 통합 원장 카드 */
        .asset-main-card {
            margin: 10px 15px;
            padding: 30px 15px;
            background: linear-gradient(145deg, #0f0f0f, #1a1a1a);
            border-radius: 20px;
            text-align: center;
            border: 1px solid #222;
        }
        .label-gold {
            color: #bfa100;
            font-size: 13px;
            margin-bottom: 10px;
            display: block;
        }
        .asset-amount {
            font-size: 40px;
            font-weight: bold;
            margin: 5px 0;
        }
        .pi-symbol {
            color: var(--hk-gold);
            font-size: 22px;
            margin-left: 5px;
        }
        .gcv-badge {
            display: inline-block;
            margin-top: 15px;
            padding: 6px 15px;
            background: rgba(0, 255, 0, 0.1);
            border: 1px solid var(--hk-green);
            border-radius: 20px;
            color: var(--hk-green);
            font-size: 13px;
            font-weight: bold;
        }

        /* 6구 그리드 메뉴 */
        .action-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            padding: 15px;
        }
        .action-item {
            background: #111;
            padding: 15px 5px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid #1a1a1a;
        }
        .action-item i {
            display: block;
            font-size: 18px;
            margin-bottom: 8px;
            color: #888;
        }
        .action-item span {
            font-size: 12px;
            color: #eee;
        }

        /* 스테이킹 정보 섹션 */
        .staking-section {
            padding: 20px;
            border-top: 1px solid #222;
        }
        .staking-header {
            color: var(--hk-gold);
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .staking-value {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 0.5px;
        }

        /* 중앙 3버튼 */
        .middle-btns {
            display: flex;
            gap: 8px;
            padding: 0 15px 20px;
        }
        .m-btn {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: none;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
        }
        .btn-w { background: white; color: black; }
        .btn-y { background: var(--hk-gold); color: black; }
        .btn-g { background: #00c853; color: white; }

        /* 하단 주요 링크 버튼 */
        .footer-links {
            padding: 0 15px 30px;
        }
        .cs-center {
            background: var(--hk-red);
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            color: white;
            border: none;
            font-weight: bold;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .social-btns {
            display: flex;
            gap: 10px;
        }
        .social-btns a {
            flex: 1;
            padding: 15px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: white;
        }
        .yt { background: #ff0000; }
        .tk { background: #000; border: 1px solid #444; }

    </style>
</head>
<body>

    <div class="top-nav">
        <div class="brand-logo">HK WORLD BANK</div>
        <div class="lang-selector">
            <select id="langSelect" onchange="translatePage()">
                <option value="ko">KR 🇰🇷</option>
                <option value="en">EN 🇺🇸</option>
            </select>
        </div>
    </div>

    <div class="asset-main-card">
        <span class="label-gold" id="label-ledger">메인 자산 통합 원장</span>
        <div class="asset-amount">400.0212<span class="pi-symbol">Pi</span></div>
        <div class="gcv-badge" id="label-gcv">가치 평가: $ 125,663,600 (GCV)</div>
    </div>

    <div class="action-grid">
        <div class="action-item"><i class="fas fa-paper-plane"></i><span data-key="send">송금</span></div>
        <div class="action-item"><i class="fas fa-shopping-cart"></i><span data-key="pay">결제</span></div>
        <div class="action-item"><i class="fas fa-piggy-bank"></i><span data-key="deposit">예치</span></div>
        <div class="action-item"><i class="fas fa-gift"></i><span data-key="reward">보상</span></div>
        <div class="action-item"><i class="fas fa-balance-scale"></i><span data-key="ubi">기본소득</span></div>
        <div class="action-item"><i class="fas fa-exchange-alt"></i><span data-key="swap">스왑</span></div>
    </div>

    <div class="staking-section">
        <div class="staking-header">STAKING 31.4% | <span data-key="lp_pool">유동성 풀 $</span></div>
        <div class="staking-value">88,401,819,601</div>
    </div>

    <div class="middle-btns">
        <button class="m-btn btn-w">PI 수량</button>
        <button class="m-btn btn-y">SWAP</button>
        <button class="m-btn btn-g">LP 공급</button>
    </div>

    <div class="footer-links">
        <button class="cs-center">
            <i class="fas fa-headset"></i> <span data-key="cs">글로벌 고객지원센터</span>
        </button>
        
        <div class="social-btns">
            <a href="https://www.youtube.com" class="yt">
                <i class="fab fa-youtube"></i> YOUTUBE
            </a>
            <a href="https://www.tiktok.com" class="tk">
                <i class="fab fa-tiktok"></i> TIKTOK
            </a>
        </div>
    </div>

    <script>
        const i18n = {
            ko: {
                ledger: "메인 자산 통합 원장",
                gcv: "가치 평가: $ 125,663,600 (GCV)",
                send: "송금", pay: "결제", deposit: "예치", reward: "보상", ubi: "기본소득", swap: "스왑",
                lp_pool: "유동성 풀 $", cs: "글로벌 고객지원센터"
            },
            en: {
                ledger: "Main Integrated Asset Ledger",
                gcv: "Evaluation: $ 125,663,600 (GCV)",
                send: "Transfer", pay: "Payment", deposit: "Deposit", reward: "Reward", ubi: "UBI", swap: "Swap",
                lp_pool: "Liquidity Pool $", cs: "Global Support Center"
            }
        };

        function translatePage() {
            const lang = document.getElementById('langSelect').value;
            const res = i18n[lang];

            document.getElementById('label-ledger').innerText = res.ledger;
            document.getElementById('label-gcv').innerText = res.gcv;

            document.querySelectorAll('[data-key]').forEach(el => {
                const key = el.getAttribute('data-key');
                el.innerText = res[key];
            });
        }
    </script>

</body>
</html>
