
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK WorldBank - Global Industrial Leader</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --hk-gold: #FFD700; --hk-dark: #000000; --hk-green: #00FF00;
            --hk-red: #FF3B30; --hk-blue: #007AFF; --hk-orange: #FF9500;
            --hk-purple: #AF52DE; --hk-cyan: #00F2FF;
        }
        body { margin: 0; background-color: var(--hk-dark); color: white; font-family: 'Pretendard', sans-serif; display: flex; justify-content: center; }
        .pc-container { width: 100%; max-width: 1200px; padding: 40px 20px; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 20px; border-bottom: 1px solid #222; }
        .brand-title { font-size: 28px; font-weight: 900; color: var(--hk-gold); }
        .lang-select { background: #111; color: white; border: 1px solid #444; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 16px; }
        .main-asset-card { background: linear-gradient(145deg, #0a0a0a, #151515); margin: 30px 0; padding: 60px 20px; border-radius: 30px; text-align: center; border: 1px solid #333; }
        .ledger-label { color: var(--hk-gold); font-size: 20px; margin-bottom: 20px; font-weight: bold; }
        .balance { font-size: 85px; font-weight: 900; margin: 15px 0; }
        .pi-unit { color: var(--hk-gold); font-size: 40px; margin-left: 10px; }
        .gcv-badge { display: inline-block; padding: 12px 35px; border-radius: 50px; border: 2px solid var(--hk-green); color: var(--hk-green); font-size: 22px; font-weight: bold; }
        .nav-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 40px; }
        .nav-item { background: #111; padding: 35px; border-radius: 20px; text-align: center; border: 1px solid #222; }
        .nav-item i { font-size: 32px; margin-bottom: 15px; display: block; }
        .fa-paper-plane { color: var(--hk-blue); } .fa-shopping-cart { color: var(--hk-orange); } .fa-piggy-bank { color: var(--hk-gold); }
        .fa-gift { color: var(--hk-red); } .fa-balance-scale { color: var(--hk-purple); } .fa-sync { color: var(--hk-green); }
        .info-panel { background: #0d0d0d; padding: 30px; border-radius: 20px; margin-bottom: 30px; border-left: 5px solid var(--hk-gold); }
        .info-panel h3 { color: var(--hk-gold); margin: 0 0 10px 0; font-size: 16px; }
        .info-panel .value { font-size: 48px; font-weight: 800; }
        .social-row { display: flex; gap: 15px; margin-bottom: 40px; }
        .social-row a { flex: 1; padding: 25px; border-radius: 12px; text-decoration: none; color: white; font-weight: bold; text-align: center; font-size: 20px; display: flex; align-items: center; justify-content: center; gap: 10px; cursor: pointer; }
        .yt { background: #FF0000; } .tk { background: #000; border: 1px solid #333; }
        .apy-highlight { text-align: center; padding: 50px; color: var(--hk-gold); font-size: 32px; font-weight: bold; border-top: 1px solid #333; }
    </style>
</head>
<body>
    <div class="pc-container">
        <div class="top-bar">
            <div class="brand-title">HK WORLD BANK</div>
            <select class="lang-select" id="langBox" onchange="runLang()">
                <option value="ko">한국어 🇰🇷</option>
                <option value="en">English 🇺🇸</option>
                <option value="zh">中文 🇨🇳</option>
                <option value="ja">日本語 🇯🇵</option>
            </select>
        </div>

        <div class="main-asset-card">
            <div class="ledger-label" id="txt-led">메인 자산 통합 원장</div>
            <div class="balance">400.0212 <span class="pi-unit">Pi</span></div>
            <div class="gcv-badge" id="txt-gcv">가치 평가: $ 125,663,600 (GCV)</div>
        </div>

        <div class="nav-grid">
            <div class="nav-item"><i class="fas fa-paper-plane"></i><span data-k="send">송금</span></div>
            <div class="nav-item"><i class="fas fa-shopping-cart"></i><span data-k="pay">결제</span></div>
            <div class="nav-item"><i class="fas fa-piggy-bank"></i><span data-k="save">예치</span></div>
        </div>

        <div class="info-panel">
            <h3 id="txt-lp">STAKING 31.4% | 유동성 풀 $</h3>
            <div class="value">88,401,819,601</div>
        </div>

        <div class="social-row">
            <a href="https://www.youtube.com/@Hyekong2025" target="_blank" class="yt"><i class="fab fa-youtube"></i> YOUTUBE</a>
            <a href="https://www.tiktok.com/@hyekong2025" target="_blank" class="tk"><i class="fab fa-tiktok"></i> TIKTOK</a>
        </div>

        <div class="apy-highlight" id="txt-apy">예치 (APY 31.4%)</div>
    </div>

    <script>
        const i18n = {
            ko: { led: "메인 자산 통합 원장", gcv: "가치 평가: $ 125,663,600 (GCV)", send: "송금", pay: "결제", save: "예치", lp: "유동성 풀 $", apy: "예치 (APY 31.4%)" },
            en: { led: "Main Asset Ledger", gcv: "Evaluation: $ 125,663,600 (GCV)", send: "Transfer", pay: "Payment", save: "Deposit", lp: "Liquidity Pool $", apy: "Deposit (APY 31.4%)" },
            zh: { led: "主资产整合账本", gcv: "价值评估: $ 125,663,600", send: "转账", pay: "支付", save: "存款", lp: "流动性池 $", apy: "存款 (APY 31.4%)" },
            ja: { led: "メイン資産統合台帳", gcv: "評価額: $ 125,663,600", send: "送금", pay: "決済", save: "預金", lp: "流動性プール $", apy: "預金 (APY 31.4%)" }
        };

        function runLang() {
            const l = document.getElementById('langBox').value;
            const d = i18n[l];
            document.getElementById('txt-led').innerText = d.led;
            document.getElementById('txt-gcv').innerText = d.gcv;
            document.getElementById('txt-lp').innerText = `STAKING 31.4% | ${d.lp}`;
            document.getElementById('txt-apy').innerText = d.apy;
            document.querySelectorAll('[data-k]').forEach(el => {
                el.innerText = d[el.getAttribute('data-k')];
            });
        }
    </script>
</body>
</html>
