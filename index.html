<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK WORLD BANK | FINAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #000; --gold: #FFD700; --neon: #39FF14; --orange: #FF8C00; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Noto Sans KR', sans-serif; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 500px; padding: 20px; position: relative; }

        /* ✅ 우측 상단 아주 작은 언어 선택 네모 */
        .lang-corner { position: absolute; top: 10px; right: 10px; z-index: 9999; }
        .lang-select { background: #111; color: var(--gold); border: 2px solid var(--gold); font-size: 11px; padding: 2px; width: 50px; font-weight: bold; }

        .title { font-family: 'Oswald', sans-serif; font-size: 42px; color: var(--gold); text-align: center; margin: 35px 0; letter-spacing: 2px; }
        
        /* 자산 정보 */
        .asset-card { width: 100%; background: #0a0a0a; border-radius: 15px; padding: 35px 0; text-align: center; margin-bottom: 25px; border: 1px solid #222; }
        .balance { font-size: 48px; font-weight: 900; }
        .gcv-label { border: 2px solid var(--neon); border-radius: 50px; padding: 10px 20px; color: var(--neon); font-weight: 900; font-size: 14px; display: inline-block; margin-top: 20px; }

        /* 메뉴 격자 (예치 APR 포함) */
        .grid-6 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; margin-bottom: 30px; }
        .menu-item { background: #111; padding: 20px 0; border-radius: 10px; text-align: center; border: 1px solid #222; position: relative; }
        .menu-item i { font-size: 26px; margin-bottom: 8px; display: block; color: #4facfe; }
        .menu-item span { font-size: 12px; font-weight: bold; display: block; }
        .apr-badge { position: absolute; top: 5px; right: 5px; background: var(--gold); color: #000; font-size: 9px; font-weight: 900; padding: 1px 4px; border-radius: 3px; }

        /* 유동성 풀 */
        .liq-card { width: 100%; background: #080808; border-left: 6px solid var(--gold); padding: 20px; border-radius: 0 10px 10px 0; margin-bottom: 30px; box-sizing: border-box; }
        .liq-top { display: flex; justify-content: space-between; align-items: center; }
        .apr-tag { background: var(--gold); color: #000; padding: 4px 10px; border-radius: 4px; font-size: 13px; font-weight: 900; }
        .liq-val { font-size: 32px; font-weight: 900; margin-top: 10px; }

        /* 하단 금융 버튼 */
        .btn-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; width: 100%; margin-bottom: 30px; }
        .btn { padding: 18px 0; border-radius: 8px; font-weight: 900; font-size: 13px; border: none; color: #fff; cursor: pointer; }
        .btn-k { background: #000; border: 2px solid var(--gold); }
        .btn-o { background: var(--orange); }
        .btn-g { background: #28a745; }

        /* ✅ 최하단 미디어 엔진 (강제 구동 및 스크립트 포함) */
        .media-footer { width: 100%; background: #000; border: 1px solid #333; border-radius: 12px; overflow: hidden; margin-top: 20px; margin-bottom: 50px; }
        .tab-menu { display: flex; background: #111; }
        .tab-link { flex: 1; padding: 15px; border: none; color: #666; font-size: 13px; font-weight: bold; cursor: pointer; }
        .tab-link.active { color: #fff; background: #000; border-bottom: 3px solid var(--gold); }
        .video-player { width: 100%; aspect-ratio: 16/9; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }

        footer { text-align: center; font-size: 10px; color: #444; padding: 30px 0; border-top: 1px solid #111; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="lang-corner">
        <select class="lang-select" id="langSwitch">
            <option value="ko">KO</option>
            <option value="en">EN</option>
            <option value="zh">ZH</option>
            <option value="ja">JA</option>
            <option value="ru">RU</option>
            <option value="ar">AR</option>
            <option value="es">ES</option>
        </select>
    </div>

    <h1 class="title">HK WORLD BANK</h1>

    <div class="asset-card">
        <span id="txt-ledger" style="color:var(--gold); font-weight:bold;">메인 자산 통합 원장</span>
        <div class="balance">400.0000 <span style="color:var(--orange)">Pi</span></div>
        <div id="txt-gcv" class="gcv-label">가치 평가: $ 125,663,600 (GCV)</div>
    </div>

    <div class="grid-6">
        <div class="menu-item"><i class="fa-solid fa-paper-plane"></i><span id="m1">송금</span></div>
        <div class="menu-item"><i class="fa-solid fa-cart-shopping"></i><span id="m2">결제</span></div>
        <div class="menu-item">
            <div class="apr-badge">31.4%</div>
            <i class="fa-solid fa-vault"></i><span id="m3">예치</span>
        </div>
        <div class="menu-item"><i class="fa-solid fa-gift"></i><span id="m4">보상</span></div>
        <div class="menu-item"><i class="fa-solid fa-scale-balanced"></i><span id="m5">소득</span></div>
        <div class="menu-item"><i class="fa-solid fa-arrows-rotate"></i><span id="m6">스왑</span></div>
    </div>

    <div class="liq-card">
        <div class="liq-top">
            <div id="txt-liq" style="color:var(--orange); font-weight:900;">유동성 풀 총액 ($)</div>
            <div class="apr-tag">APR 31.4%</div>
        </div>
        <div class="liq-val">88,401,773,756</div>
    </div>

    <div class="btn-row">
        <button class="btn btn-k" id="b1">Pi 수량</button>
        <button class="btn btn-o" id="b2">SWAP</button>
        <button class="btn btn-g" id="b3">LP 공급</button>
    </div>

    <div class="media-footer">
        <div class="tab-menu">
            <button class="tab-link active" onclick="setVideo('yt', this)">YOUTUBE</button>
            <button class="tab-link" onclick="setVideo('tk', this)">TIKTOK</button>
        </div>
        <div class="video-player">
            <iframe id="mainIfr" src="https://www.youtube.com/embed/videoseries?list=PLtY6C7V6q3F7wWJ1fE-7p-oE066f2Y7uE&autoplay=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
    </div>

    <footer>
        © 2026 HK GROUP GLOBAL HEGEMONY.<br>
        CHAIRMAN LEE JAEWAN. ALL RIGHTS RESERVED.
    </footer>
</div>

<script>
    const data = {
        ko: {l:'메인 자산 통합 원장', g:'가치 평가: $ 125,663,600 (GCV)', m1:'송금', m2:'결제', m3:'예치', m4:'보상', m5:'소득', m6:'스왑', liq:'유동성 풀 총액 ($)', b1:'Pi 수량', b2:'SWAP', b3:'LP 공급'},
        en: {l:'Main Asset Ledger', g:'Value: $ 125,663,600 (GCV)', m1:'Transfer', m2:'Pay', m3:'Stake', m4:'Reward', m5:'Income', m6:'Swap', liq:'Total Liquidity ($)', b1:'Pi Qty', b2:'SWAP', b3:'Add LP'},
        zh: {l:'主资产总账', g:'价值: $ 125,663,600', m1:'转账', m2:'支付', m3:'质押', m4:'奖励', m5:'收益', m6:'交易', liq:'总流动性 ($)', b1:'Pi 数量', b2:'SWAP', b3:'LP 供应'},
        ja: {l:'メイン資産台帳', g:'評価額: $ 125,663,600', m1:'送金', m2:'決済', m3:'預金', m4:'報酬', m5:'所得', m6:'交換', liq:'流動性プール ($)', b1:'Pi 数量', b2:'SWAP', b3:'LP 供給'},
        ar: {l:'دفتر الأصول الرئيسي', g:'القيمة: $ 125,663,600', m1:'إرسال', m2:'دفع', m3:'إيداع', m4:'مكافأة', m5:'دخل', m6:'تبادل', liq:'إجمالي السيولة ($)', b1:'كمية Pi', b2:'SWAP', b3:'توف력 LP'},
        es: {l:'Libro Mayor', g:'Valor: $ 125,663,600', m1:'Enviar', m2:'Pagar', m3:'Stake', m4:'Premio', m5:'Ingreso', m6:'Canje', liq:'Liquidez ($)', b1:'Cant. Pi', b2:'SWAP', b3:'Suministro LP'}
    };

    // 언어 변동 강제 엔진
    document.getElementById('langSwitch').onchange = function() {
        const s = data[this.value] || data['en'];
        document.getElementById('txt-ledger').innerText = s.l;
        document.getElementById('txt-gcv').innerText = s.g;
        document.getElementById('m1').innerText = s.m1; document.getElementById('m2').innerText = s.m2;
        document.getElementById('m3').innerText = s.m3; document.getElementById('m4').innerText = s.m4;
        document.getElementById('m5').innerText = s.m5; document.getElementById('m6').innerText = s.m6;
        document.getElementById('txt-liq').innerText = s.liq;
        document.getElementById('b1').innerText = s.b1; document.getElementById('b2').innerText = s.b2; document.getElementById('b3').innerText = s.b3;
    };

    // 비디오 로드 엔진
    function setVideo(type, btn) {
        const ifr = document.getElementById('mainIfr');
        document.querySelectorAll('.tab-link').forEach(l => l.classList.remove('active'));
        btn.classList.add('active');
        if(type === 'yt') {
            ifr.src = "https://www.youtube.com/embed/videoseries?list=PLtY6C7V6q3F7wWJ1fE-7p-oE066f2Y7uE&autoplay=1";
        } else {
            ifr.src = "https://www.tiktok.com/embed/v2/7101625480436157722";
        }
    }
</script>
</body>
</html>
