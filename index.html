<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>HK WORLD BANK - PC GLOBAL</title>
    <style>
        :root { --gold: #FFB400; --green: #00E676; --red: #FF5252; --bg: #000; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 0; display: flex; justify-content: center; }
        
        /* PC 화면 정렬: 중앙 집중형 레이아웃 */
        .pc-wrapper { width: 1000px; padding: 40px 20px; }
        
        /* 헤더: 언어 선택창 상단 우측 */
        .top-nav { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 30px; }
        .brand-area h1 { color: var(--gold); font-size: 1.8rem; margin: 0; letter-spacing: 1px; }
        .node-status { color: var(--green); font-size: 0.85rem; font-weight: bold; margin-top: 5px; }
        
        /* 언어 선택 드롭다운: 크기 축소 */
        #langSel { background: #111; color: var(--gold); border: 1px solid var(--gold); padding: 4px 8px; font-size: 0.8rem; cursor: pointer; border-radius: 4px; }

        /* 메인 자산 카드: 글자 크기 대폭 축소 및 정렬 */
        .asset-card { background: #0a0a0a; border: 1px solid #222; border-radius: 12px; padding: 25px; text-align: center; margin-bottom: 30px; }
        #lb_main { color: var(--gold); font-size: 0.95rem; margin-bottom: 10px; opacity: 0.8; }
        .pi-val { font-size: 2.8rem; font-weight: bold; margin: 10px 0; }
        .gcv-box { border: 1px solid var(--green); color: var(--green); padding: 6px 15px; border-radius: 20px; font-size: 0.9rem; display: inline-block; font-weight: bold; }

        /* 6개 메뉴 그리드: PC에 맞게 3열 배치 */
        .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 30px; }
        .menu-item { background: #111; border: 1px solid #222; padding: 15px; border-radius: 10px; text-align: center; transition: 0.3s; }
        .menu-item:hover { border-color: var(--gold); }
        .icon { font-size: 1.2rem; margin-bottom: 8px; display: block; }
        .menu-txt { font-size: 0.85rem; font-weight: 500; }

        /* 스테이킹 및 유동성 정보 */
        .info-bar { background: #0a0a0a; border-left: 4px solid var(--gold); padding: 15px 20px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }
        .info-label { font-size: 0.85rem; color: var(--gold); font-weight: bold; }
        .info-val { font-size: 1.4rem; font-weight: bold; }

        /* 버튼 그룹 */
        .btn-group { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 30px; }
        .f-btn { padding: 12px; border: none; border-radius: 6px; font-size: 0.85rem; font-weight: bold; cursor: pointer; }

        /* 고객지원: 레드 강조하되 크기 조절 */
        .cs-bar { background: var(--red); padding: 15px; text-align: center; border-radius: 8px; font-size: 1rem; font-weight: bold; margin-bottom: 40px; cursor: pointer; }

        /* 하단 링크 및 푸터 */
        .sns-links { display: flex; gap: 20px; justify-content: center; margin-bottom: 30px; }
        .sns-links a { color: #aaa; text-decoration: none; font-size: 0.8rem; }
        .footer { text-align: center; font-size: 0.75rem; color: #444; border-top: 1px solid #222; padding-top: 20px; line-height: 1.6; }
    </style>
</head>
<body>

<div class="pc-wrapper">
    <div class="top-nav">
        <div class="brand-area">
            <h1>HK WORLD BANK</h1>
            <div class="node-status">🚀 SECURE NODES: ACTIVE</div>
        </div>
        <select id="langSel" onchange="changeLang(this.value)">
            <option value="KR">KR (한국어)</option>
            <option value="US">US (English)</option>

            <option value="JP">JP (日本語)</option>

            <option value="ES">ES (Español)</option>

            <option value="ID">ID (Bahasa Indo)</option>

    <div class="asset-card">

        <div class="pi-val"><span id="pi_ani">400.0211</span> <span style="font-size: 1rem; color: var(--gold);">Pi</span></div>
        <div class="gcv-box" id="lb_gcv">가치 평가: $ 125,663,600 (GCV)</div>
    </div>

    <div class="menu-grid">
        <div class="menu-item"><span class="icon">🚀</span><span class="menu-txt" id="m1">송금</span></div>
        <div class="menu-item"><span class="icon">🛒</span><span class="menu-txt" id="m2">결제</span></div>
        <div class="menu-item"><span class="icon">📀</span><span class="menu-txt" id="m3">예치</span></div>
        <div class="menu-item"><span class="icon">🎁</span><span class="menu-txt" id="m4">보상</span></div>
        <div class="menu-item"><span class="icon">⚖️</span><span class="menu-txt" id="m5">소득</span></div>
        <div class="menu-item"><span class="icon">🔄</span><span class="menu-txt" id="m6">스왑</span></div>
    </div>

    <div class="info-bar">
        <div class="info-label" id="lb_pool">STAKING 31.4% | 유동성 풀 $</div>
        <div class="info-val" id="pool_ani">88,401,818,262</div>
    </div>

    <div class="btn-group">
        <button class="f-btn" id="b1" style="background:#222; color:#fff;">Pi 수량</button>
        <button class="f-btn" id="b2" style="background:var(--gold); color:#000;">SWAP</button>
        <button class="f-btn" id="b3" style="background:var(--green); color:#000;">LP 공급</button>
    </div>

    <div class="cs-bar" id="b_cs">🎧 글로벌 고객지원센터</div>

    <div class="sns-links">
        <a href="https://www.youtube.com/@hyekong2025">YOUTUBE</a>
        <a href="https://www.tiktok.com/@hyekong2025">TIKTOK</a>
    </div>

    <div class="footer">
        © 2026 HK GROUP GLOBAL MANAGEMENT. GCV<br>
        <strong>CHAIRMAN LEE JAE-WAN</strong>. ALL RIGHTS RESERVED.
    </div>
</div>

    function changeLang(l) {
        const s = langLib[l];
        document.getElementById('lb_main').innerText = s[0];
        document.getElementById('lb_gcv').innerText = s[1] + ': $ 125,663,600 (GCV)';
        document.getElementById('m1').innerText = s[2]; document.getElementById('m2').innerText = s[3];
        document.getElementById('m3').innerText = s[4]; document.getElementById('m4').innerText = s[5];

    let p = 400.0211; let v = 88401818262;
    setInterval(() => {
        p += 0.0001; v += Math.floor(Math.random()*1500);

</script>
</body>
</html>
