<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK WORLD BANK | SUPREME</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #000; --gold: #FFD700; --neon: #39FF14; --orange: #FF8C00; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Noto Sans KR', sans-serif; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 500px; padding: 20px; position: relative; }

        /* ✅ 우측 상단 아주 작은 언어 선택 네모 */
        .lang-corner { position: absolute; top: 10px; right: 10px; z-index: 9999; }
        .lang-select { background: #111; color: var(--gold); border: 2px solid var(--gold); font-size: 11px; padding: 2px; width: 45px; font-weight: bold; cursor: pointer; }

        .title { font-family: 'Oswald', sans-serif; font-size: 40px; color: var(--gold); text-align: center; margin: 30px 0; letter-spacing: 2px; text-transform: uppercase; }
        
        /* 자산 정보 섹션 */
        .asset-card { width: 100%; background: #0a0a0a; border-radius: 20px; padding: 40px 0; text-align: center; margin-bottom: 30px; border: 1px solid #222; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .ledger-txt { color: var(--gold); font-size: 16px; font-weight: bold; margin-bottom: 10px; display: block; }
        .balance { font-size: 48px; font-weight: 900; }
        .gcv-label { border: 2.5px solid var(--neon); border-radius: 50px; padding: 12px 25px; color: var(--neon); font-weight: 900; font-size: 16px; display: inline-block; margin-top: 25px; }

        /* 6대 핵심 메뉴 (예치 APR 포함) */
        .grid-6 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; width: 100%; margin-bottom: 30px; }
        .menu-item { background: #111; padding: 22px 0; border-radius: 12px; text-align: center; border: 1px solid #222; position: relative; }
        .menu-item i { font-size: 28px; margin-bottom: 10px; display: block; color: #4facfe; }
        .menu-item span { font-size: 13px; font-weight: bold; display: block; }
        /* ✅ 예치 전용 APR 배지 */
        .apr-badge { position: absolute; top: 6px; right: 6px; background: var(--gold); color: #000; font-size: 9px; font-weight: 900; padding: 1px 4px; border-radius: 3px; }

        /* 유동성 풀 + APR 31.4% */
        .liq-section { width: 100%; background: #080808; border-left: 6px solid var(--gold); padding: 25px; border-radius: 0 15px 15px 0; margin-bottom: 35px; box-sizing: border-box; }
        .liq-top { display: flex; justify-content: space-between; align-items: center; }
        .liq-title { color: var(--orange); font-size: 16px; font-weight: 900; }
        .apr-tag { background: var(--gold); color: #000; padding: 4px 12px; border-radius: 4px; font-size: 13px; font-weight: 900; }
        .liq-val { font-size: 32px; font-weight: 900; color: #fff; margin-top: 10px; }

        /* 하단 결정적 버튼 */
        .btn-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; margin-bottom: 40px; }
        .btn { padding: 18px 0; border-radius: 10px; font-weight: 900; font-size: 14px; border: none; color: #fff; cursor: pointer; }
        .btn-k { background: #000; border: 2px solid var(--gold); }
        .btn-o { background: var(--orange); }
        .btn-g { background: #28a745; }

        /* ✅ 최하단 미디어 엔진 (강제 구동 플레이어) */
        .media-footer { width: 100%; background: #111; border-radius: 15px; overflow: hidden; border: 1px solid #333; margin-bottom: 50px; }
        .tab-menu { display: flex; background: #000; border-bottom: 1px solid #222; }
        .tab-link { flex: 1; padding: 15px; border: none; background: none; color: #666; font-size: 13px; font-weight: bold; cursor: pointer; }
        .tab-link.active { color: #fff; background: #111; border-bottom: 3px solid var(--gold); }
        .player-box { width: 100%; aspect-ratio: 16/9; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }

        footer { text-align: center; font-size: 10px; color: #444; padding: 30px 0; border-top: 1px solid #111; line-height: 2; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="lang-corner">
        <select class="lang-select" id="globalLang" onchange="changeLanguage(this.value)">
            <option value="ko">KO</option>
            <option value="en">EN</option>
            <option value="zh">ZH</option>
            <option value="ja">JA</option>
            <option value="ru">RU</option>
            <option value="ar">AR</option>
            <option value="es">ES</option>
        </select>
    </div>

    <h1 class="title">HK WORLD BANK</h1>

    <div class="asset-card">
        <span id="label-ledger">메인 자산 통합 원장</span>
        <div class="balance">400.0000 <span style="color:var(--orange)">Pi</span></div>
        <div id="label-gcv" class="gcv-label">가치 평가: $ 125,663,600 (GCV)</div>
    </div>

    <div class="grid-6">
        <div class="menu-item"><i class="fa-solid fa-paper-plane"></i><span id="m1">송금</span></div>
        <div class="menu-item"><i class="fa-solid fa-cart-shopping"></i><span id="m2">결제</span></div>
        <div class="menu-item">
            <div class="apr-badge">31.4%</div>
            <i class="fa-solid fa-vault"></i><span id="m3">예치</span>
        </div>
        <div class="menu-item"><i class="fa-solid fa-gift" style="color:#ff4d4d"></i><span id="m4">보상</span></div>
        <div class="menu-item"><i class="fa-solid fa-scale-balanced" style="color:var(--gold)"></i><span id="m5">소득</span></div>
        <div class="menu-item"><i class="fa-solid fa-arrows-rotate" style="color:var(--blue)"></i><span id="m6">스왑</span></div>
    </div>

    <div class="liq-section">
        <div class="liq-top">
            <div id="label-liq" class="liq-title">유동성 풀 총액 ($)</div>
            <div class="apr-tag">APR 31.4%</div>
        </div>
        <div class="liq-val">88,401,773,756</div>
    </div>

    <div class="btn-row">
        <button class="btn btn-k" id="b1">Pi 수량</button>
        <button class="btn btn-o" id="b2">SWAP</button>
        <button class="btn btn-g" id="b3">LP 공급</button>
    </div>

    <div class="media-footer">
        <div class="tab-menu">
            <button class="tab-link active" onclick="playMedia('yt', this)">YOUTUBE LIVE</button>
            <button class="tab-link" onclick="playMedia('tk', this)">TIKTOK LIVE</button>
        </div>
        <div class="player-box">
            <iframe id="globalPlayer" src="https://www.youtube.com/embed/videoseries?list=PLtY6C7V6q3F7wWJ1fE-7p-oE066f2Y7uE&autoplay=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
    </div>

    <footer>
        © 2026 HK GROUP GLOBAL HEGEMONY.<br>
        CHAIRMAN LEE JAEWAN. ALL RIGHTS RESERVED.
    </footer>
</div>

<script>
    // ✅ 언어 변동 데이터 (절대 안꼬이게 개별 매칭)
    const translations = {
        ko: {l:'메인 자산 통합 원장', g:'가치 평가: $ 125,663,600 (GCV)', m1:'송금', m2:'결제', m3:'예치', m4:'보상', m5:'소득', m6:'스왑', liq:'유동성 풀 총액 ($)', b1:'Pi 수량', b2:'SWAP', b3:'LP 공급'},
        en: {l:'Main Asset Ledger', g:'Value: $ 125,663,600 (GCV)', m1:'Transfer', m2:'Pay', m3:'Stake', m4:'Reward', m5:'Income', m6:'Swap', liq:'Total Liquidity ($)', b1:'Pi Qty', b2:'SWAP', b3:'Add LP'},
        zh: {l:'主资产总账', g:'价值: $ 125,663,600', m1:'转账', m2:'支付', m3:'质押', m4:'奖励', m5:'收益', m6:'交易', liq:'总流动性 ($)', b1:'Pi 数量', b2:'SWAP', b3:'LP 供应'},
        ja: {l:'メイン資産台帳', g:'評価額: $ 125,663,600', m1:'送金', m2:'決済', m3:'預金', m4:'報酬', m5:'所得', m6:'交換', liq:'流動性プール ($)', b1:'Pi 数量', b2:'SWAP', b3:'LP 供給'},
        ru: {l:'Главный реестр', g:'Стоимость: $ 125,663,600', m1:'Перевод', m2:'Оплата', m3:'Депозит', m4:'Награда', m5:'Доход', m6:'Обмен', liq:'Ликвидность ($)', b1:'Pi Кол-во', b2:'SWAP', b3:'Поставка LP'},
        ar: {l:'دفتر الأصول الرئيسي', g:'القيمة: $ 125,663,600', m1:'إرسال', m2:'دفع', m3:'إيداع', m4:'مكافأة', m5:'دخل', m6:'تبادل', liq:'إجمالي السيولة ($)', b1:'كمية Pi', b2:'SWAP', b3:'توفير LP'},
        es: {l:'Libro Mayor', g:'Valor: $ 125,663,600', m1:'Enviar', m2:'Pagar', m3:'Stake', m4:'Premio', m5:'Ingreso', m6:'Canje', liq:'Liquidez ($)', b1:'Pi Cant.', b2:'SWAP', b3:'Suministro LP'}
    };

    function changeLanguage(lang) {
        const s = translations[lang] || translations['en'];
        document.getElementById('label-ledger').innerText = s.l;
        document.getElementById('label-gcv').innerText = s.g;
        document.getElementById('m1').innerText = s.m1; document.getElementById('m2').innerText = s.m2;
        document.getElementById('m3').innerText = s.m3; document.getElementById('m4').innerText = s.m4;
        document.getElementById('m5').innerText = s.m5; document.getElementById('m6').innerText = s.m6;
        document.getElementById('label-liq').innerText = s.liq;
        document.getElementById('b1').innerText = s.b1; document.getElementById('b2').innerText = s.b2; document.getElementById('b3').innerText = s.b3;
    }

    // ✅ 미디어 구동 엔진 (유튜브 & 틱톡 강제 구동)
    function playMedia(type, btn) {
        const player = document.getElementById('globalPlayer');
        document.querySelectorAll('.tab-link').forEach(l => l.classList.remove('active'));
        btn.classList.add('active');
        if(type === 'yt') {
            player.src = "https://www.youtube.com/embed/videoseries?list=PLtY6C7V6q3F7wWJ1fE-7p-oE066f2Y7uE&autoplay=1";
        } else {
            // 틱톡 임베드 주소 (보안 우회형)
            player.src = "https://www.tiktok.com/embed/v2/7101625480436157722?lang=ko-KR";
        }
    }
</script>
</body>
</html>
