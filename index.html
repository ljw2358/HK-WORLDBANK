    <style>

        body { background: var(--bg); color: #fff; display: flex; justify-content: center; }
        .wrapper { width: 100%; max-width: 480px; padding: 20px; text-align: center; }
        
        /* 30개국 선택창 */
        .lang-select { background: #2c2c2e; color: var(--gold); border: 1.5px solid var(--gold); padding: 12px; border-radius: 12px; width: 100%; margin-bottom: 25px; font-weight: bold; }

        /* 자산 카드 */
        .main-card { background: var(--card); border-radius: 25px; padding: 40px 20px; border: 1px solid #333; margin-bottom: 20px; }
        .asset-label { font-size: 15px; color: var(--gold); margin-bottom: 10px; }
        .asset-value { font-size: 45px; font-weight: 800; margin-bottom: 10px; }
        .staking-info { font-size: 16px; color: var(--gold); font-weight: bold; background: rgba(255,215,0,0.1); display: inline-block; padding: 5px 15px; border-radius: 50px; }

        .stat-box { background: #111; padding: 20px; border-radius: 15px; border: 1px solid #222; margin-bottom: 10px; display: flex; justify-content: space-between; }
        .stat-label { color: #888; font-size: 14px; }
        .stat-val { color: #00ffcc; font-weight: bold; }

        /* 버튼 그룹 */
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin: 25px 0; }
        .btn { padding: 15px 5px; border-radius: 12px; border: none; font-weight: bold; font-size: 13px; cursor: pointer; }
        .btn-gray { background: #3a3a3c; color: #fff; }
        .btn-gold { background: var(--gold); color: #000; }
        .btn-white { background: #fff; color: #000; }
        .btn-red { width: 100%; background: #ff3b30; color: #fff; padding: 20px; font-size: 17px; border-radius: 15px; font-weight: 900; }

        /* 보안 섹션 */
        .footer-secure { background: #000; border-radius: 15px; padding: 20px; margin-top: 30px; border: 1px solid #222; text-align: left; }
        .shield-line { color: #00ffcc; font-size: 14px; font-weight: bold; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
        .policy-txt { font-size: 12px; color: #666; line-height: 1.6; }
