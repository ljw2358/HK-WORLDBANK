<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HK WORLD BANK</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&family=Oswald:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg-color: #0d0d0d; --main-gold: #FFD700; --neon-green: #39FF14; --sub-orange: #FF8C00; }
        body { margin: 0; padding: 0; background-color: var(--bg-color); color: #fff; font-family: 'Noto Sans KR', sans-serif; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 420px; padding-bottom: 20px; display: flex; flex-direction: column; align-items: center; }

        /* ✅ 우측 상단 아주 작은 네모 언어 박스 */
        .header-top { width: 100%; padding: 10px 15px 5px 0; display: flex; justify-content: flex-end; }
        .lang-box { border: 0.5px solid var(--main-gold); padding: 1px 3px; border-radius: 2px; }
        .lang-select { background: transparent; color: var(--main-gold); border: none; font-size: 9px; font-weight: bold; outline: none; cursor: pointer; }

        .brand-title { font-family: 'Oswald', sans-serif; font-size: 32px; color: var(--main-gold); text-align: center; margin: 0; line-height: 1.1; letter-spacing: 1px; }
        .secure-node { color: var(--neon-green); font-size: 9px; text-align: center; margin-bottom: 12px; font-weight: bold; }

        /* 자산 섹션 */
        .asset-box { width: 92%; text-align: center; margin-bottom: 15px; }
        .ledger-label { color: var(--main-gold); font-size: 13px; margin-bottom: 5px; display: block; }
        .balance-main { font-size: 40px; font-weight: 800; margin: 5px 0; }
        .balance-main span { color: var(--sub-orange); font-size: 18px; }
        .gcv-value { border: 1.5px solid var(--neon-green); border-radius: 50px; padding: 6px; color: var(--neon-green); font-weight: bold; font-size: 13px; display: inline-block; width: 85%; }

        /* ✅ 6대 메뉴 그리드 (송금, 결제, 예치, 보상, 소득, 스왑) */
        .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; width: 90%; margin: 20px 0; }
        .menu-item { text-align: center; }
        .menu-item .icon-box { background: #1a1a1a; width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; margin: 0 auto 6px; border: 1px solid #333; }
        .menu-item i { font-size: 20px; color: var(--main-gold); }
        .menu-item span { font-size: 10.5px; color: #fff; font-weight: bold; }

        /* 유동성 섹션 */
        .staking-info { width: 88%; padding-left: 10px; border-left: 3px solid var(--main-gold); align-self: flex-start; margin-left: 5%; margin-bottom: 15px; }
        .staking-info .amount { font-size: 22px; font-weight: bold; letter-spacing: 0.5px; }
        .staking-info .status { color: #00e5ff; font-size: 10px; font-weight: bold; }

        /* 하단 버튼 그룹 */
        .action-btns { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; width: 92%; }
        .btn { padding: 10px 0; border-radius: 6px; font-weight: bold; font-size: 11px; border: none; color: white; }
        .btn-gray { background: #222; border: 1px solid var(--main-gold); }
        .btn-orange { background: var(--sub-orange); }
        .btn-green { background: #22c55e; }

        /* ✅ 초슬림 고객센터 배너 */
        .cs-slim-btn { width: 92%; background: linear-gradient(to right, #ff4500, #ff0000); color: white; padding: 9px; border-radius: 6px; margin-top: 15px; text-align: center; font-weight: bold; text-decoration: none; font-size: 12px; display: block; }

        .sns-section { display: flex; justify-content: center; gap: 30px; margin-top: 15px; width: 92%; }
        .sns-icon { font-size: 22px; color: #fff; text-decoration: none; }

        footer { margin-top: 20px; text-align: center; font-size: 8px; color: #444; line-height: 1.4; }
    </style>
</head>
<body>

<div class="container">
    <header class="header-top">
        <div class="lang-box">
            <select class="lang-select" onchange="updateLang(this.value)">
                <option value="KO">KO</option>
                <option value="JP">JP</option>
                <option value="EN">EN</option>
                <option value="CN">中文</option>
            </select>
        </div>
    </header>

    <h1 class="brand-title">HK WORLD BANK</h1>
    <div class="secure-node">🛡️ SECURE NODE: HK-V190-SUPREME</div>

    <div class="asset-box">
        <span class="ledger-label" id="txt-ledger">메인 자산 통합 원장</span>
        <div class="balance-main">400.0000 <span>Pi</span></div>
        <div class="gcv-value" id="txt-gcv">가치 평가: $ 125,663,600 (GCV)</div>
    </div>

    <div class="menu-grid">
        <div class="menu-item"><div class="icon-box"><i class="fa-solid fa-paper-plane"></i></div><span id="m1">송금</span></div>
        <div class="menu-item"><div class="icon-box"><i class="fa-solid fa-cart-shopping"></i></div><span id="m2">결제</span></div>
        <div class="menu-item"><div class="icon-box"><i class="fa-solid fa-vault"></i></div><span id="m3">예치</span></div>
        <div class="menu-item"><div class="icon-box"><i class="fa-solid fa-gift"></i></div><span id="m4">보상</span></div>
        <div class="menu-item"><div class="icon-box"><i class="fa-solid fa-scale-balanced"></i></div><span id="m5">소득</span></div>
        <div class="menu-item"><div class="icon-box"><i class="fa-solid fa-rotate"></i></div><span id="m6">스왑</span></div>
    </div>

    <div class="staking-info">
        <div class="amount">88,401,773,756</div>
        <div class="status" id="txt-shield">HK_퀀텀_쉴드_활성</div>
    </div>

    <div class="action-btns">
        <button class="btn btn-gray" id="b1">Pi 수량</button>
        <button class="btn btn-orange" id="b2">SWAP</button>
        <button class="btn btn-green" id="b3">LP 공급</button>
    </div>

    <a href="#" class="cs-slim-btn" id="txt-cs">24/7 글로벌 고객지원센터</a>

    <div class="sns-section">
        <a href="#" class="sns-icon"><i class="fa-brands fa-youtube" style="color:red;"></i></a>
        <a href="#" class="sns-icon"><i class="fa-brands fa-tiktok"></i></a>
    </div>

    <footer>
        © 2026 HK GROUP GLOBAL HEGEMONY.<br>
        CHAIRMAN LEE JAEWAN. ALL RIGHTS RESERVED.
    </footer>
</div>

<script>
    function updateLang(lang) {
        const d = {
            'KO': {lg:'메인 자산 통합 원장', gcv:'가치 평가: $ 125,663,600 (GCV)', m1:'송금', m2:'결제', m3:'예치', m4:'보상', m5:'소득', m6:'스왑', sh:'HK_퀀텀_쉴드_활성', cs:'24/7 글로벌 고객지원센터', b1:'Pi 수량'},
            'JP': {lg:'メイン資産統合台帳', gcv:'GCV: $ 125,663,600', m1:'送金', m2:'決済', m3:'預金', m4:'報酬', m5:'所得', m6:'スワップ', sh:'HK_クォンタム_シールド_活性', cs:'24/7 グローバルサポート', b1:'Pi 数量'},
            'EN': {lg:'Main Asset Ledger', gcv:'GCV: $ 125,663,600', m1:'Send', m2:'Pay', m3:'Vault', m4:'Reward', m5:'Income', m6:'Swap', sh:'HK_Quantum_Shield_Active', cs:'24/7 Global Support', b1:'Pi Qty'},
            'CN': {ledger:'主资产合并账本', m1:'转账', m2:'支付', m3:'存款', m4:'奖励', m5:'收益', m6:'交换', cs:'24/7 全球客户服务', b1:'Pi 数量'}
        };
        const s = d[lang] || d['KO'];
        document.getElementById('txt-ledger').innerText = s.lg || s.ledger;
        document.getElementById('txt-gcv').innerText = s.gcv || 'GCV: $ 125,663,600';
        document.getElementById('m1').innerText = s.m1; document.getElementById('m2').innerText = s.m2;
        document.getElementById('m3').innerText = s.m3; document.getElementById('m4').innerText = s.m4;
        document.getElementById('m5').innerText = s.m5; document.getElementById('m6').innerText = s.m6;
        document.getElementById('txt-shield').innerText = s.sh || 'HK_Shield_Active';
        document.getElementById('txt-cs').innerText = s.cs;
        document.getElementById('b1').innerText = s.b1;
    }
</script>
</body>
</html>
