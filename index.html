<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;900&display=swap');
        body { background: #000; color: #fff; font-family: 'Noto Sans KR', sans-serif; overflow-x: hidden; }
        /* 화면 깨짐 방지: 폰트 크기 자동 조절 */
        .asset-val { font-size: clamp(3rem, 16vw, 6rem); font-weight: 900; background: linear-gradient(180deg, #FFF 20%, #FFD700 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1.1; }
        /* 20개국어 스크롤박스 */
        #lang-menu { display: none; position: absolute; right: 0; top: 55px; width: 180px; max-height: 350px; overflow-y: auto; background: #111; border: 1px solid #333; border-radius: 15px; z-index: 9999; box-shadow: 0 10px 30px rgba(0,0,0,1); }
        .l-item { padding: 12px 15px; border-bottom: 1px solid #222; cursor: pointer; font-size: 14px; display: flex; align-items: center; gap: 10px; }
        .l-item:hover { background: #1a1a1a; }
    </style>
</head>
<body class="max-w-md mx-auto p-6 min-h-screen relative">

    <div class="flex justify-between items-center relative mb-12">
        <h1 class="text-xl font-black text-yellow-500 italic tracking-tighter">HK WORLD BANK</h1>
        <div class="relative">
            <button onclick="document.getElementById('lang-menu').style.display='block'" class="bg-zinc-900 border border-zinc-700 px-4 py-2 rounded-full text-[11px] font-bold flex items-center gap-2">
                <img id="cur-f" src="https://flagcdn.com/w20/kr.png" class="w-4 h-3"> <span id="cur-n">KOREA</span> <i class="fa-solid fa-caret-down text-zinc-600"></i>
            </button>
            <div id="lang-menu">
                <div class="l-item" onclick="setL('KR','kr','KOREA')"><img src="https://flagcdn.com/w20/kr.png" class="w-4"> 한국어</div>
                <div class="l-item" onclick="setL('US','us','USA')"><img src="https://flagcdn.com/w20/us.png" class="w-4"> English</div>
                <div class="l-item" onclick="setL('CN','cn','CHINA')"><img src="https://flagcdn.com/w20/cn.png" class="w-4"> 中文</div>
                <div class="l-item" onclick="setL('VN','vn','VIETNAM')"><img src="https://flagcdn.com/w20/vn.png" class="w-4"> Tiếng Việt</div>
                <div class="l-item" onclick="setL('SA','sa','ARABIA')"><img src="https://flagcdn.com/w20/sa.png" class="w-4"> العربية</div>
                <div class="l-item" onclick="setL('RU','ru','RUSSIA')"><img src="https://flagcdn.com/w20/ru.png" class="w-4"> Русский</div>
                <div class="l-item" onclick="setL('JP','jp','JAPAN')"><img src="https://flagcdn.com/w20/jp.png" class="w-4"> 日本語</div>
                <div class="l-item" onclick="setL('DE','de','GERMANY')"><img src="https://flagcdn.com/w20/de.png" class="w-4"> Deutsch</div>
                <div class="l-item" onclick="setL('FR','fr','FRANCE')"><img src="https://flagcdn.com/w20/fr.png" class="w-4"> Français</div>
                <div class="l-item" onclick="setL('BR','br','BRAZIL')"><img src="https://flagcdn.com/w20/br.png" class="w-4"> Português</div>
            </div>
        </div>
    </div>

    <div class="text-center mb-10">
        <p id="t-l" class="text-zinc-500 text-[10px] font-black tracking-widest uppercase mb-4">MAIN ASSET INTEGRATED LEDGER</p>
        <div class="asset-val italic">400.0212</div>
        <p class="text-4xl font-black text-yellow-500 italic mt-2">Pi</p>
        <div class="mt-8 border-2 border-green-500 bg-green-500/5 rounded-full py-3 px-8 inline-block">
            <span id="t-g" class="text-green-400 font-black text-lg italic">가치 평가: $ 125,663,600 (GCV)</span>
        </div>
    </div>

    <div class="grid grid-cols-3 gap-3 mb-12">
        <div class="bg-zinc-900 p-5 rounded-2xl border border-zinc-800 text-center shadow-lg"><i class="fa-solid fa-paper-plane text-red-500 text-xl mb-2"></i><p id="b1" class="text-[10px] font-bold">송금</p></div>
        <div class="bg-zinc-900 p-5 rounded-2xl border border-zinc-800 text-center opacity-40"><i class="fa-solid fa-cart-shopping text-zinc-500 text-xl mb-2"></i><p id="b2" class="text-[10px] font-bold">결제</p></div>
        <div class="bg-zinc-900 p-5 rounded-2xl border border-yellow-600 text-center ring-2 ring-yellow-500/10"><i class="fa-solid fa-vault text-yellow-500 text-xl mb-2"></i><p id="b3" class="text-[10px] font-black text-yellow-500 italic">예치(31.4%)</p></div>
    </div>

    <div class="space-y-4">
        <button id="b-cs" class="w-full bg-red-600 py-5 rounded-2xl font-black text-xl shadow-2xl">글로벌 고객지원센터</button>
        <div class="flex gap-4">
            <a href="https://www.youtube.com/@Hyekong2025" target="_blank" class="flex-1 bg-red-600 py-4 rounded-2xl text-center font-black text-xs">YOUTUBE</a>
            <a href="https://www.tiktok.com/@hyekong2025" target="_blank" class="flex-1 bg-zinc-900 border border-zinc-800 py-4 rounded-2xl text-center font-black text-xs">TIKTOK</a>
        </div>
    </div>

    <script>
        function setL(c, f, n) {
            document.getElementById('cur-f').src = `https://flagcdn.com/w20/${f}.png`;
            document.getElementById('cur-n').innerText = n;
            document.getElementById('lang-menu').style.display = 'none';
            
            // 20개국 대응 딕셔너리
            const dict = {
                'KR': {l:'메인 자산 통합 원장', g:'가치 평가: $ 125,663,600 (GCV)', b1:'송금', b2:'결제', b3:'예치(31.4%)', cs:'글로벌 고객지원센터'},
                'US': {l:'MAIN ASSET INTEGRATED LEDGER', g:'VALUATION: $ 125,663,600 (GCV)', b1:'SEND', b2:'PAY', b3:'STAKE(31.4%)', cs:'SUPPORT CENTER'},
                'CN': {l:'主资产综合账本', g:'估值: $ 125,663,600 (GCV)', b1:'转账', b2:'支付', b3:'质押', cs:'客服中心'},
                'SA': {l:'دفتر الأصول الرئيسي', g:'التقييم: $ 125,663,600 (GCV)', b1:'إرسال', b2:'دفع', b3:'رهان', cs:'مركز الدعم'},
                'RU': {l:'ГЛАВНЫЙ КНИГА АКТИВОВ', g:'ОЦЕНКА: $ 125,663,600 (GCV)', b1:'ОТПРАВИТЬ', b2:'ОПЛАТИТЬ', b3:'СТЕЙКИНГ', cs:'ПОДДЕРЖКА'}
            };

            const s = dict[c] || dict['US'];
            document.getElementById('t-l').innerText = s.l;
            document.getElementById('t-g').innerText = s.g;
            document.getElementById('b1').innerText = s.b1;
            document.getElementById('b2').innerText = s.b2;
            document.getElementById('b3').innerText = s.b3;
            document.getElementById('b-cs').innerText = s.cs;
        }

        window.onclick = function(e) { 
            if(!e.target.closest('.relative')) document.getElementById('lang-menu').style.display='none'; 
        }
    </script>
</body>
</html>
