
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HK WORLD BANK</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script>Pi.init({ version: "1.5", sandbox: true });</script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --hk-gold: #FFD700; --hk-dark: #000; --hk-green: #00FF00; --hk-blue: #007AFF; --hk-cyan: #00FFFF; }
        * { box-sizing: border-box; margin: 0; padding: 0; word-break: keep-all; }
        body { background-color: var(--hk-dark); color: white; font-family: -apple-system, sans-serif; display: flex; justify-content: center; }
        .wrapper { width: 100%; max-width: 480px; padding: 20px; }
        .top-nav { display: flex; justify-content: flex-end; margin-bottom: 10px; }
        .lang-select { background: #111; color: var(--hk-gold); border: 1px solid var(--hk-gold); padding: 5px 8px; border-radius: 6px; font-size: 12px; font-weight: bold; cursor: pointer; }
        .brand { font-size: 32px; font-weight: 900; color: var(--hk-gold); margin: 20px 0; letter-spacing: -1px; text-align: center; }
        .asset-card { background: linear-gradient(180deg, #1a1a1a, #000); border-radius: 25px; padding: 40px 15px; text-align: center; border: 1px solid #333; margin-bottom: 25px; }
        .asset-val { font-size: 50px; font-weight: 900; margin: 10px 0; }
        .gcv-badge { display: inline-block; padding: 8px 20px; border-radius: 50px; border: 1.5px solid var(--hk-green); color: var(--hk-green); font-size: 15px; font-weight: bold; }
        .grid-6 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 25px; }
        .grid-box { background: #111; padding: 25px 5px; border-radius: 15px; text-align: center; border: 1px solid #222; cursor: pointer; }
        .grid-box i { font-size: 30px; margin-bottom: 10px; display: block; }
        .grid-box span { font-size: 14px; font-weight: bold; }
        .stake-info { background: #0a0a0a; border-left: 5px solid var(--hk-gold); padding: 20px; margin-bottom: 25px; border-radius: 0 15px 15px 0; }
        .action-btns { display: flex; gap: 10px; margin-bottom: 15px; }
        .act-btn { flex: 1; padding: 18px 5px; border-radius: 12px; border: none; font-weight: 900; font-size: 14px; cursor: pointer; }
        .white { background: #fff; color: #000; }
        .gold { background: var(--hk-gold); color: #000; }
        .green { background: #00c853; color: #fff; }
        .cs-wide { width: 100%; padding: 18px; background: #ff4444; color: #fff; border: none; border-radius: 12px; font-weight: 900; font-size: 16px; margin-bottom: 15px; cursor: pointer; }
        .sns-row { display: flex; gap: 10px; margin-bottom: 25px; }
        .sns-btn { flex: 1; padding: 15px; border-radius: 12px; text-decoration: none; color: #fff; text-align: center; font-weight: 900; font-size: 14px; }
        .security-deep { background: rgba(255, 255, 255, 0.05); border: 1px solid #333; border-radius: 20px; padding: 20px; margin-bottom: 30px; }
        footer { text-align: center; border-top: 1px solid #222; padding-top: 40px; padding-bottom: 40px; }
        #payModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 10000; justify-content: center; align-items: center; }
        .modal-box { background: #1a1a1a; width: 85%; max-width: 360px; padding: 30px; border-radius: 20px; border: 1px solid var(--hk-gold); text-align: center; }
        #payInput { width: 100%; padding: 15px; margin-top: 15px; background: #000; border: 1px solid #333; color: #fff; text-align: center; font-size: 24px; border-radius: 10px; outline: none; }
        .pay-confirm { width: 100%; padding: 15px; background: var(--hk-gold); border: none; border-radius: 10px; font-weight: 900; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="top-nav">
        <select class="lang-select" id="langSel" onchange="applyLang()">
            <option value="ko">한국어 🇰🇷</option><option value="en">English 🇺🇸</option>
            <option value="zh">中文 🇨🇳</option><option value="ja">日本語 🇯🇵</option>
            <option value="vi">Tiếng Việt 🇻🇳</option><option value="th">ไทย 🇹🇭</option>
        </select>
    </div>

    <div class="brand">HK WORLD BANK</div>

    <div class="asset-card">
        <div id="t-ledger" style="color:var(--hk-gold); font-weight:bold; margin-bottom:10px;">메인 자산 통합 원장</div>
        <div class="asset-val">400.0212 <span style="color:var(--hk-gold); font-size:0.5em;">Pi</span></div>
        <div class="gcv-badge" id="t-gcv">가치 평가: $ 125,663,600 (GCV)</div>
    </div>

    <div class="grid-6">
        <div class="grid-box"><i class="fas fa-paper-plane" style="color:var(--hk-blue)"></i><span data-k="send">송금</span></div>
        <div class="grid-box" onclick="openPay()"><i class="fas fa-shopping-cart" style="color:#FF9500"></i><span data-k="pay">결제</span></div>
        <div class="grid-box"><i class="fas fa-piggy-bank" style="color:var(--hk-gold)"></i><span data-k="save">예치</span></div>
        <div class="grid-box"><i class="fas fa-gift" style="color:#FF3B30"></i><span data-k="reward">보상</span></div>
        <div class="grid-box"><i class="fas fa-balance-scale" style="color:#AF52DE"></i><span data-k="ubi">기본소득</span></div>
        <div class="grid-box"><i class="fas fa-rotate" style="color:var(--hk-cyan)"></i><span data-k="swap2">스왑</span></div>
    </div>

    <div class="stake-info">
        <div id="t-stk" style="color:var(--hk-gold); font-size:14px; font-weight:bold;">Staking 31.4% | 유동성풀 $</div>
        <div style="font-size:26px; font-weight:900;">88,410,819,601</div>
    </div>

    <div class="action-btns">
        <button class="act-btn white" id="b-pi">PI 수량</button>
        <button class="act-btn gold" id="b-swap">SWAP</button>
        <button class="act-btn green" id="b-lp">LP 공급</button>
    </div>

    <button class="cs-wide" id="t-cs" onclick="location.href='mailto:info@hkwb.world'">글로벌 고객지원센터</button>

    <div class="sns-row">
        <a href="https://www.youtube.com/@Hyekong2025" target="_blank" class="sns-btn" style="background:#f00;">YOUTUBE</a>
        <a href="https://www.tiktok.com/@hyekong2025" target="_blank" class="sns-btn" style="background:#000; border:1px solid #444;">TIKTOK</a>
    </div>

    <div class="security-deep">
        <div id="t-sec-head" style="color:var(--hk-cyan); font-weight:900; margin-bottom:15px;">HK QUANTUM SHIELD ACTIVE</div>
        <ul style="list-style:none; font-size:13px; line-height:1.6;">
            <li id="t-sec-1">양자 암호화 보안 적용</li>
            <li id="t-sec-2">자산 보호 프로토콜 가동</li>
        </ul>
    </div>

    <footer>
        <div style="color:var(--hk-gold); font-size:36px; font-weight:900; margin-bottom:10px;">APY 31.4%</div>
        <p style="color:#555; font-size:11px;">Chairman Lee Jaewan (Hyekong)<br>&copy; 2026 HK Group.</p>
    </footer>
</div>

<div id="payModal">
    <div class="modal-box">
        <h2 id="m-title" style="color:var(--hk-gold);">PI 결제</h2>
        <input type="number" id="payInput" placeholder="0.00 Pi">
        <button class="pay-confirm" onclick="executePay()" id="m-btn">결제 승인</button>
        <p style="margin-top:15px; color:#666; cursor:pointer;" onclick="closePay()">취소</p>
    </div>
</div>

<script>
    // ★★★ [수정] 형님의 지갑 주소를 여기에 꼭 넣으세요 ★★★
    const MASTER_WALLET = "G...형님의_긴_지갑_주소를_여기에_복사하세요";

    const i18n = {
        ko: { ledger:"메인 자산 통합 원장", gcv:"가치 평가: $ 125,663,600 (GCV)", send:"송금", pay:"결제", save:"예치", reward:"보상", ubi:"기본소득", swap2:"스왑", pi:"PI 수량", swap:"SWAP", lp:"LP 공급", cs:"글로벌 고객지원센터", stk:"Staking 31.4% | 유동성풀 $", secH:"HK 양자 방패 가동 중", s1:"양자 암호화 보안 적용", s2:"자산 보호 프로토콜 가동", pT:"PI 결제", pB:"결제 승인", pM:" Pi 결제가 성공했습니다" },
        en: { ledger:"Main Asset Ledger", gcv:"Value: $ 125,663,600 (GCV)", send:"Send", pay:"Pay", save:"Save", reward:"Reward", ubi:"UBI", swap2:"Swap", pi:"PI Qty", swap:"SWAP", lp:"LP Supply", cs:"Global CS Center", stk:"Staking 31.4% | LP Pool $", secH:"HK QUANTUM SHIELD ACTIVE", s1:"Quantum Encryption", s2:"Asset Protection", pT:"PI Payment", pB:"Approve", pM:" Pi payment successful" }
    };

    function applyLang() {
        const lang = document.getElementById('langSel').value;
        const d = i18n[lang] || i18n['en'];
        document.getElementById('t-ledger').innerText = d.ledger;
        document.getElementById('t-gcv').innerText = d.gcv;
        document.getElementById('b-pi').innerText = d.pi;
        document.getElementById('b-swap').innerText = d.swap;
        document.getElementById('b-lp').innerText = d.lp;
        document.getElementById('t-cs').innerText = d.cs;
        document.getElementById('t-stk').innerText = d.stk;
        document.getElementById('t-sec-head').innerText = d.secH;
        document.getElementById('t-sec-1').innerText = d.s1;
        document.getElementById('t-sec-2').innerText = d.s2;
        document.getElementById('m-title').innerText = d.pT;
        document.getElementById('m-btn').innerText = d.pB;
        document.querySelectorAll('.grid-box span').forEach(s => {
            const k = s.getAttribute('data-k');
            if(d[k]) s.innerText = d[k];
        });
    }

    function openPay() { document.getElementById('payModal').style.display = 'flex'; document.getElementById('payInput').focus(); }
    function closePay() { document.getElementById('payModal').style.display = 'none'; document.getElementById('payInput').value = ''; }

    async function executePay() {
        const amt = document.getElementById('payInput').value;
        const lang = document.getElementById('langSel').value;
        const msg = i18n[lang]?.pM || i18n['en'].pM;

        if(amt <= 0) { alert("Enter amount"); return; }

        try {
            // 진짜 지갑 결제 시도
            const payment = await Pi.createPayment({
                amount: parseFloat(amt),
                memo: "HK WORLD BANK 입금",
                metadata: { receiver: MASTER_WALLET }
            }, {
                onReadyForServerApproval: (id) => { console.log(id); },
                onReadyForServerCompletion: (id, txid) => {
                    // 결제 후 지갑주소와 거래번호 출력
                    alert(`[결제성공]\n수령지: ${MASTER_WALLET}\n거래번호: ${txid}\n내용: ${amt}${msg}`);
                    closePay();
                },
                onCancel: () => { alert("취소됨"); },
                onError: (e) => { alert("에러: " + e.message); }
            });
        } catch (err) {
            // 파이 브라우저가 아닐 때 확인용
            alert(`[테스트 모드]\n입금 지갑: ${MASTER_WALLET}\n금액: ${amt} Pi\n실제 결제는 파이 브라우저에서만 가능합니다.`);
            closePay();
        }
    }
    window.onload = applyLang;
</script>
</body>
</html>
