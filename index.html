        // 결제 모달 텍스트 변경
        document.getElementById('m-title').innerText = d.payTitle;
        document.getElementById('m-btn').innerText = d.payBtn;

        const gridItems = document.querySelectorAll('.grid-box span');
        gridItems.forEach(span => {
            const key = span.getAttribute('data-k');
            if (d[key]) span.innerText = d[key];
        });
    }

    // 결제 구동 로직
    function processPayment() {
        const amount = document.getElementById('payInput').value;
        const lang = document.getElementById('langSel').value;
        const msg = i18n[lang]?.payMsg || i18n['en'].payMsg;
        
        if(amount > 0) {
            // 현재 선택된 언어에 맞는 메시지가 알림창으로 뜹니다
            alert(amount + msg); 
            closePayModal();
        } else {
            alert("Please enter a valid amount.");
        }
    }

    // 모달 제어 함수 (이전과 동일)
    function openPayModal() { document.getElementById('payModal').style.display = 'flex'; document.getElementById('payInput').focus(); }
    function closePayModal() { document.getElementById('payModal').style.display = 'none'; document.getElementById('payInput').value = ''; }
