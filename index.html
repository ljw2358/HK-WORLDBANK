
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK WORLD BANK - Global Industrial Leader</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --hk-gold: #FFD700; --hk-dark: #000000; --hk-green: #00FF00;
            --hk-red: #FF3B30; --hk-blue: #007AFF; --hk-orange: #FF9500;
            --hk-purple: #AF52DE; --hk-cyan: #00F2FF;
        }
        body { margin: 0; background-color: var(--hk-dark); color: white; font-family: 'Pretendard', sans-serif; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 1200px; padding: 40px 20px; }
        
        /* 상단 바 */
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 20px; border-bottom: 1px solid #222; }
        .brand { font-size: 32px; font-weight: 900; color: var(--hk-gold); }
        .lang-select { background: #111; color: white; border: 1px solid var(--hk-gold); padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; }

        /* 메인 전광판 */
        .asset-card { background: #0a0a0a; margin: 30px 0; padding: 60px 20px; border-radius: 30px; text-align: center; border: 1px solid #333; }
        .ledger-title { color: var(--hk-gold); font-size: 22px; font-weight: bold; margin-bottom: 15px; }
        .balance { font-size: 90px; font-weight: 900; }
        .pi-unit { color: var(--hk-gold); font-size: 45px; margin-left: 10px; }
        .gcv-badge { display: inline-block; padding: 15px 40px; border-radius: 50px; border: 2px solid var(--hk-green); color: var(--hk-green); font-size: 24px; font-weight: bold; margin-top: 25px; }

        /* 메뉴 그리드 */
        .nav-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 30px; }
        .nav-item { background: #111; padding: 40px; border-radius: 20px; text-align: center; border: 1px solid #222; }
        .nav-item i { font-size: 35px; margin-bottom: 15px; display: block; }
        .nav-item span { font-size: 20px; font-weight: bold; }

        /* 보안 섹션 (Quantum Shield) */
        .security-box { background: rgba(0, 242, 255, 0.05); padding: 35px; border-radius: 20px; border: 1px solid var(--hk-cyan); margin-top: 40px; }
        .security-title { color: var(--hk-cyan); font-size: 20px; font-weight: bold; margin-bottom: 20px; }
        .security-list { list-style: none; color: #ccc; font-size: 18px; line-height: 2.2; }

        /* 형님 강조 예치 APY */
        .apy-area { text-align: center; padding: 60px 0; color: var(--hk-gold); font-size: 42px; font-weight: 900; border-top: 1px solid #333; margin-top: 50px; }
    </style>
</head>
<body>

<div class="container">
    <div class="top-bar">
        <div class="brand">HK WORLD BANK</div>
        <select class="lang-select" id="langBox" onchange="applyTranslation()">
            <option value="ko">한국어 🇰🇷</option>
            <option value="en">English 🇺🇸</option>
            <option value="zh">中文 🇨🇳</option>
            <option value="ja">日本語 🇯🇵</option>
        </select>
    </div>

    <div class="asset-card">
        <div class="ledger-title" id="txt-ledger">메인 자산 통합 원장</div>
        <div class="balance">400.0212 <span class="pi-unit">Pi</span></div>
        <div class="gcv-badge" id="txt-gcv">가치 평가: $ 125,663,600 (GCV)</div>
    </div>

    <div class="nav-grid">
        <div class="nav-item"><i class="fas fa-paper-plane" style="color:var(--hk-blue)"></i><span data-key="send">송금</span></div>
        <div class="nav-item"><i class="fas fa-shopping-cart" style="color:var(--hk-orange)"></i><span data-key="pay">결제</span></div>
        <div class="nav-item"><i class="fas fa-piggy-bank" style="color:var(--hk-gold)"></i><span data-key="save">예치</span></div>
    </div>

    <div class="security-box">
        <div class="security-title"><i class="fas fa-shield-halved"></i> HK QUANTUM SHIELD ACTIVE</div>
        <ul class="security-list">
            <li id="s1">개인정보보호법 준수: 양자 암호화 보안 적용</li>
            <li id="s2">Form of Private: 자산 보호 프로토콜 가동</li>
            <li id="s3">HK-ROBOT: AI 실시간 위협 탐지 중</li>
        </ul>
    </div>

    <div class="apy-area" id="txt-apy">예치 (APY 31.4%)</div>
</div>

<script>
    // 15개국어 확장이 가능한 데이터 구조
    const langData = {
        ko: { 
            ledger: "메인 자산 통합 원장", 
            gcv: "가치 평가: $ 125,663,600 (GCV)", 
            send: "송금", pay: "결제", save: "예치", 
            apy: "예치 (APY 31.4%)", 
            s1: "개인정보보호법 준수: 양자 암호화 보안 적용", 
            s2: "Form of Private: 자산 보호 프로토콜 가동", 
            s3: "HK-ROBOT: AI 실시간 위협 탐지 중" 
        },
        en: { 
            ledger: "Main Asset Ledger", 
            gcv: "Evaluation: $ 125,663,600 (GCV)", 
            send: "Transfer", pay: "Payment", save: "Deposit", 
            apy: "Deposit (APY 31.4%)", 
            s1: "Privacy Law: Quantum Encryption Applied", 
            s2: "Form of Private: Asset Protocol Active", 
            s3: "HK-ROBOT: AI Real-time Threat Detection" 
        },
        zh: { 
            ledger: "主资产整合账本", 
            gcv: "价值评估: $ 125,663,600 (GCV)", 
            send: "转账", pay: "支付", save: "存款", 
            apy: "存款 (APY 31.4%)", 
            s1: "隐私法合规：应用量子加密安全", 
            s2: "Form of Private: 资产保护协议启动", 
            s3: "HK-ROBOT: AI 实时威胁检测中" 
        },
        ja: { 
            ledger: "メイン資産統合台帳", 
            gcv: "評価額: $ 125,663,600 (GCV)", 
            send: "送金", pay: "決済", save: "預金", 
            apy: "預金 (APY 31.4%)", 
            s1: "個人情報保護法遵守：量子暗号セキュリティ", 
            s2: "Form of Private: 資産保護プロトコル稼동", 
            s3: "HK-ROBOT: AI リアルタイム脅威検知中" 
        }
    };

    function applyTranslation() {
        const selected = document.getElementById('langBox').value;
        const d = langData[selected];

        // 개별 ID 매칭
        document.getElementById('txt-ledger').innerText = d.ledger;
        document.getElementById('txt-gcv').innerText = d.gcv;
        document.getElementById('txt-apy').innerText = d.apy;
        document.getElementById('s1').innerText = d.s1;
        document.getElementById('s2').innerText = d.s2;
        document.getElementById('s3').innerText = d.s3;

        // 메뉴 아이템 일괄 변경
        document.querySelectorAll('[data-key]').forEach(el => {
            el.innerText = d[el.getAttribute('data-key')];
        });
    }

    // 초기 실행 (한국어 설정)
    window.onload = applyTranslation;
</script>

</body>
</html>
