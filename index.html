<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK WORLD BANK</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Noto Sans KR', sans-serif;
            margin: 0; padding: 15px;
            display: flex; flex-direction: column; align-items: center;
        }

        /* 헤더: 로고 및 노드 정보 */
        .header { width: 100%; max-width: 500px; text-align: left; padding: 20px 0; }
        .logo { color: #FFB400; font-size: 3.5rem; font-weight: 900; margin: 0; }
        .node-status { color: #00E676; font-size: 1.4rem; font-weight: bold; margin-top: 10px; }

        /* 메인 자산 카드 */
        .asset-card {
            background: #111111; border: 2px solid #333333; border-radius: 45px;
            width: 100%; max-width: 500px; padding: 45px 15px; text-align: center;
            margin-bottom: 25px;
        }
        .asset-title { color: #FFB400; font-size: 2.2rem; font-weight: 700; margin-bottom: 25px; }
        .asset-value { font-size: 5.5rem; font-weight: 900; border-bottom: 5px solid #FFB400; display: inline-block; padding-bottom: 5px; }
        .gcv-box { border: 4px solid #00E676; border-radius: 60px; padding: 20px; color: #00E676; font-size: 2.2rem; font-weight: 900; margin-top: 30px; }

        /* 6구 메뉴 그리드 */
        .menu-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px;
            width: 100%; max-width: 500px; margin-bottom: 30px;
        }
        .menu-item {
            background: #151515; border-radius: 25px; padding: 35px 5px;
            text-align: center; border: 1px solid #252525;
        }
        .menu-icon { font-size: 3.2rem; display: block; margin-bottom: 15px; }
        .menu-text { font-size: 1.6rem; font-weight: 800; }

        /* 스테이킹 정보 */
        .staking-info {
            width: 100%; max-width: 500px; text-align: left;
            border-left: 8px solid #FFB400; padding-left: 20px; margin-bottom: 30px;
        }
        .apr-tag { color: #FFB400; font-size: 2.2rem; font-weight: 900; }
        .pool-label { color: #FFB400; font-size: 1.5rem; margin: 10px 0; }
        .pool-value { font-size: 4.2rem; font-weight: 900; letter-spacing: -2px; }
        .shield-tag { color: #00E676; font-size: 1.3rem; font-weight: bold; margin-top: 10px; }

        /* 하단 3개 버튼 */
        .action-btns {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
            width: 100%; max-width: 500px; margin-bottom: 20px;
        }
        .btn { border-radius: 15px; padding: 25px 5px; font-size: 1.6rem; font-weight: 900; border: none; color: #fff; cursor: pointer; }
        .btn-black { background: #222; border: 1px solid #444; }
        .btn-gold { background: #FFB400; color: #000; }
        .btn-green { background: #00E676; color: #000; }

        /* 고객지원센터 (빨간 버튼) */
        .support-btn {
            background: #FF5252; width: 100%; max-width: 500px;
            border-radius: 30px; padding: 30px; text-align: center;
            font-size: 2rem; font-weight: 900; margin-bottom: 30px;
        }

        /* 소셜 미디어 버튼 */
        .social-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px;
            width: 100%; max-width: 500px; margin-bottom: 50px;
        }
        .social-item { background: #111; border-radius: 25px; padding: 25px; text-align: center; border: 1px solid #333; }
        .social-icon { font-size: 2.5rem; margin-bottom: 10px; display: block; }
        .social-name { font-size: 1.3rem; font-weight: bold; }

        /* 푸터 */
        .footer { text-align: center; font-size: 1rem; color: #666; line-height: 1.6; border-top: 1px solid #222; width: 100%; padding-top: 30px; }
    </style>
</head>
<body>

    <div class="header">
        <h1 class="logo">HK WORLD BANK</h1>
        <div class="node-status">🚀 SECURE NODE: ACTIVE</div>
    </div>

    <div class="asset-card">
        <div class="asset-title">메인 자산 통합 원장</div>
        <div id="pi-val" class="asset-value">400.0115 <span style="font-size: 3rem; color: #FFB400;">Pi</span></div>
        <div class="gcv-box">가치 평가: $ 125,663,600 (GCV)</div>
    </div>

    <div class="menu-grid">
        <div class="menu-item"><span class="menu-icon">🚀</span><span class="menu-text">송금</span></div>
        <div class="menu-item"><span class="menu-icon">🛒</span><span class="menu-text">결제</span></div>
        <div class="menu-item"><span class="menu-icon">💿</span><span class="menu-text">예치</span></div>
        <div class="menu-item"><span class="menu-icon">🎁</span><span class="menu-text">보상</span></div>
        <div class="menu-item"><span class="menu-icon">⚖️</span><span class="menu-text">소득</span></div>
        <div class="menu-item"><span class="menu-icon">🔄</span><span class="menu-text">스왑</span></div>
    </div>

    <div class="staking-info">
        <div class="apr-tag">STAKING APR 31.4%</div>
        <div class="pool-label">유동성 풀 $</div>
        <div id="pool-val" class="pool-value">88,401,773,756</div>
        <div class="shield-tag">HK_퀀텀_쉴드_활성</div>
    </div>

    <div class="action-btns">
        <button class="btn btn-black">Pi 수량</button>
        <button class="btn btn-gold">SWAP</button>
        <button class="btn btn-green">LP 공급</button>
    </div>

    <div class="support-btn">🎧 24/7 글로벌 고객지원센터</div>

    <div class="social-grid">
        <div class="social-item"><span class="social-icon" style="color: #ff0000;">▶</span><span class="social-name">hyekong2025</span></div>
        <div class="social-item"><span class="social-icon">♪</span><span class="social-name">hyekong2025</span></div>
    </div>

    <div class="footer">
        © 2026 HK GROUP GLOBAL MANAGEMENT. GCV<br>
        <strong>CHAIRMAN LEE JAE-WAN</strong>. ALL RIGHTS RESERVED.
    </div>

    <script>
        // 형님, 실시간으로 숫자가 올라가는 '구동 엔진'입니다.
        let pi = 400.0115;
        let pool = 88401773756;

        setInterval(() => {
            pi += 0.0001;
            pool += Math.floor(Math.random() * 2000) + 500;
            document.getElementById('pi-val').innerHTML = pi.toFixed(4) + ' <span style="font-size: 3rem; color: #FFB400;">Pi</span>';
            document.getElementById('pool-val').innerText = pool.toLocaleString();
        }, 1500);
    </script>

</body>
</html>
