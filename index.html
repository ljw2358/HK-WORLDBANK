<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HK WORLD BANK Official</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --hk-gold: #FFD700; --hk-dark: #000; --hk-green: #00FF00; --hk-cyan: #00FFFF; }
        body { background-color: var(--hk-dark); color: white; font-family: 'Noto Sans KR', sans-serif; display: flex; justify-content: center; margin: 0; }
        .wrapper { width: 100%; max-width: 430px; padding: 15px; display: flex; flex-direction: column; align-items: center; }

        /* 1. 언어 선택 (15개국 설정) */
        .top-nav { width: 100%; display: flex; justify-content: flex-end; margin-bottom: 10px; }
        .lang-select { background: #111; color: var(--hk-gold); border: 1px solid var(--hk-gold); padding: 5px; border-radius: 5px; font-weight: bold; }

        .brand { font-size: 32px; font-weight: 900; color: var(--hk-gold); margin: 20px 0 5px; text-align: center; }
        .sub-brand { font-size: 13px; color: #ccc; margin-bottom: 25px; text-align: center; }

        /* 자산 정보 */
        .asset-card { width: 95%; background: #111; border-radius: 20px; padding: 25px 10px; text-align: center; border: 1px solid #333; margin-bottom: 15px; }
        .asset-title { color: var(--hk-gold); font-weight: bold; font-size: 16px; margin-bottom: 10px; }
        .asset-val { font-size: 40px; font-weight: 900; margin: 10px 0; letter-spacing: -1px; }
        .gcv-badge { display: inline-block; padding: 6px 12px; border-radius: 50px; border: 1px solid var(--hk-green); color: var(--hk-green); font-size: 14px; font-weight: bold; }

        /* 메뉴 격자 */
        .menu-grid { width: 100%; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
        .menu-item { background: #151515; padding: 15px 5px; border-radius: 12px; text-align: center; border: 1px solid #222; }
        .menu-item i { font-size: 22px; margin-bottom: 8px; display: block; }
        .menu-text { font-size: 12px; font-weight: bold; }

        /* 하단 주요 버튼 */
        .staking-info { color: var(--hk-gold); font-size: 14px; font-weight: bold; margin-bottom: 10px; width: 100%; text-align: left; padding-left: 10px; }
        .btn-row { width: 100%; display: flex; gap: 8px; margin-bottom: 12px; }
        .act-btn { flex: 1; padding: 15px; border-radius: 10px; border: none; font-weight: 900; font-size: 14px; cursor: pointer; }
        
        .full-btn { width: 100%; padding: 15px; border-radius: 10px; background: #ff3b30; color: white; font-weight: 900; border: none; margin-bottom: 12px; font-size: 16px; }

        /* 유튜브/틱톡 버튼 */
        .sns-row { width: 100%; display: flex; gap: 8px; margin-bottom: 20px; }
        .sns-btn { flex: 1; padding: 12px; border-radius: 10px; text-decoration: none; color: #fff; font-weight: 900; text-align: center; display: flex; align-items: center; justify-content: center; gap: 5px; font-size: 13px; }

        /* 보안 및 개인정보 (사진 내용 그대로 반영) */
        .security-section { width: 100%; background: #0a0a0a; border: 1px solid #222; border-radius: 15px; padding: 15px; }
        .sec-title { color: var(--hk-cyan); font-weight: 900; margin-bottom: 10px; font-size: 15px; }
        .sec-list { font-size: 12px; color: #aaa; list-style: none; line-height: 1.8; padding-left: 0; }
        .sec-list li::before { content: "◈ "; color: var(--hk-cyan); margin-right: 5px; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="top-nav">
        <select class="lang-select" id="langSelect" onchange="changeLang()">
            <option value="ko">한국어 🇰🇷</option>
            <option value="en">English 🇺🇸</option>
            <option value="cn">中文 🇨🇳</option>
            <option value="jp">日本語 🇯🇵</option>
            <option value="vn">Tiếng Việt 🇻🇳</option>
            <option value="id">Bahasa 🇮🇩</option>
            <option value="ph">Tagalog 🇵🇭</option>
            <option value="th">ไทย 🇹🇭</option>
            <option value="my">Melayu 🇲🇾</option>
            <option value="in">हिन्दी 🇮🇳</option>
            <option value="ru">Русский 🇷🇺</option>
            <option value="de">Deutsch 🇩🇪</option>
            <option value="fr">Français 🇫🇷</option>
            <option value="es">Español 🇪🇸</option>
            <option value="pt">Português 🇵🇹</option>
        </select>
    </div>

    <div class="brand">HK WORLD BANK</div>
    <div class="sub-brand">Quantum Financial Ecosystem & Industry Cluster</div>

    <div class="asset-card">
        <div class="asset-title" id="txt-asset-title">메인 자산 통합 원장</div>
        <div class="asset-val">400.0212 <span style="font-size:18px; color:var(--hk-gold);">Pi</span></div>
        <div class="gcv-badge">VALUE: $ 125,663,600 (GCV)</div>
    </div>

    <div class="menu-grid">
        <div class="menu-item"><i class="fas fa-gift" style="color:#ff3b30;"></i><div class="menu-text" id="m1">보상</div></div>
        <div class="menu-item"><i class="fas fa-balance-scale" style="color:#af52de;"></i><div class="menu-text" id="m2">기본소득</div></div>
        <div class="menu-item" onclick="startPay()"><i class="fas fa-rotate" style="color:#5ac8fa;"></i><div class="menu-text" id="m3">스왑</div></div>
    </div>

    <div class="staking-info" id="txt-staking">Staking 31.4% | 유동성풀 $</div>
    <div class="asset-val" style="font-size:32px; margin-top:0;">88,410,819,601</div>

    <div class="btn-row">
        <button class="act-btn" style="background:#fff; color:#000;" id="b1">PI 수량</button>
        <button class="act-btn" style="background:var(--hk-gold); color:#000;" onclick="startPay()">SWAP</button>
        <button class="act-btn" style="background:var(--hk-green); color:#000;" id="b3">LP 공급</button>
    </div>

    <button class="full-btn" id="b4">글로벌 고객지원센터</button>

    <div class="sns-row">
        <a href="https://www.youtube.com/@여기에_채널주소" target="_blank" class="sns-btn" style="background:#f00;">
            <i class="fab fa-youtube"></i> YOUTUBE
        </a>
        <a href="https://www.tiktok.com/@여기에_아이디" target="_blank" class="sns-btn" style="background:#000; border:1px solid #333;">
            <i class="fab fa-tiktok"></i> TIKTOK
        </a>
    </div>

    <div class="security-section">
        <div class="sec-title" id="txt-sec-title">HK QUANTUM SHIELD ACTIVE</div>
        <ul class="sec-list">
            <li id="s1">개인정보보호법 준수: 양자 암호화 보안 적용</li>
            <li id="s2">Form of Private: 자산 보호 프로토콜 가동</li>
            <li id="s3">HK-ROBOT: AI 실시간 위협 탐지 중</li>
        </ul>
    </div>
</div>

<script>
    // 1. 실전 결제 엔진 (느낌표 제거 및 결제창 호출)
    try { Pi.init({ version: "2.0", sandbox: false }); } catch(e) {}
    
    async function startPay() {
        try {
            // 파이 브라우저인지 먼저 체크하여 "느낌표/경고" 방지
            const payment = await Pi.createPayment({
                amount: 5.0,
                memo: "HK WORLD BANK 실전 결제 테스트",
                metadata: { type: "real_transaction" }
            }, {
                onReadyForServerApproval: (id) => { console.log("승인 대기:", id); },
                onReadyForServerCompletion: (id, txid) => { alert("결제 완료! TXID: " + txid); },
                onError: (err) => { alert("파이 브라우저에서 실행해 주세요."); }
            });
        } catch (e) {
            alert("파이 브라우저 전용 기능입니다.");
        }
    }

    // 2. 15개국어 변환 로직 (확장 가능)
    const langData = {
        ko: { asset: "메인 자산 통합 원장", m1: "보상", m2: "기본소득", m3: "스왑", b1: "PI 수량", b3: "LP 공급", b4: "글로벌 고객지원센터", s1: "개인정보보호법 준수: 양자 암호화 보안 적용", s2: "자산 보호 프로토콜 가동", s3: "AI 실시간 위협 탐지 중" },
        en: { asset: "Main Asset Ledger", m1: "Reward", m2: "UBI", m3: "Swap", b1: "PI Qty", b3: "LP Supply", b4: "Global Support Center", s1: "Privacy Act: Quantum Encryption Applied", s2: "Asset Protection Protocol Active", s3: "AI Real-time Threat Detection" }
        // ... 형님, 나머지 13개국어도 이 형식으로 추가하면 즉시 반영됩니다.
    };

    function changeLang() {
        const val = document.getElementById('langSelect').value;
        const d = langData[val] || langData.ko;
        document.getElementById('txt-asset-title').innerText = d.asset;
        document.getElementById('m1').innerText = d.m1; document.getElementById('m2').innerText = d.m2; document.getElementById('m3').innerText = d.m3;
        document.getElementById('b1').innerText = d.b1; document.getElementById('b3').innerText = d.b3; document.getElementById('b4').innerText = d.b4;
        document.getElementById('s1').innerText = d.s1; document.getElementById('s2').innerText = d.s2; document.getElementById('s3').innerText = d.s3;
    }
</script>
</body>
</html>
