<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK WORLD BANK | LIVE HUB</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #000; --gold: #FFD700; --neon: #39FF14; --orange: #FF8C00; --blue: #00E5FF; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Noto Sans KR', sans-serif; display: flex; justify-content: center; overflow-x: hidden; }
        .app-container { width: 100%; max-width: 500px; padding: 20px; display: flex; flex-direction: column; align-items: center; }

        /* 글로벌 언어 선택바 */
        .lang-header { width: 100%; display: flex; justify-content: flex-end; margin-bottom: 10px; }
        .lang-box { border: 1.5px solid var(--gold); border-radius: 4px; background: #111; padding: 3px; }
        .lang-select { background: transparent; color: var(--gold); border: none; font-size: 11px; font-weight: bold; outline: none; cursor: pointer; }

        .title { font-family: 'Oswald', sans-serif; font-size: 38px; color: var(--gold); text-align: center; margin: 10px 0; }
        
        /* 자산 카드 */
        .asset-card { width: 100%; background: #0f0f0f; border-radius: 15px; padding: 20px 0; text-align: center; margin-bottom: 20px; border: 1px solid #222; }
        .ledger-txt { color: var(--gold); font-size: 14px; margin-bottom: 5px; display: block; }
        .balance { font-size: 40px; font-weight: 900; margin: 5px 0; }
        .balance span { color: var(--orange); font-size: 20px; }
        .gcv-label { border: 2px solid var(--neon); border-radius: 50px; padding: 6px 15px; color: var(--neon); font-weight: bold; font-size: 13px; display: inline-block; margin-top: 5px; }

        /* ✅ 라이브 멀티미디어 섹션 (플레이어 탑재) */
        .media-section { width: 100%; margin-bottom: 25px; }
        .media-tabs { display: flex; gap: 5px; margin-bottom: 10px; }
        .tab-btn { flex: 1; padding: 8px; border: 1px solid #333; background: #111; color: #777; font-size: 11px; font-weight: bold; cursor: pointer; border-radius: 5px; }
        .tab-btn.active { border-color: var(--gold); color: #fff; }

        .video-container { width: 100%; aspect-ratio: 16/9; background: #080808; border-radius: 10px; overflow: hidden; border: 1px solid #222; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }

        /* 유동성 풀 + APR 통합 */
        .liq-card { width: 100%; background: #111; border-left: 4px solid var(--gold); padding: 15px; border-radius: 0 10px 10px 0; margin-bottom: 20px; box-sizing: border-box; }
        .liq-top { display: flex; justify-content: space-between; align-items: center; }
        .liq-title { color: var(--orange); font-size: 14px; font-weight: bold; }
        .apr-tag { background: var(--gold); color: #000; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 900; }
        .liq-val { font-size: 24px; font-weight: 900; margin-top: 5px; }

        /* 금융 버튼 */
        .btn-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; width: 100%; margin-bottom: 20px; }
        .btn { padding: 12px 0; border-radius: 6px; font-weight: bold; font-size: 11px; border: none; color: #fff; cursor: pointer; }
        .btn-k { background: #000; border: 1.5px solid var(--gold); }
        .btn-o { background: var(--orange); }
        .btn-g { background: #28a745; }

        .cs-banner { width: 100%; background: linear-gradient(90deg, #ff4e50, #f9d423); color: #fff; padding: 10px; border-radius: 6px; text-align: center; font-weight: bold; text-decoration: none; font-size: 14px; margin-bottom: 20px; }

        footer { text-align: center; font-size: 8px; color: #333; line-height: 1.6; border-top: 1px solid #111; padding-top: 15px; width: 100%; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="lang-header">
        <div class="lang-box">
            <select class="lang-select" id="langSwitcher" onchange="changeLanguage(this.value)">
                <option value="ko">KOREAN (한국어)</option>
                <option value="en">ENGLISH (영어)</option>
                <option value="ar">ARABIC (아랍어)</option>
                <option value="hi">HINDI (인도어)</option>
                <option value="es">SPANISH (스페인어)</option>
                <option value="pt">PORTUGUESE (포르투갈어)</option>
                <option value="ru">RUSSIAN (러시아어)</option>
                <option value="uk">UKRAINIAN (우크라이나어)</option>
                <option value="id">INDONESIAN (인도네시아어)</option>
                <option value="zh">CHINESE (중국어)</option>
                <option value="ja">JAPANESE (일본어)</option>
                <option value="de">GERMAN (독일어)</option>
                <option value="fr">FRENCH (프랑스어)</option>
            </select>
        </div>
    </div>

    <h1 class="title">HK WORLD BANK</h1>

    <div class="asset-card">
        <span class="ledger-txt" id="txt-ledger">메인 자산 통합 원장</span>
        <div class="balance">400.0000 <span>Pi</span></div>
        <div class="gcv-label" id="txt-gcv">가치 평가: $ 125,663,600 (GCV)</div>
    </div>

    <div class="media-section">
        <div class="media-tabs">
            <button class="tab-btn active" onclick="switchVideo('yt')"><i class="fa-brands fa-youtube"></i> YouTube Live</button>
            <button class="tab-btn" onclick="switchVideo('tk')"><i class="fa-brands fa-tiktok"></i> TikTok Player</button>
        </div>
        <div class="video-container" id="videoWrapper">
            <iframe id="mainVideo" src="https://www.youtube.com/embed/videoseries?list=PLtY6C7V6q3F7wWJ1fE-7p-oE066f2Y7uE" allowfullscreen></iframe>
        </div>
    </div>

    <div class="liq-card">
        <div class="liq-top">
            <div class="liq-title" id="txt-liq">유동성 풀 총액 ($)</div>
            <div class="apr-tag">APR 31.4%</div>
        </div>
        <div class="liq-val">88,401,773,756</div>
    </div>

    <div class="btn-row">
        <button class="btn btn-k" id="b1">Pi 수량</button>
        <button class="btn btn-o" id="b2">SWAP</button>
        <button class="btn btn-g" id="b3">LP 공급</button>
    </div>

    <a href="#" class="cs-banner" id="txt-cs">🎧 24/7 글로벌 고객지원센터</a>

    <footer>
        © 2026 HK GROUP GLOBAL HEGEMONY.<br>
        CHAIRMAN LEE JAEWAN. ALL RIGHTS RESERVED.
    </footer>
</div>

<script>
    // ✅ 유튜브/틱톡 전환 스크립트 (플레이 가능하게!)
    function switchVideo(type) {
        const video = document.getElementById('mainVideo');
        const buttons = document.querySelectorAll('.tab-btn');
        buttons.forEach(b => b.classList.remove('active'));
        
        if(type === 'yt') {
            event.target.classList.add('active');
            video.src = "https://www.youtube.com/embed/videoseries?list=PLtY6C7V6q3F7wWJ1fE-7p-oE066f2Y7uE"; // 형님 채널/리스트 주소
        } else {
            event.target.classList.add('active');
            video.src = "https://www.tiktok.com/embed/v2/7222345678912345678"; // 틱톡 샘플 (형님 영상 ID로 교체 가능)
        }
    }

    const i18n = {
        ko: {ld:'메인 자산 통합 원장', gcv:'가치 평가: $ 125,663,600 (GCV)', liq:'유동성 풀 총액 ($)', cs:'🎧 24/7 글로벌 고객지원센터', b1:'Pi 수량', b2:'SWAP', b3:'LP 공급'},
        en: {ld:'Main Asset Ledger', gcv:'Value: $ 125,663,600 (GCV)', liq:'Total Liquidity ($)', cs:'🎧 24/7 Global Support', b1:'Pi Qty', b2:'SWAP', b3:'Add LP'},
        ar: {ld:'دفتر الأصول الرئيسي', gcv:'القيمة: $ 125,663,600', liq:'إجمالي السيولة ($)', cs:'🎧 دعم عالمي 24/7', b1:'كمية Pi', b2:'تبادل', b3:'توفير LP'},
        hi: {ld:'मुख्य संपत्ति लेजर', gcv:'मूल्य: $ 125,663,600', liq:'तरलता ($)', cs:'🎧 24/7 वैश्विक सहायता', b1:'Pi मात्रा', b2:'स्वैप', b3:'LP आपूर्ति'},
        es: {ld:'Libro Mayor', gcv:'Valor: $ 125,663,600', liq:'Liquidez ($)', cs:'🎧 Soporte 24/7', b1:'Cant. Pi', b2:'SWAP', b3:'Suministro LP'},
        pt: {ld:'Livro Razão', gcv:'Valor: $ 125,663,600', liq:'Liquidez ($)', cs:'🎧 Suporte 24/7', b1:'Qtd. Pi', b2:'SWAP', b3:'Suprimento LP'},
        ru: {ld:'Главный реестр', gcv:'Стоимость: $ 125,663,600', liq:'Ликвидность ($)', cs:'🎧 Поддержка 24/7', b1:'Кол-во Pi', b2:'SWAP', b3:'Поставка LP'},
        uk: {ld:'Головний реєстр', gcv:'Вартість: $ 125,663,600', liq:'Ліквідність ($)', cs:'🎧 Підтримка 24/7', b1:'К-сть Pi', b2:'SWAP', b3:'Поставка LP'},
        id: {ld:'Buku Besar Aset', gcv:'Nilai: $ 125,663,600', liq:'Likuiditas ($)', cs:'🎧 Dukungan 24/7', b1:'Jml Pi', b2:'SWAP', b3:'Pasokan LP'},
        zh: {ld:'主资产总账', gcv:'价值: $ 125,663,600', liq:'总流动性 ($)', cs:'🎧 24/7 全球客服', b1:'Pi 数量', b2:'SWAP', b3:'LP 供应'},
        ja: {ld:'メイン資産台帳', gcv:'評価額: $ 125,663,600', liq:'流動性プール ($)', cs:'🎧 24/7 サポート', b1:'Pi 数量', b2:'SWAP', b3:'LP 供給'},
        de: {ld:'Haupt-Ledger', gcv:'Wert: $ 125,663,600', liq:'Liquidität ($)', cs:'🎧 24/7 Support', b1:'Pi Menge', b2:'SWAP', b3:'LP Angebot'},
        fr: {ld:'Grand Livre', gcv:'Valeur: $ 125,663,600', liq:'Liquidité ($)', cs:'🎧 Support 24/7', b1:'Qté Pi', b2:'SWAP', b3:'Fourniture LP'}
    };

    function changeLanguage(lang) {
        const s = i18n[lang];
        document.getElementById('txt-ledger').innerText = s.ld;
        document.getElementById('txt-gcv').innerText = s.gcv;
        document.getElementById('txt-liq').innerText = s.liq;
        document.getElementById('txt-cs').innerText = s.cs;
        document.getElementById('b1').innerText = s.b1;
        document.getElementById('b2').innerText = s.b2;
        document.getElementById('b3').innerText = s.b3;
    }
</script>
</body>
</html>
